<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sala 15 — A Oficina do Relojoeiro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Courier New', monospace; background: #0c0a07; color: #e6d6b8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 12px; }
    #tabs { width: 100%; max-width: 910px; }
    #game-wrapper { position: relative; width: 900px; max-width: 100%; }
    canvas { width: 100%; height: auto; display: block; border-radius: 8px; border: 1px solid #4a3a22; cursor: crosshair; }
    #puzzle-panel, #success-overlay { position: absolute; inset: 0; }
    #message, #inventory { width: 100%; max-width: 910px; }
  </style>
</head>
<body>
  <div id="tabs"></div>
  <div id="game-wrapper">
    <canvas id="gameCanvas" width="900" height="600"></canvas>
    <div id="puzzle-panel"></div>
    <div id="success-overlay"></div>
  </div>
  <div id="message"></div>
  <div id="inventory"></div>

  <script src="../lib/api.js"></script>
  <script src="../lib/engine.js"></script>
  <script src="../lib/input.js"></script>
  <script src="../lib/state.js"></script>
  <script src="../lib/inventory.js"></script>
  <script src="../lib/transitions.js"></script>
  <script src="../lib/timer.js"></script>
  <script src="../lib/particles.js"></script>
  <script src="../ui-kit/tokens.js"></script>
  <script src="../ui-kit/themes/clockwork.js"></script>
  <script src="../ui-kit/components/inventory.js"></script>
  <script src="../ui-kit/components/tabs.js"></script>
  <script src="../ui-kit/components/message-box.js"></script>
  <script src="../ui-kit/components/panel.js"></script>
  <script src="../ui-kit/components/success-overlay.js"></script>
  <script src="render.js"></script>

  <script>
    UITokens.apply(ThemeClockwork);
    const game = EscapeEngine.create({ canvasId: 'gameCanvas', width: 900, height: 600, backgroundColor: '#0c0a07' });
    const input = EscapeInput.create(game.getCanvas(), 900, 600);
    const state = EscapeState.create({ ambiente: 'oficina', flags: {
      gaveta: false, ponteiroColetado: false, ferramentas: false,
      relogioOk: false, cacosColetados: false, mostradorOk: false, portaAberta: false,
      esquema: false, sokobanOk: false
    }});
    const inv = EscapeInventory.create();
    const timer = EscapeTimer.create();

    UITabs.create('tabs', [
      { id: 'oficina', label: 'Oficina', locked: false },
      { id: 'deposito', label: 'Depósito', locked: true }
    ], (tabId) => {
      if (tabId === 'deposito' && !state.get('portaAberta')) {
        msg('A porta blindada do depósito está trancada por um teclado numérico.');
        UITabs.setActive('tabs', 'oficina'); return;
      }
      EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente(tabId); msgAmb(tabId); });
    });

    UIMessageBox.create('message');
    UIInventory.create('inventory');
    UIPanel.create('puzzle-panel');
    UISuccessOverlay.create('success-overlay');
    const motes = EscapeParticles.create({ x: 0, y: 0, width: 900, height: 600, color: 'rgba(217,164,65,0.12)', count: 16, speedX: [-0.3,0.3], speedY: [0.1,0.6], size: [0.8,1.6], life: [6,12] });

    function msg(t) { UIMessageBox.show('message', t); }
    function msgAmb(a) {
      if (a === 'oficina') msg('A oficina do Sr. Ventura. Relógios de todos os tamanhos e uma bancada coberta de peças e cacos.');
      else msg('O depósito nos fundos. Engradados pesados sobre trilhos bloqueiam o caminho até a escotilha de saída. Um esquema desbotado está pregado na parede.');
    }
    msg('O relojoeiro sumiu e trancou a oficina por dentro. Seus enigmas mecânicos guardam o caminho para fora. Ajuste, remonte e empurre — antes que a oficina seja lacrada.');
    if (!EscapeAPI.isLoggedIn()) {
      setTimeout(() => msg('⚠️ Você não está logado. Seu tempo não será registrado no ranking. Faça login no lobby para participar!'), 3000);
    }
    timer.start();

    // ============ OBJETOS (posições = render.js) ============
    const objetosOficina = [
      { id: 'relogio', x: 100, y: 70, w: 150, h: 170, label: 'Relógio de parede' },
      { id: 'gaveta', x: 360, y: 250, w: 120, h: 60, label: 'Gaveta' },
      { id: 'bancada', x: 350, y: 340, w: 270, h: 100, label: 'Bancada de remontagem' },
      { id: 'ferramentas', x: 620, y: 90, w: 150, h: 120, label: 'Caixa de ferramentas' },
      { id: 'porta', x: 810, y: 130, w: 70, h: 310, label: 'Porta → Depósito' },
    ];
    const objetosDeposito = [
      { id: 'esquema', x: 60, y: 80, w: 160, h: 140, label: 'Esquema na parede' },
      { id: 'blocos', x: 330, y: 240, w: 260, h: 200, label: 'Engradados' },
      { id: 'escotilha', x: 740, y: 360, w: 130, h: 130, label: 'Escotilha de saída' },
      { id: 'voltar', x: 30, y: 480, w: 100, h: 60, label: '← Oficina' },
    ];
    function getObjetos() { return state.getAmbiente() === 'oficina' ? objetosOficina : objetosDeposito; }

    // ============ INTERAÇÕES ============
    function interagir(obj) {
      if (EscapeTransitions.isTransitioning()) return;
      const id = obj.id;

      // -- OFICINA --
      if (id === 'gaveta') {
        if (!state.get('gaveta')) {
          state.set('gaveta', true);
          state.set('ponteiroColetado', true);
          inv.add('ponteiro', '🕐', 'Ponteiro dos minutos, solto');
          msg('Na gaveta, um ponteiro de minutos soltou-se de algum relógio. Talvez pertença ao relógio de parede.');
        } else { msg('A gaveta está vazia agora.'); }
      } else if (id === 'ferramentas') {
        if (!state.get('ferramentas')) {
          state.set('ferramentas', true);
          inv.add('bilhete', '📝', 'Bilhete: "Ventura almoçava meia hora após o meio-dia"');
          msg('Na caixa de ferramentas, um bilhete amarelado: "O velho Ventura almoçava sempre meia hora após o meio-dia, nem um minuto além."');
        } else { msg('Bilhete: "meia hora após o meio-dia".'); }
      } else if (id === 'relogio') {
        if (state.get('relogioOk')) { msg('O relógio marca 12:30. O compartimento atrás dele está aberto.'); }
        else if (state.get('ponteiroColetado')) { abrirRelogio(); }
        else { msg('Falta o ponteiro dos minutos neste relógio. Sem ele, não dá para acertar a hora.'); }
      } else if (id === 'bancada') {
        if (state.get('mostradorOk')) { msg('O mostrador está remontado. No aro, lê-se gravado: 5 0 4.'); }
        else if (state.get('cacosColetados')) { abrirMostrador(); }
        else { msg('A bancada está cheia de peças, mas faltam os cacos do mostrador. Devem estar guardados em algum lugar seguro.'); }
      } else if (id === 'porta') {
        if (state.get('portaAberta')) {
          EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente('deposito'); UITabs.setActive('tabs', 'deposito'); msgAmb('deposito'); });
        } else { abrirPorta(); }
      }

      // -- DEPÓSITO --
      else if (id === 'esquema') {
        if (!state.get('esquema')) {
          state.set('esquema', true);
          msg('O esquema mostra a planta do depósito: cada engradado precisa repousar sobre uma marca "✕". Os trilhos só permitem empurrar, nunca puxar — a nota de Ventura no canto adverte: "Pense de que lado se coloca antes de empurrar, ou ficará preso."');
        } else { msg('Esquema: os engradados vão sobre as marcas "✕". Só é possível empurrar; posicione-se do lado certo.'); }
      } else if (id === 'blocos') {
        if (state.get('sokobanOk')) { msg('Os engradados já estão sobre as marcas "✕". A escotilha destravou.'); }
        else { abrirSokoban(); }
      } else if (id === 'escotilha') {
        if (state.get('sokobanOk')) { escapar(); }
        else { msg('A escotilha está travada. As duas placas marcadas com "✕" precisam estar pressionadas por engradados.'); }
      } else if (id === 'voltar') {
        EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente('oficina'); UITabs.setActive('tabs', 'oficina'); msg('De volta à oficina.'); });
      }

      UIInventory.render('inventory', inv.getAll());
    }

    // ============ PUZZLE 1: RELÓGIO (ajustar até 12:30) ============
    let relHora = 12, relMin = 0;
    function abrirRelogio() {
      relHora = 12; relMin = 0;
      const html = `
        <p style="color:${UITokens.get('colorText')}; margin-bottom:8px;">🕰️ Ajuste o relógio</p>
        <p style="color:${UITokens.get('colorTextMuted')}; font-size:0.82rem; margin-bottom:10px;">Gire os ponteiros até o horário do enigma.</p>
        <svg id="relSvg" width="150" height="150" viewBox="0 0 150 150" style="display:block; margin:0 auto 10px;">
          <circle cx="75" cy="75" r="70" fill="#0e0b07" stroke="#d9a441" stroke-width="3"/>
          <line id="hHora" x1="75" y1="75" x2="75" y2="40" stroke="#e6d6b8" stroke-width="5" stroke-linecap="round"/>
          <line id="hMin" x1="75" y1="75" x2="75" y2="22" stroke="#d9a441" stroke-width="3" stroke-linecap="round"/>
          <circle cx="75" cy="75" r="4" fill="#d9a441"/>
        </svg>
        <div id="relTime" style="font-size:1.4rem; color:${UITokens.get('colorAccent')}; margin-bottom:12px;">12:00</div>
        <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
          <button id="hMenos" style="padding:8px 12px; background:#1c1710; border:1px solid #4a3a22; color:#e6d6b8; font-family:monospace; cursor:pointer; border-radius:4px;">◀ Hora</button>
          <button id="hMais" style="padding:8px 12px; background:#1c1710; border:1px solid #4a3a22; color:#e6d6b8; font-family:monospace; cursor:pointer; border-radius:4px;">Hora ▶</button>
          <button id="mMenos" style="padding:8px 12px; background:#1c1710; border:1px solid #4a3a22; color:#e6d6b8; font-family:monospace; cursor:pointer; border-radius:4px;">◀ Min</button>
          <button id="mMais" style="padding:8px 12px; background:#1c1710; border:1px solid #4a3a22; color:#e6d6b8; font-family:monospace; cursor:pointer; border-radius:4px;">Min ▶</button>
        </div>
        <div style="display:flex; gap:10px; justify-content:center; margin-top:14px;">
          <button id="relConfirm" style="padding:8px 22px; background:#1c1710; border:1px solid #d9a441; color:#d9a441; font-family:monospace; cursor:pointer; border-radius:4px;">Confirmar</button>
          <button id="relVoltar" style="padding:8px 20px; background:#1c1710; border:1px solid #4a3a22; color:#e6d6b8; font-family:monospace; cursor:pointer; border-radius:4px;">Voltar</button>
        </div>`;
      UIPanel.setContent('puzzle-panel', html); UIPanel.show('puzzle-panel');
      setTimeout(() => {
        const upd = () => {
          const hh = ((relHora % 12) + (relMin / 60)) * 30;
          const mm = relMin * 6;
          document.getElementById('hHora').setAttribute('transform', 'rotate(' + hh + ' 75 75)');
          document.getElementById('hMin').setAttribute('transform', 'rotate(' + mm + ' 75 75)');
          const h12 = relHora === 0 ? 12 : relHora;
          document.getElementById('relTime').textContent = h12 + ':' + String(relMin).padStart(2, '0');
        };
        document.getElementById('hMais').addEventListener('click', () => { relHora = (relHora % 12) + 1; upd(); });
        document.getElementById('hMenos').addEventListener('click', () => { relHora = relHora <= 1 ? 12 : relHora - 1; upd(); });
        document.getElementById('mMais').addEventListener('click', () => { relMin = (relMin + 5) % 60; upd(); });
        document.getElementById('mMenos').addEventListener('click', () => { relMin = (relMin + 55) % 60; upd(); });
        document.getElementById('relConfirm').addEventListener('click', () => {
          if (relHora === 12 && relMin === 30) {
            state.set('relogioOk', true); state.set('cacosColetados', true);
            UIPanel.hide('puzzle-panel');
            inv.add('cacos', '🧩', 'Cacos do mostrador de um relógio');
            UIInventory.render('inventory', inv.getAll());
            msg('✅ Tique-taque! Aos 12:30, um compartimento range atrás do relógio e revela os cacos de um velho mostrador. Leve-os à bancada para remontar.');
          } else {
            msg('O relógio não reage. Reveja a pista sobre o horário de almoço de Ventura.');
          }
        });
        document.getElementById('relVoltar').addEventListener('click', () => { UIPanel.hide('puzzle-panel'); msg('Você recua do relógio.'); });
        upd();
      }, 50);
      msg('O relógio de parede tem os ponteiros livres. Gire-os até o horário certo.');
    }

    // ============ PUZZLE 2: REMONTAGEM DO MOSTRADOR (quebra-cabeça deslizante) ============
    // A figura é um mostrador de relógio 300x300 com "504" gravado. Fatiada em 3x3.
    // Quebra-cabeça deslizante (8-puzzle): há UM espaço vazio; clicar numa peça
    // vizinha ao vazio desliza-a para lá, abrindo um novo vazio. O vazio "mora" no
    // canto inferior-direito (cell 8), onde não há dígitos — o "504" (linha do meio)
    // fica legível quando montado. Embaralhado por jogadas legais => sempre solúvel.
    function buildPicInner() {
      let ticks = '';
      for (let i = 0; i < 12; i++) {
        const a = (i / 12) * Math.PI * 2 - Math.PI / 2;
        const x1 = 150 + Math.cos(a) * 132, y1 = 150 + Math.sin(a) * 132;
        const x2 = 150 + Math.cos(a) * 120, y2 = 150 + Math.sin(a) * 120;
        ticks += '<line x1="' + x1.toFixed(1) + '" y1="' + y1.toFixed(1) + '" x2="' + x2.toFixed(1) + '" y2="' + y2.toFixed(1) + '" stroke="#8f7a58" stroke-width="3"/>';
      }
      return '' +
        '<rect x="0" y="0" width="300" height="300" fill="#15110b"/>' +
        '<circle cx="150" cy="150" r="145" fill="#0e0b07" stroke="#d9a441" stroke-width="6"/>' +
        '<circle cx="150" cy="150" r="118" fill="none" stroke="#5a4126" stroke-width="2"/>' +
        ticks +
        '<text x="150" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#8f7a58">VENTURA</text>' +
        '<line x1="150" y1="150" x2="150" y2="78" stroke="#e6d6b8" stroke-width="4" stroke-linecap="round"/>' +
        '<line x1="150" y1="150" x2="206" y2="150" stroke="#e6d6b8" stroke-width="3" stroke-linecap="round"/>' +
        '<circle cx="150" cy="150" r="6" fill="#d9a441"/>' +
        '<text x="52" y="205" font-family="Courier New, monospace" font-size="80" font-weight="bold" fill="#d9a441">5</text>' +
        '<text x="118" y="205" font-family="Courier New, monospace" font-size="80" font-weight="bold" fill="#d9a441">0</text>' +
        '<text x="196" y="205" font-family="Courier New, monospace" font-size="80" font-weight="bold" fill="#d9a441">4</text>';
    }
    const PIC_INNER = buildPicInner();
    function tileSvg(slice) {
      const col = slice % 3, row = Math.floor(slice / 3);
      return '<svg width="90" height="90" viewBox="' + (col * 100) + ' ' + (row * 100) + ' 100 100" style="display:block;">' + PIC_INNER + '</svg>';
    }
    const MOST_BLANK = 8;                 // slice 8 (canto inf-dir) é o espaço vazio
    let mostBoard = [0, 1, 2, 3, 4, 5, 6, 7, 8];
    let mostBlank = 8;                     // índice da célula vazia
    function mostNeighbors(cell) {
      const r = Math.floor(cell / 3), c = cell % 3, out = [];
      if (r > 0) out.push(cell - 3);
      if (r < 2) out.push(cell + 3);
      if (c > 0) out.push(cell - 1);
      if (c < 2) out.push(cell + 1);
      return out;
    }
    function mostSlide(cell) {             // desliza a peça de 'cell' para o vazio (se vizinha)
      if (!mostNeighbors(mostBlank).includes(cell)) return false;
      mostBoard[mostBlank] = mostBoard[cell];
      mostBoard[cell] = MOST_BLANK;
      mostBlank = cell;
      return true;
    }
    function mostScramble() {
      mostBoard = [0, 1, 2, 3, 4, 5, 6, 7, 8];
      mostBlank = 8;
      let last = -1;
      for (let i = 0; i < 80; i++) {
        const opts = mostNeighbors(mostBlank).filter(n => n !== last);
        const pick = opts[Math.floor(Math.random() * opts.length)];
        last = mostBlank;
        mostSlide(pick);
      }
      if (mostBoard.every((v, i) => v === i)) mostScramble();  // nunca começar resolvido
    }
    function mostRenderGrid() {
      const movable = mostNeighbors(mostBlank);
      let g = '<div id="mostGrid" style="display:grid; grid-template-columns:repeat(3,90px); gap:3px; justify-content:center; margin:0 auto 12px; width:max-content; background:#4a3a22; padding:3px; border-radius:4px;">';
      for (let cell = 0; cell < 9; cell++) {
        const val = mostBoard[cell];
        if (val === MOST_BLANK) {
          g += '<div class="mtile" data-cell="' + cell + '" style="width:90px;height:90px;background:#0e0b07;border:1px dashed #4a3a22;box-sizing:border-box;"></div>';
        } else {
          const canMove = movable.includes(cell) && !state.get('mostradorOk');
          const style = 'width:90px;height:90px;overflow:hidden;box-sizing:border-box;cursor:' + (canMove ? 'pointer' : 'default') + ';' + (canMove ? 'box-shadow:inset 0 0 0 2px rgba(79,199,168,0.55);' : '');
          g += '<div class="mtile" data-cell="' + cell + '" style="' + style + '">' + tileSvg(val) + '</div>';
        }
      }
      g += '</div>';
      return g;
    }
    function abrirMostrador() {
      if (state.get('mostradorOk')) { msg('O mostrador já está remontado — lê-se 5 0 4 gravado no aro.'); return; }
      mostScramble();
      const html = `
        <p style="color:${UITokens.get('colorText')}; margin-bottom:6px;">🧩 Remonte o mostrador</p>
        <p style="color:${UITokens.get('colorTextMuted')}; font-size:0.8rem; margin-bottom:10px;">Há um espaço vazio. Clique numa peça vizinha ao vazio para deslizá-la para lá. Continue até a figura ficar correta e leia o que está gravado.</p>
        <div id="mostWrap">${mostRenderGrid()}</div>
        <div style="display:flex; gap:10px; justify-content:center; margin-top:6px;">
          <button id="mostReset" style="padding:8px 18px; background:#1c1710; border:1px solid #d4643a; color:#d4643a; font-family:monospace; cursor:pointer; border-radius:4px;">Embaralhar</button>
          <button id="mostVoltar" style="padding:8px 20px; background:#1c1710; border:1px solid #4a3a22; color:#e6d6b8; font-family:monospace; cursor:pointer; border-radius:4px;">Voltar</button>
        </div>`;
      UIPanel.setContent('puzzle-panel', html); UIPanel.show('puzzle-panel');
      setTimeout(bindMost, 50);
      msg('Na bancada, os cacos do mostrador. Deslize-os pelo espaço vazio até a figura fazer sentido.');
    }
    function bindMost() {
      document.querySelectorAll('.mtile').forEach(t => t.addEventListener('click', () => {
        if (state.get('mostradorOk')) return;
        const cell = parseInt(t.dataset.cell);
        if (!mostSlide(cell)) return;
        if (mostBoard.every((v, i) => v === i)) { mostSolved(); return; }
        document.getElementById('mostWrap').innerHTML = mostRenderGrid();
        bindMost();
      }));
      const rb = document.getElementById('mostReset');
      if (rb) rb.addEventListener('click', () => { mostScramble(); document.getElementById('mostWrap').innerHTML = mostRenderGrid(); bindMost(); msg('Peças embaralhadas novamente.'); });
      const vb = document.getElementById('mostVoltar');
      if (vb) vb.addEventListener('click', () => { UIPanel.hide('puzzle-panel'); msg('Você deixa a remontagem de lado.'); });
    }
    function mostSolved() {
      state.set('mostradorOk', true);
      document.getElementById('mostWrap').innerHTML = mostRenderGrid();
      msg('✅ A última peça desliza no lugar e o mostrador se forma: o rosto de um relógio antigo. Gravado no aro, agora legível: "5 0 4". Deve ser o código da porta!');
      inv.add('codigo', '🔢', 'Mostrador remontado: gravado 5-0-4');
      UIInventory.render('inventory', inv.getAll());
    }

    // ============ PORTA BLINDADA (código 504, lido no mostrador) ============
    function abrirPorta() {
      const html = `
        <p style="color:${UITokens.get('colorText')}; margin-bottom:12px;">🔒 Porta do Depósito — 3 dígitos</p>
        <input type="text" id="portaInput" maxlength="3" placeholder="_ _ _"
          style="background:#0e0b07; border:1px solid #4a3a22; color:#d9a441; font-family:'Courier New'; font-size:1.5rem; padding:10px; width:110px; text-align:center; border-radius:4px;">
        <div style="margin-top:16px; display:flex; gap:10px; justify-content:center;">
          <button id="portaOk" style="padding:8px 22px; background:#1c1710; border:1px solid #d9a441; color:#d9a441; font-family:'Courier New'; cursor:pointer; border-radius:4px;">Abrir</button>
          <button id="portaVoltar" style="padding:8px 20px; background:#1c1710; border:1px solid #4a3a22; color:#e6d6b8; font-family:'Courier New'; cursor:pointer; border-radius:4px;">Voltar</button>
        </div>`;
      UIPanel.setContent('puzzle-panel', html); UIPanel.show('puzzle-panel');
      setTimeout(() => {
        document.getElementById('portaInput').focus();
        const tenta = () => {
          const el = document.getElementById('portaInput');
          if (el.value.trim() === '504') {
            state.set('portaAberta', true); UITabs.unlock('tabs', 'deposito'); UIPanel.hide('puzzle-panel');
            msg('✅ A porta blindada destrava com um estalo pesado. O depósito está aberto.');
          } else { msg('❌ Código incorreto. O número está gravado no mostrador remontado.'); el.value = ''; el.focus(); }
        };
        document.getElementById('portaOk').addEventListener('click', tenta);
        document.getElementById('portaVoltar').addEventListener('click', () => { UIPanel.hide('puzzle-panel'); msg('Você recua da porta.'); });
        document.getElementById('portaInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') tenta(); });
      }, 50);
      msg('A porta blindada pede um código de 3 dígitos.');
    }

    // ============ PUZZLE 3: SOKOBAN (empurrar engradados até as marcas) ============
    // Sokoban de verdade: um operário empurra (nunca puxa) os engradados.
    // TRÊS engradados ▩ devem cobrir as TRÊS marcas ✕, numa sala 6x7 murada.
    // Paredes internas (2,3) e (3,3) partem a sala em duas zonas ligadas só pela
    // fileira de cima e pela marca central — obriga a rodear, planejar a ordem e
    // o lado de cada empurrão. Solução verificada à mão; Reiniciar recupera becos.
    const SOKO_ROWS = 6, SOKO_COLS = 7;
    const SOKO_INNER_WALLS = ['2,3', '3,3'];
    const SOKO_WALLS = (() => {
      const w = new Set(SOKO_INNER_WALLS);
      for (let c = 0; c < SOKO_COLS; c++) { w.add('0,' + c); w.add((SOKO_ROWS - 1) + ',' + c); }
      for (let r = 0; r < SOKO_ROWS; r++) { w.add(r + ',0'); w.add(r + ',' + (SOKO_COLS - 1)); }
      return w;
    })();
    const SOKO_TARGETS = ['1,1', '1,5', '4,3'];
    const SOKO_INIT = { player: { r: 4, c: 5 }, boxes: [{ r: 2, c: 1 }, { r: 2, c: 5 }, { r: 4, c: 2 }] };
    let sokoPlayer, sokoBoxes, sokoMoves = 0;
    const sokoKey = (r, c) => r + ',' + c;
    const sokoInside = (r, c) => r >= 0 && r < SOKO_ROWS && c >= 0 && c < SOKO_COLS;
    function sokoReset() {
      sokoPlayer = { r: SOKO_INIT.player.r, c: SOKO_INIT.player.c };
      sokoBoxes = SOKO_INIT.boxes.map(b => ({ r: b.r, c: b.c }));
      sokoMoves = 0;
    }
    function sokoRender() {
      let g = '<div style="display:grid; grid-template-columns:repeat(' + SOKO_COLS + ',38px); gap:2px; justify-content:center; margin:0 auto 10px; width:max-content; background:#4a3a22; padding:3px; border-radius:4px;">';
      for (let r = 0; r < SOKO_ROWS; r++) for (let c = 0; c < SOKO_COLS; c++) {
        const key = sokoKey(r, c);
        const isWall = SOKO_WALLS.has(key);
        const isTarget = SOKO_TARGETS.includes(key);
        const isBox = sokoBoxes.some(b => b.r === r && b.c === c);
        const isPlayer = sokoPlayer.r === r && sokoPlayer.c === c;
        let bg = '#15110b', content = '', color = '#e6d6b8';
        if (isWall) { bg = '#3a2a18'; content = '█'; color = '#5a4126'; }
        else if (isTarget) { bg = '#221108'; content = '✕'; color = '#d4643a'; }
        if (isBox) { bg = isTarget ? '#1a3a30' : '#5a4126'; content = '▩'; color = isTarget ? '#4fc7a8' : '#e6d6b8'; }
        if (isPlayer) { content = '◉'; color = '#4fc7a8'; bg = isTarget ? '#221108' : '#1c2a24'; }
        g += '<div style="width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:' + bg + ';border:1px solid #4a3a22;font-size:18px;color:' + color + ';">' + content + '</div>';
      }
      g += '</div>';
      return g;
    }
    function sokoRefresh() {
      const grid = document.getElementById('sokoGrid'); if (grid) grid.innerHTML = sokoRender();
      const mv = document.getElementById('sokoMoves'); if (mv) mv.textContent = 'Movimentos: ' + sokoMoves;
    }
    function sokoMove(dr, dc) {
      if (state.get('sokobanOk')) return;
      const nr = sokoPlayer.r + dr, nc = sokoPlayer.c + dc;
      if (!sokoInside(nr, nc) || SOKO_WALLS.has(sokoKey(nr, nc))) return;
      const boxIdx = sokoBoxes.findIndex(b => b.r === nr && b.c === nc);
      if (boxIdx >= 0) {
        // Só empurra: a célula além do engradado precisa estar livre
        const br = nr + dr, bc = nc + dc;
        if (!sokoInside(br, bc) || SOKO_WALLS.has(sokoKey(br, bc)) || sokoBoxes.some(b => b.r === br && b.c === bc)) return;
        sokoBoxes[boxIdx] = { r: br, c: bc };
      }
      sokoPlayer = { r: nr, c: nc };
      sokoMoves++;
      sokoRefresh();
      if (SOKO_TARGETS.every(t => sokoBoxes.some(b => sokoKey(b.r, b.c) === t))) {
        state.set('sokobanOk', true);
        document.removeEventListener('keydown', sokoKeydown);
        setTimeout(() => { UIPanel.hide('puzzle-panel'); msg('✅ Os dois engradados assentam sobre as marcas "✕" com um baque surdo. As placas afundam e a escotilha de saída destrava!'); }, 450);
      }
    }
    function sokoKeydown(e) {
      let dr = 0, dc = 0;
      const k = e.key;
      if (k === 'ArrowUp' || k === 'w' || k === 'W') dr = -1;
      else if (k === 'ArrowDown' || k === 's' || k === 'S') dr = 1;
      else if (k === 'ArrowLeft' || k === 'a' || k === 'A') dc = -1;
      else if (k === 'ArrowRight' || k === 'd' || k === 'D') dc = 1;
      else return;
      e.preventDefault();
      sokoMove(dr, dc);
    }
    function sokoClose() {
      document.removeEventListener('keydown', sokoKeydown);
      UIPanel.hide('puzzle-panel');
    }
    function abrirSokoban() {
      sokoReset();
      const btn = (id, t) => '<button id="' + id + '" style="padding:10px 16px; background:#1c1710; border:1px solid #4a3a22; color:#e6d6b8; font-family:monospace; font-size:1.1rem; cursor:pointer; border-radius:4px;">' + t + '</button>';
      const html = `
        <p style="color:${UITokens.get('colorText')}; margin-bottom:6px;">📦 Empurre os engradados</p>
        <p style="color:${UITokens.get('colorTextMuted')}; font-size:0.8rem; margin-bottom:4px;">Você (<span style="color:#4fc7a8;">◉</span>) só consegue <b>empurrar</b> — nunca puxar. Leve os três engradados (▩) até as marcas (✕). Planeje a ordem: um engradado num canto errado trava o caminho.</p>
        <p id="sokoMoves" style="color:${UITokens.get('colorTextMuted')}; font-size:0.75rem; margin-bottom:10px;">Movimentos: 0</p>
        <div id="sokoGrid">${sokoRender()}</div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
          ${btn('sUp', '▲')}
          <div style="display:flex; gap:6px;">${btn('sLeft', '◀')}${btn('sDown', '▼')}${btn('sRight', '▶')}</div>
        </div>
        <div style="display:flex; gap:10px; justify-content:center; margin-top:14px;">
          <button id="sReset" style="padding:6px 16px; background:#1c1710; border:1px solid #d4643a; color:#d4643a; font-family:monospace; cursor:pointer; border-radius:4px;">Reiniciar</button>
          <button id="sVoltar" style="padding:6px 16px; background:#1c1710; border:1px solid #4a3a22; color:#e6d6b8; font-family:monospace; cursor:pointer; border-radius:4px;">Voltar</button>
        </div>`;
      UIPanel.setContent('puzzle-panel', html); UIPanel.show('puzzle-panel');
      setTimeout(() => {
        document.getElementById('sUp').addEventListener('click', () => sokoMove(-1, 0));
        document.getElementById('sDown').addEventListener('click', () => sokoMove(1, 0));
        document.getElementById('sLeft').addEventListener('click', () => sokoMove(0, -1));
        document.getElementById('sRight').addEventListener('click', () => sokoMove(0, 1));
        document.getElementById('sReset').addEventListener('click', () => { sokoReset(); sokoRefresh(); msg('Engradados de volta ao lugar. Lembre-se: você só empurra.'); });
        document.getElementById('sVoltar').addEventListener('click', () => { sokoClose(); msg('Você deixa os engradados.'); });
        document.addEventListener('keydown', sokoKeydown);
      }, 50);
      msg('Engradados pesados sobre o piso do depósito. Use as setas (ou ◀▲▼▶) para se mover e empurrá-los. Você nunca puxa — planeje de que lado se posicionar.');
    }

    // ============ ESCAPE ============
    function escapar() {
      timer.stop();
      const tempoSeg = Math.floor(timer.getElapsed() / 1000);
      if (EscapeAPI.isLoggedIn()) {
        EscapeAPI.registrarResultado('Sala 15 — A Oficina do Relojoeiro', 'win', tempoSeg);
      }
      UISuccessOverlay.show('success-overlay', {
        title: '🕰️ VOCÊ DECIFROU O RELOJOEIRO',
        subtitle: 'A escotilha se abre para o beco atrás da oficina. No banco de trabalho, o Sr. Ventura deixou um bilhete: "Quem entende de tempo, sempre encontra a saída."',
        time: timer.format(),
        links: [{ text: '← Voltar ao Lobby', href: '../index.html' }]
      });
    }

    // ============ INPUT ============
    input.onClick((x, y) => {
      if (EscapeTransitions.isTransitioning()) return;
      const obj = input.hitTest(x, y, getObjetos());
      if (obj) interagir(obj);
    });

    // ============ RENDER ============
    game.onRender((ctx, dt, size) => {
      const amb = state.getAmbiente();
      if (amb === 'oficina') renderOficina(ctx, state);
      else renderDeposito(ctx, state);

      const hovered = input.getHoveredObject(getObjetos());
      for (const obj of getObjetos()) {
        if (hovered && hovered.id === obj.id) {
          ctx.save();
          ctx.strokeStyle = UITokens.get('glowColor');
          ctx.lineWidth = 2;
          ctx.shadowColor = UITokens.get('glowColor');
          ctx.shadowBlur = 12;
          ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
          ctx.restore();
        }
      }
      motes.update(dt); motes.render(ctx);
      EscapeTransitions.render(ctx, size.width, size.height);
    });

    game.start();
    UIInventory.render('inventory', inv.getAll());
  </script>
</body>
</html>
