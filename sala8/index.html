            state.set('puzzleFinal', true); UIPanel.hide('puzzle-panel'); escapar();
          } else { msg('âŒ O altar treme. HierÃ³glifos errados! A sequÃªncia do mito da criaÃ§Ã£o exige reflexÃ£o: combine os 3 fragmentos.'); }
