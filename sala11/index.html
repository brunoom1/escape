<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sala 11 — O Grande Hotel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Georgia', serif; background: #0f0708; color: #e2cdb4; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 12px; }
    #tabs { width: 100%; max-width: 910px; }
    #game-wrapper { position: relative; width: 900px; max-width: 100%; }
    canvas { width: 100%; height: auto; display: block; border-radius: 8px; border: 1px solid #4a2a2e; cursor: crosshair; }
    #puzzle-panel, #success-overlay { position: absolute; inset: 0; }
    #message, #inventory { width: 100%; max-width: 910px; }
  </style>
</head>
<body>
  <div id="tabs"></div>
  <div id="game-wrapper">
    <canvas id="gameCanvas" width="900" height="600"></canvas>
    <div id="puzzle-panel"></div>
    <div id="success-overlay"></div>
  </div>
  <div id="message"></div>
  <div id="inventory"></div>

  <script src="../lib/api.js"></script>
  <script src="../lib/engine.js"></script>
  <script src="../lib/input.js"></script>
  <script src="../lib/state.js"></script>
  <script src="../lib/inventory.js"></script>
  <script src="../lib/transitions.js"></script>
  <script src="../lib/timer.js"></script>
  <script src="../lib/particles.js"></script>
  <script src="../ui-kit/tokens.js"></script>
  <script src="../ui-kit/themes/hotel.js"></script>
  <script src="../ui-kit/components/inventory.js"></script>
  <script src="../ui-kit/components/tabs.js"></script>
  <script src="../ui-kit/components/message-box.js"></script>
  <script src="../ui-kit/components/panel.js"></script>
  <script src="../ui-kit/components/success-overlay.js"></script>
  <script src="render.js"></script>

  <script>
    UITokens.apply(ThemeHotel);
    const game = EscapeEngine.create({ canvasId: 'gameCanvas', width: 900, height: 600, backgroundColor: '#0f0708' });
    const input = EscapeInput.create(game.getCanvas(), 900, 600);
    const state = EscapeState.create({ ambiente: 'recepcao', flags: {
      livro: false, chaveColetada: false, quadro: false, relogio: false, sino: false,
      cama: false, espelho: false, cofreAberto: false, telefone: false, poraoLiberado: false,
      caldeira: false, energiaPorao: false
    }});
    const inv = EscapeInventory.create();
    const timer = EscapeTimer.create();

    UITabs.create('tabs', [
      { id: 'recepcao', label: 'Recepção', locked: false },
      { id: 'suite', label: 'Suíte 237', locked: true },
      { id: 'porao', label: 'Porão', locked: true }
    ], (tabId) => {
      if (tabId === 'suite' && !state.get('chaveColetada')) {
        msg('A escadaria está bloqueada por um portão. Preciso da chave da suíte.');
        UITabs.setActive('tabs', state.getAmbiente()); return;
      }
      if (tabId === 'porao' && !state.get('poraoLiberado')) {
        msg('O alçapão do porão está trancado. Algo no cofre pode ajudar.');
        UITabs.setActive('tabs', state.getAmbiente()); return;
      }
      EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente(tabId); msgAmb(tabId); });
    });

    UIMessageBox.create('message');
    UIInventory.create('inventory');
    UIPanel.create('puzzle-panel');
    UISuccessOverlay.create('success-overlay');
    const dust = EscapeParticles.create({ x: 0, y: 0, width: 900, height: 600, color: 'rgba(212,169,90,0.12)', count: 18, speedX: [-0.4,0.4], speedY: [0.1,0.7], size: [0.8,1.8], life: [6,12] });

    function msg(t) { UIMessageBox.show('message', t); }
    function msgAmb(a) {
      if (a === 'recepcao') msg('O saguão do Grande Hotel, abandonado há décadas. Poeira cobre o balcão de mogno e o lustre range ao vento.');
      else if (a === 'suite') msg('Suíte 237. O ar é pesado. A cama continua feita, como se o hóspede fosse voltar a qualquer momento.');
      else msg('O porão. Escuro, úmido, iluminado apenas pela luz de emergência. A saída de serviço está aqui — mas sem energia.');
    }
    msg('Você passou a noite no lendário Grande Hotel e acordou trancado. Todas as portas estão seladas. A única saída é pelo porão — mas o caminho passa pela misteriosa Suíte 237.');
    if (!EscapeAPI.isLoggedIn()) {
      setTimeout(() => msg('⚠️ Você não está logado. Seu tempo não será registrado no ranking. Faça login no lobby para participar!'), 3000);
    }
    timer.start();

    // ============ OBJETOS (posições = render.js) ============
    const objetosRecepcao = [
      { id: 'quadro', x: 60, y: 90, w: 150, h: 190, label: 'Quadro do fundador' },
      { id: 'relogio', x: 420, y: 90, w: 70, h: 120, label: 'Relógio de parede' },
      { id: 'livro', x: 360, y: 356, w: 90, h: 56, label: 'Livro de registro' },
      { id: 'sino', x: 486, y: 320, w: 30, h: 30, label: 'Sino de recepção' },
      { id: 'escaninho', x: 600, y: 90, w: 200, h: 160, label: 'Escaninho de chaves' },
      { id: 'escada', x: 810, y: 120, w: 70, h: 320, label: 'Escadaria → Suítes' },
    ];
    const objetosSuite = [
      { id: 'porta', x: 30, y: 120, w: 70, h: 300, label: 'Porta → Recepção' },
      { id: 'cama', x: 60, y: 320, w: 260, h: 140, label: 'Cama' },
      { id: 'cofre', x: 400, y: 330, w: 110, h: 100, label: 'Cofre' },
      { id: 'espelho', x: 600, y: 100, w: 120, h: 200, label: 'Espelho' },
      { id: 'telefone', x: 760, y: 350, w: 90, h: 70, label: 'Telefone' },
      { id: 'alcapao', x: 150, y: 470, w: 120, h: 80, label: 'Alçapão → Porão' },
    ];
    const objetosPorao = [
      { id: 'caldeira', x: 60, y: 180, w: 160, h: 240, label: 'Caldeira' },
      { id: 'painel', x: 400, y: 160, w: 200, h: 180, label: 'Painel de disjuntores' },
      { id: 'prateleira', x: 700, y: 150, w: 150, h: 200, label: 'Prateleira' },
      { id: 'saida', x: 400, y: 440, w: 120, h: 140, label: 'Porta de saída' },
      { id: 'escadaSobe', x: 30, y: 470, w: 100, h: 60, label: '↑ Suíte' },
    ];
    function getObjetos() {
      const a = state.getAmbiente();
      if (a === 'recepcao') return objetosRecepcao;
      if (a === 'suite') return objetosSuite;
      return objetosPorao;
    }

    // ============ INTERAÇÕES ============
    function interagir(obj) {
      if (EscapeTransitions.isTransitioning()) return;
      const id = obj.id;

      // -- RECEPÇÃO --
      if (id === 'livro') {
        if (!state.get('livro')) {
          state.set('livro', true);
          inv.add('registro', '📖', 'Registro: último hóspede na Suíte 237');
          msg('O livro de registro. A última entrada, em tinta desbotada: "Suíte 237 — hóspede permanente. Nunca fez check-out." O número do quarto está circulado.');
        } else { msg('Registro: o último hóspede ficou na Suíte 237.'); }
      } else if (id === 'escaninho') {
        if (!state.get('chaveColetada')) {
          state.set('chaveColetada', true);
          inv.add('chave237', '🗝️', 'Chave da Suíte 237');
          UITabs.unlock('tabs', 'suite');
          msg('No escaninho de número 237, a única chave que restou. A escadaria para as suítes agora está acessível.');
        } else { msg('O escaninho 237 está vazio; a chave já é sua.'); }
      } else if (id === 'quadro') {
        if (!state.get('quadro')) {
          state.set('quadro', true);
          msg('O retrato do fundador do hotel, olhar severo. Uma placa: "Que nenhum hóspede jamais parta insatisfeito." Um arrepio percorre sua espinha.');
        } else { msg('O fundador observa o saguão em silêncio.'); }
      } else if (id === 'relogio') {
        if (!state.get('relogio')) {
          state.set('relogio', true);
          msg('O relógio de parede parou às 3h07. Dizem que foi a hora exata em que o hóspede da 237 desapareceu.');
        } else { msg('O relógio parado marca 3h07.'); }
      } else if (id === 'sino') {
        msg('Você toca o sino da recepção. O "ding" ecoa pelo saguão vazio... e ninguém atende. Nunca atende.');
      } else if (id === 'escada') {
        if (state.get('chaveColetada')) {
          EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente('suite'); UITabs.setActive('tabs', 'suite'); msgAmb('suite'); });
        } else { msg('Um portão de ferro bloqueia a escadaria. Preciso da chave da suíte.'); }
      }

      // -- SUÍTE 237 --
      else if (id === 'espelho') {
        if (!state.get('espelho')) {
          state.set('espelho', true);
          inv.add('espelho', '💄', 'Espelho: número escrito ao contrário, em batom');
          msg('No espelho, escrito às pressas com batom vermelho, um número — mas está invertido, como se escrito de dentro do próprio reflexo. Para lê-lo de verdade, pense no que o espelho faz com os números.');
        } else { msg('O número no espelho está invertido pelo reflexo.'); }
      } else if (id === 'cofre') {
        abrirCofre();
      } else if (id === 'cama') {
        if (!state.get('cama')) {
          state.set('cama', true);
          msg('Sob o travesseiro, um bilhete amassado: "Se você está lendo isto, eu já parti. A saída é embaixo. O número que me trancou também me liberta."');
        } else { msg('Bilhete: "O número que me trancou também me liberta."'); }
      } else if (id === 'telefone') {
        if (!state.get('telefone')) {
          state.set('telefone', true);
          msg('Você levanta o fone. Do outro lado, apenas uma voz distante repete: "Trois... zéro... sept..." — e desliga. Estranho. Nada a ver com o cofre.');
        } else { msg('O telefone só repete "trois, zéro, sept".'); }
      } else if (id === 'alcapao') {
        if (state.get('poraoLiberado')) {
          EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente('porao'); UITabs.setActive('tabs', 'porao'); msgAmb('porao'); });
        } else { msg('O alçapão está trancado com cadeado. A chave mestra deve estar guardada em algum lugar seguro.'); }
      } else if (id === 'porta') {
        EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente('recepcao'); UITabs.setActive('tabs', 'recepcao'); msg('De volta ao saguão.'); });
      }

      // -- PORÃO --
      else if (id === 'caldeira') {
        if (!state.get('caldeira')) {
          state.set('caldeira', true);
          inv.add('regra', '🔥', 'Placa: religar da menor para a maior carga');
          msg('Na lateral da caldeira, uma placa de manutenção: "PROCEDIMENTO DE RELIGAÇÃO — sempre acionar os disjuntores da MENOR para a MAIOR carga, para não sobrecarregar o sistema."');
        } else { msg('Placa: "religar da menor para a maior carga".'); }
      } else if (id === 'painel') {
        abrirPainel();
      } else if (id === 'prateleira') {
        if (!state.get('prateleira')) {
          state.set('prateleira', true);
          msg('Prateleiras empoeiradas do almoxarifado. Toalhas mofadas, latas de tinta secas. Nada de útil.');
        } else { msg('Só velharia mofada aqui.'); }
      } else if (id === 'saida') {
        if (state.get('energiaPorao')) {
          escapar();
        } else {
          msg('A porta de saída está travada por uma tranca elétrica. Sem energia, não abre. Preciso religar os disjuntores.');
        }
      } else if (id === 'escadaSobe') {
        EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente('suite'); UITabs.setActive('tabs', 'suite'); msg('De volta à Suíte 237.'); });
      }

      UIInventory.render('inventory', inv.getAll());
    }

    // ============ PUZZLE: COFRE (código 732 = 237 refletido) ============
    function abrirCofre() {
      if (state.get('cofreAberto')) { msg('O cofre já está aberto.'); return; }
      const html = `
        <p style="color:${UITokens.get('colorText')}; margin-bottom:12px;">🔐 Cofre da Suíte — 3 dígitos</p>
        <input type="text" id="cofreInput" maxlength="3" placeholder="_ _ _"
          style="background:#160c0e; border:1px solid #4a2a2e; color:#d4a95a; font-family:'Georgia',serif; font-size:1.5rem; padding:10px; width:110px; text-align:center; border-radius:4px;">
        <div style="margin-top:16px; display:flex; gap:10px; justify-content:center;">
          <button id="btnCofre" style="padding:8px 22px; background:#1e1012; border:1px solid #d4a95a; color:#d4a95a; font-family:'Georgia',serif; cursor:pointer; border-radius:4px;">Abrir</button>
          <button id="btnCofreVoltar" style="padding:8px 20px; background:#1e1012; border:1px solid #4a2a2e; color:#e2cdb4; font-family:'Georgia',serif; cursor:pointer; border-radius:4px;">Voltar</button>
        </div>`;
      UIPanel.setContent('puzzle-panel', html); UIPanel.show('puzzle-panel');
      setTimeout(() => {
        document.getElementById('cofreInput').focus();
        document.getElementById('btnCofre').addEventListener('click', tentarCofre);
        document.getElementById('btnCofreVoltar').addEventListener('click', () => { UIPanel.hide('puzzle-panel'); msg('Você fecha o cofre.'); });
        document.getElementById('cofreInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') tentarCofre(); });
      }, 50);
      msg('Um cofre embutido na parede. Teclado de 3 dígitos.');
    }
    function tentarCofre() {
      const el = document.getElementById('cofreInput');
      if (!el) return;
      if (el.value.trim() === '732') {
        state.set('cofreAberto', true);
        state.set('poraoLiberado', true);
        UITabs.unlock('tabs', 'porao');
        UIPanel.hide('puzzle-panel');
        inv.add('chaveMestra', '🔑', 'Chave mestra do porão');
        UIInventory.render('inventory', inv.getAll());
        msg('✅ O cofre abre! Dentro: a chave mestra do porão e nada mais. O alçapão agora pode ser aberto.');
      } else {
        msg('❌ Combinação incorreta. O número da suíte não é lido diretamente — lembre-se do que o espelho faz.');
        el.value = ''; el.focus();
      }
    }

    // ============ PUZZLE FINAL: DISJUNTORES (5A → 15A → 30A) ============
    let seqDisj = [];
    function abrirPainel() {
      if (state.get('energiaPorao')) { msg('A energia já foi restaurada.'); return; }
      seqDisj = [];
      const html = `
        <p style="color:${UITokens.get('colorText')}; margin-bottom:10px;">⚡ Painel de Disjuntores</p>
        <p style="color:${UITokens.get('colorTextMuted')}; font-size:0.85rem; margin-bottom:12px;">Acione os 3 disjuntores na ordem correta de carga.</p>
        <div id="disjDisplay" style="font-size:1.2rem; color:${UITokens.get('colorAccent')}; min-height:26px; margin-bottom:12px;">—</div>
        <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
          <button class="disj" data-a="30" style="padding:12px 18px; background:#12140f; border:1px solid #4a2a2e; color:#e2cdb4; font-family:'Georgia',serif; cursor:pointer; border-radius:4px;">30A</button>
          <button class="disj" data-a="5" style="padding:12px 18px; background:#12140f; border:1px solid #4a2a2e; color:#e2cdb4; font-family:'Georgia',serif; cursor:pointer; border-radius:4px;">5A</button>
          <button class="disj" data-a="15" style="padding:12px 18px; background:#12140f; border:1px solid #4a2a2e; color:#e2cdb4; font-family:'Georgia',serif; cursor:pointer; border-radius:4px;">15A</button>
        </div>
        <div style="display:flex; gap:10px; justify-content:center; margin-top:16px;">
          <button id="btnDisjReset" style="padding:8px 18px; background:#1e1012; border:1px solid #c0473f; color:#c0473f; font-family:'Georgia',serif; cursor:pointer; border-radius:4px;">Limpar</button>
          <button id="btnDisjVoltar" style="padding:8px 18px; background:#1e1012; border:1px solid #4a2a2e; color:#e2cdb4; font-family:'Georgia',serif; cursor:pointer; border-radius:4px;">Voltar</button>
        </div>`;
      UIPanel.setContent('puzzle-panel', html); UIPanel.show('puzzle-panel');
      setTimeout(() => {
        document.querySelectorAll('.disj').forEach(b => b.addEventListener('click', () => {
          const a = parseInt(b.dataset.a);
          if (seqDisj.includes(a)) return;
          seqDisj.push(a);
          document.getElementById('disjDisplay').textContent = seqDisj.map(x => x + 'A').join(' → ');
          if (seqDisj.length === 3) verificarDisj();
        }));
        document.getElementById('btnDisjReset').addEventListener('click', () => { seqDisj = []; document.getElementById('disjDisplay').textContent = '—'; });
        document.getElementById('btnDisjVoltar').addEventListener('click', () => { UIPanel.hide('puzzle-panel'); msg('Você se afasta do painel.'); });
      }, 50);
      msg('Painel de disjuntores. Três chaves com cargas diferentes: 5A, 15A e 30A.');
    }
    function verificarDisj() {
      if (seqDisj[0] === 5 && seqDisj[1] === 15 && seqDisj[2] === 30) {
        state.set('energiaPorao', true);
        UIPanel.hide('puzzle-panel');
        msg('✅ As luzes se acendem com um zumbido! A tranca elétrica da porta de saída se solta. Você pode escapar.');
      } else {
        msg('❌ Faísca! A ordem sobrecarregou o sistema e os disjuntores desarmaram. Da menor para a maior carga.');
        seqDisj = [];
        const d = document.getElementById('disjDisplay');
        if (d) d.textContent = '—';
      }
    }

    // ============ ESCAPE ============
    function escapar() {
      timer.stop();
      const tempoSeg = Math.floor(timer.getElapsed() / 1000);
      if (EscapeAPI.isLoggedIn()) {
        EscapeAPI.registrarResultado('Sala 11 — O Grande Hotel', 'win', tempoSeg);
      }
      UISuccessOverlay.show('success-overlay', {
        title: '🏨 VOCÊ DEIXOU O HOTEL',
        subtitle: 'A porta de serviço se abre para a rua fria da madrugada. Você olha para trás uma última vez — e jura ver uma luz acesa na janela da Suíte 237.',
        time: timer.format(),
        links: [{ text: '← Voltar ao Lobby', href: '../index.html' }]
      });
    }

    // ============ INPUT ============
    input.onClick((x, y) => {
      if (EscapeTransitions.isTransitioning()) return;
      const obj = input.hitTest(x, y, getObjetos());
      if (obj) interagir(obj);
    });

    // ============ RENDER ============
    game.onRender((ctx, dt, size) => {
      const amb = state.getAmbiente();
      if (amb === 'recepcao') renderRecepcao(ctx, state);
      else if (amb === 'suite') renderSuite(ctx, state);
      else renderPorao(ctx, state);

      const hovered = input.getHoveredObject(getObjetos());
      for (const obj of getObjetos()) {
        if (hovered && hovered.id === obj.id) {
          ctx.save();
          ctx.strokeStyle = UITokens.get('glowColor');
          ctx.lineWidth = 2;
          ctx.shadowColor = UITokens.get('glowColor');
          ctx.shadowBlur = 12;
          ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
          ctx.restore();
        }
      }
      dust.update(dt); dust.render(ctx);
      EscapeTransitions.render(ctx, size.width, size.height);
    });

    game.start();
    UIInventory.render('inventory', inv.getAll());
  </script>
</body>
</html>
