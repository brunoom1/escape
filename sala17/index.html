<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sala 17 — O Sanatório Abandonado</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #0a0e0c;
      color: #b8d4c8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 16px;
      gap: 12px;
    }
    #tabs { width: 100%; max-width: 910px; }
    #game-wrapper {
      position: relative;
      width: 900px;
      max-width: 100%;
    }
    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
      border: 1px solid #1a3a2a;
      cursor: crosshair;
    }
    #puzzle-panel, #success-overlay { position: absolute; inset: 0; }
    #message { width: 100%; max-width: 910px; }
    #inventory { width: 100%; max-width: 910px; }
  </style>
</head>
<body>
  <div id="tabs"></div>
  <div id="game-wrapper">
    <canvas id="gameCanvas" width="900" height="600"></canvas>
    <div id="puzzle-panel"></div>
    <div id="success-overlay"></div>
  </div>
  <div id="message"></div>
  <div id="inventory"></div>

  <!-- Lib -->
  <script src="../lib/api.js"></script>
  <script src="../lib/engine.js"></script>
  <script src="../lib/input.js"></script>
  <script src="../lib/state.js"></script>
  <script src="../lib/inventory.js"></script>
  <script src="../lib/transitions.js"></script>
  <script src="../lib/timer.js"></script>
  <script src="../lib/events.js"></script>
  <script src="../lib/particles.js"></script>

  <!-- UI Kit -->
  <script src="../ui-kit/tokens.js"></script>
  <script src="../ui-kit/themes/asylum.js"></script>
  <script src="../ui-kit/components/inventory.js"></script>
  <script src="../ui-kit/components/tabs.js"></script>
  <script src="../ui-kit/components/message-box.js"></script>
  <script src="../ui-kit/components/panel.js"></script>
  <script src="../ui-kit/components/success-overlay.js"></script>

  <!-- Render cinematográfico -->
  <script src="render.js"></script>

  <script>
    // ============ SETUP ============
    UITokens.apply(ThemeAsylum);

    const game = EscapeEngine.create({ canvasId: 'gameCanvas', width: 900, height: 600, backgroundColor: '#0a0e0c' });
    const input = EscapeInput.create(game.getCanvas(), 900, 600);
    const state = EscapeState.create({ ambiente: 'recepcao', flags: {
      quadroVisto: false, arquivoVisto: false, gavetaAberta: false,
      chaveGerador: false, poraoVisitado: false, dieselColetado: false,
      geradorLigado: false, diretoriaAcessivel: false, mesaVista: false,
      bilheteVisto: false, cofreAberto: false, portaVista: false,
      escapou: false
    }});
    const inv = EscapeInventory.create();
    const timer = EscapeTimer.create();
    const bus = EscapeEvents.create();

    // UI Components
    UITabs.create('tabs', [
      { id: 'recepcao', label: 'Recepção', locked: false },
      { id: 'porao', label: 'Porão', locked: true }
    ], (tabId) => {
      if (tabId === 'porao' && !state.get('chaveGerador')) {
        msg('A porta do porão está trancada. Precisa da chave do gerador.');
        UITabs.setActive('tabs', 'recepcao');
        return;
      }
      EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => {
        state.setAmbiente(tabId);
        if (tabId === 'porao') msg('O porão. Escuro, abafado. Canos gotejam. O gerador está silencioso. Uma porta entreaberta leva à antiga diretoria.');
        else msg('De volta à recepção do sanatório.');
      });
    });

    UIMessageBox.create('message');
    UIInventory.create('inventory');
    UIPanel.create('puzzle-panel');
    UISuccessOverlay.create('success-overlay');

    const dust = EscapeParticles.create({
      x: 0, y: 0, width: 900, height: 600,
      color: 'rgba(91, 191, 138, 0.15)',
      count: 20, speedX: [-2, 2], speedY: [-3, -1], size: [1, 2], life: [5, 10]
    });

    function msg(text) { UIMessageBox.show('message', text); }
    msg('Sanatório Santa Clara. O silêncio é pesado. Cheiro de mofo e desinfetante velho. A porta de ferro rangeu atrás de você — trancada.');
    if (!EscapeAPI.isLoggedIn()) {
      setTimeout(() => msg('⚠️ Você não está logado. Seu tempo não será registrado no ranking. Faça login no lobby para participar!'), 3000);
    }
    timer.start();

    // ============ OBJETOS ============
    const objetosRecepcao = [
      { id: 'portaPrincipal', x: 810, y: 100, w: 75, h: 340, label: 'Porta principal' },
      { id: 'quadroMoretti', x: 340, y: 40, w: 220, h: 170, label: 'Quadro Dr. Moretti' },
      { id: 'arquivoMorto', x: 90, y: 260, w: 120, h: 160, label: 'Arquivo morto' },
      { id: 'gaveta', x: 230, y: 370, w: 95, h: 55, label: 'Gaveta da recepção' },
      { id: 'portaPorão', x: 40, y: 390, w: 60, h: 130, label: 'Porta → Porão' },
    ];

    function getObjetosPorao() {
      const objs = [];
      objs.push({ id: 'gerador', x: 130, y: 250, w: 160, h: 140, label: 'Gerador' });
      if (!state.get('dieselColetado')) {
        objs.push({ id: 'caixotes', x: 340, y: 310, w: 85, h: 110, label: 'Caixotes' });
      }
      objs.push({ id: 'diretoria', x: 680, y: 250, w: 60, h: 140, label: 'Porta → Diretoria' });
      if (state.get('diretoriaAcessivel')) {
        objs.push({ id: 'mesaDiretoria', x: 520, y: 330, w: 140, h: 90, label: 'Mesa da diretoria' });
        objs.push({ id: 'cofre', x: 580, y: 100, w: 100, h: 90, label: 'Cofre' });
      }
      objs.push({ id: 'voltar', x: 735, y: 500, w: 130, h: 55, label: 'Voltar' });
      return objs;
    }

    function getObjetos() {
      return state.getAmbiente() === 'recepcao' ? objetosRecepcao : getObjetosPorao();
    }

    // ============ INTERAÇÕES ============
    function interagir(obj) {
      if (EscapeTransitions.isTransitioning()) return;
      const id = obj.id;

      // -- RECEPÇÃO --
      if (id === 'portaPrincipal') {
        if (state.get('cofreAberto')) {
          escapar();
        } else {
          if (!state.get('portaVista')) {
            state.set('portaVista', true);
            msg('Porta de ferro maciço, enferrujada. Uma fechadura eletrônica desativada ao lado. Apenas a chave mestra pode abrir manualmente.');
          } else {
            msg('Porta trancada. Precisa da chave mestra para abrir.');
          }
        }
      } else if (id === 'quadroMoretti') {
        if (!state.get('quadroVisto')) {
          state.set('quadroVisto', true);
          inv.add('ano1947', '🖼️', 'Placa: Dr. Moretti — Fundador — 1947');
          msg('Foto empoeirada em moldura dourada. Dr. Henrique Moretti, olhar severo. Placa: "Dr. Henrique Moretti — Fundador — 1947". Abaixo, gravado: "A mente é o maior dos labirintos."');
        } else {
          msg('Dr. Moretti, 1947. "A mente é o maior dos labirintos."');
        }
      } else if (id === 'arquivoMorto') {
        if (!state.get('arquivoVisto')) {
          state.set('arquivoVisto', true);
          inv.add('relatorio', '📄', 'Relatório: código = ano de fundação');
          msg('Pastas amareladas. "INCIDENTE 1994 — CONFIDENCIAL". Relatório: "Diretor Moretti mantinha tudo trancado no cofre da diretoria. Usava código de 4 dígitos — o ano de fundação do sanatório."');
        } else {
          msg('Relatório: "Código do cofre = ano de fundação, 4 dígitos."');
        }
      } else if (id === 'gaveta') {
        if (!state.get('gavetaAberta')) {
          state.set('gavetaAberta', true);
          state.set('chaveGerador', true);
          inv.add('chaveGerador', '🔑', 'Chave do gerador');
          UITabs.unlock('tabs', 'porao');
          msg('Gaveta emperrada. Com um puxão forte, abre. Dentro: uma chave enferrujada com etiqueta "GERADOR — PORÃO".');
        } else {
          msg('Chave do gerador já coletada.');
        }
      } else if (id === 'portaPorão') {
        if (state.get('chaveGerador')) {
          EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => {
            state.setAmbiente('porao');
            UITabs.setActive('tabs', 'porao');
            msg('O porão. Escuro, abafado. Canos gotejam. O gerador está silencioso. Uma porta entreaberta leva à antiga diretoria.');
          });
        } else {
          msg('Porta para o porão. Trancada. A etiqueta na fechadura: "GERADOR".');
        }
      }

      // -- PORÃO --
      else if (id === 'gerador') {
        if (state.get('geradorLigado')) {
          msg('Gerador funcionando. Energia restaurada.');
        } else if (state.get('dieselColetado')) {
          state.set('geradorLigado', true);
          state.set('diretoriaAcessivel', true);
          msg('O gerador tosse, tosse... e ronca. As luzes do porão acendem. Um zumbido elétrico percorre o prédio. A diretoria agora está acessível.');
        } else {
          msg('Gerador a diesel modelo antigo. Tanque vazio. Precisa de combustível para funcionar.');
        }
      } else if (id === 'caixotes') {
        if (!state.get('dieselColetado')) {
          state.set('dieselColetado', true);
          inv.add('diesel', '⛽', 'Galão de diesel');
          msg('Caixotes empilhados. Atrás deles, um galão de diesel enferrujado. Ainda tem combustível!');
        } else {
          msg('Atrás dos caixotes só há poeira.');
        }
      } else if (id === 'diretoria') {
        if (state.get('geradorLigado')) {
          state.set('diretoriaAcessivel', true);
          msg('A porta da diretoria range ao abrir. A sala do Dr. Moretti está intacta, como se o tempo tivesse parado.');
        } else {
          msg('A porta da diretoria está trancada. Sem energia elétrica, o mecanismo não libera a fechadura.');
        }
      } else if (id === 'mesaDiretoria') {
        if (!state.get('mesaVista')) {
          state.set('mesaVista', true);
          inv.add('relogio', '🕰️', 'Relógio parado: 19:47');
          msg('Mesa de carvalho do Dr. Moretti. Papéis espalhados. Um relógio de parede parado marca 19:47. A gaveta lateral está entreaberta.');
        } else if (!state.get('bilheteVisto')) {
          state.set('bilheteVisto', true);
          inv.add('bilhete', '📝', '"Gire o código — o ano que tudo começou"');
          const podeAbrir = state.get('geradorLigado');
          if (podeAbrir) {
            msg('A gaveta destrava com o clique elétrico. Dentro: um bilhete amarelado — "O cofre guarda a chave mestra. Gire o código — o ano que tudo começou."');
          }
        } else {
          msg('Mesa do Dr. Moretti. Relógio: 19:47. Gaveta vazia.');
        }
      } else if (id === 'cofre') {
        abrirPainelCofre();
      } else if (id === 'voltar') {
        EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => {
          state.setAmbiente('recepcao');
          UITabs.setActive('tabs', 'recepcao');
          msg('De volta à recepção do sanatório.');
        });
      }

      UIInventory.render('inventory', inv.getAll());
    }

    // ============ PUZZLE DO COFRE ============
    let painelAberto = false;

    function abrirPainelCofre() {
      if (state.get('cofreAberto')) {
        msg('O cofre já está aberto. A chave mestra está dentro.');
        return;
      }
      painelAberto = true;
      const html = `
        <p style="color:${UITokens.get('colorText')}; margin-bottom:16px;">🔒 Cofre do Dr. Moretti — Código de 4 dígitos</p>
        <input type="text" id="codigoInput" maxlength="4" placeholder="_ _ _ _"
          style="background:#0a100e; border:1px solid #1a3a2a; color:#5bbf8a; font-family:'Courier New'; font-size:1.5rem; padding:10px; width:140px; text-align:center; border-radius:4px;">
        <div style="margin-top:16px; display:flex; gap:10px; justify-content:center;">
          <button id="btnTentar" style="padding:8px 20px; background:#0e1412; border:1px solid #1a3a2a; color:#b8d4c8; font-family:'Courier New'; cursor:pointer; border-radius:4px;">Tentar</button>
          <button id="btnVoltar" style="padding:8px 20px; background:#0e1412; border:1px solid #1a3a2a; color:#b8d4c8; font-family:'Courier New'; cursor:pointer; border-radius:4px;">Voltar</button>
        </div>
      `;
      UIPanel.setContent('puzzle-panel', html);
      UIPanel.show('puzzle-panel');
      setTimeout(() => {
        document.getElementById('codigoInput').focus();
        document.getElementById('btnTentar').addEventListener('click', tentarCodigo);
        document.getElementById('btnVoltar').addEventListener('click', fecharPainel);
        document.getElementById('codigoInput').addEventListener('keydown', (e) => {
          if (e.key === 'Enter') tentarCodigo();
        });
      }, 50);
      msg('Cofre antigo embutido na parede. Mostrador numérico de 4 dígitos. Gravado: "Moretti — Propriedade Pessoal".');
    }

    function tentarCodigo() {
      const input = document.getElementById('codigoInput');
      if (!input) return;
      const valor = input.value.trim();
      if (valor === '1947') {
        state.set('cofreAberto', true);
        painelAberto = false;
        UIPanel.hide('puzzle-panel');
        inv.add('chaveMestra', '🗝️', 'Chave mestra');
        UIInventory.render('inventory', inv.getAll());
        msg('✅ O cofre abre com um clique seco! Dentro: uma chave mestra de ferro. Agora você pode abrir a porta principal.');
      } else {
        msg('❌ Código incorreto. O mecanismo range, mas não cede.');
        input.value = '';
        input.focus();
      }
    }

    function fecharPainel() {
      painelAberto = false;
      UIPanel.hide('puzzle-panel');
      msg('Você se afasta do cofre.');
    }

    // ============ ESCAPE ============
    function escapar() {
      timer.stop();
      const tempoSeg = Math.floor(timer.getElapsed() / 1000);
      if (EscapeAPI.isLoggedIn()) {
        EscapeAPI.registrarResultado('Sala 17 — O Sanatório Abandonado', 'win', tempoSeg);
      }
      UISuccessOverlay.show('success-overlay', {
        title: '🏥 VOCÊ ESCAPOU!',
        subtitle: 'As provas dos experimentos de Santa Clara estão seguras. O documentário de Daniel Nunes vai expor a verdade.',
        time: timer.format(),
        links: [
          { text: '← Voltar ao Lobby', href: '../index.html' }
        ]
      });
    }

    // ============ INPUT ============
    input.onClick((x, y) => {
      if (painelAberto) return;
      if (EscapeTransitions.isTransitioning()) return;
      const obj = input.hitTest(x, y, getObjetos());
      if (obj) interagir(obj);
    });

    // ============ RENDER ============
    game.onRender((ctx, dt, size) => {
      const amb = state.getAmbiente();

      if (amb === 'recepcao') {
        renderRecepcao(ctx, state);
      } else {
        renderPorão(ctx, state);
      }

      const hovered = input.getHoveredObject(getObjetos());
      const objs = getObjetos();
      for (const obj of objs) {
        ctx.save();
        if (hovered && hovered.id === obj.id) {
          ctx.strokeStyle = UITokens.get('glowColor');
          ctx.lineWidth = 2;
          ctx.shadowColor = UITokens.get('glowColor');
          ctx.shadowBlur = 12;
          ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
        }
        ctx.restore();
      }

      dust.update(dt);
      dust.render(ctx);

      EscapeTransitions.render(ctx, size.width, size.height);
    });

    // ============ START ============
    game.start();
    UIInventory.render('inventory', inv.getAll());
  </script>
</body>
</html>
