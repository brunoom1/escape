<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sala 5 — O Submarino Afundado</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #0a1628;
      color: #b0d4e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 16px;
      gap: 12px;
    }
    #tabs { width: 100%; max-width: 910px; }
    #game-wrapper {
      position: relative;
      width: 900px;
      max-width: 100%;
    }
    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
      border: 1px solid #1a3a5a;
      cursor: crosshair;
    }
    #puzzle-panel, #success-overlay { position: absolute; inset: 0; }
    #message { width: 100%; max-width: 910px; }
    #inventory { width: 100%; max-width: 910px; }
  </style>
</head>
<body>
  <div id="tabs"></div>
  <div id="game-wrapper">
    <canvas id="gameCanvas" width="900" height="600"></canvas>
    <div id="puzzle-panel"></div>
    <div id="success-overlay"></div>
  </div>
  <div id="message"></div>
  <div id="inventory"></div>

  <!-- Lib -->
  <script src="../lib/api.js"></script>
  <script src="../lib/engine.js"></script>
  <script src="../lib/input.js"></script>
  <script src="../lib/state.js"></script>
  <script src="../lib/inventory.js"></script>
  <script src="../lib/transitions.js"></script>
  <script src="../lib/timer.js"></script>
  <script src="../lib/events.js"></script>
  <script src="../lib/particles.js"></script>

  <!-- UI Kit -->
  <script src="../ui-kit/tokens.js"></script>
  <script src="../ui-kit/themes/submarine.js"></script>
  <script src="../ui-kit/components/inventory.js"></script>
  <script src="../ui-kit/components/tabs.js"></script>
  <script src="../ui-kit/components/message-box.js"></script>
  <script src="../ui-kit/components/panel.js"></script>
  <script src="../ui-kit/components/success-overlay.js"></script>

  <!-- Render cinematográfico -->
  <script src="render.js"></script>

  <script>
    // ============ SETUP ============
    UITokens.apply(ThemeSubmarine);

    const game = EscapeEngine.create({ canvasId: 'gameCanvas', width: 900, height: 600, backgroundColor: '#0a1628' });
    const input = EscapeInput.create(game.getCanvas(), 900, 600);
    const state = EscapeState.create({ ambiente: 'proa', flags: {
      chaveObtida: false,
      vigiaVista: false,
      manualLido: false,
      radioVisto: false,
      escotilhaVista: false,
      valvulasAtivadas: [],
      puzzleResolvido: false,
      diagnosticoVisto: false
    }});
    const inv = EscapeInventory.create();
    const timer = EscapeTimer.create();
    const bus = EscapeEvents.create();

    // UI Components
    UITabs.create('tabs', [
      { id: 'proa', label: 'Proa', locked: false },
      { id: 'maquinas', label: 'Máquinas', locked: true }
    ], (tabId) => {
      if (tabId === 'maquinas' && !state.get('chaveObtida')) {
        msg('A escotilha para a sala de máquinas está travada. Precisa de uma chave de manutenção.');
        UITabs.setActive('tabs', 'proa');
        return;
      }
      EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => {
        state.setAmbiente(tabId);
        if (tabId === 'maquinas') msg('Sala de máquinas. O calor é sufocante. Três válvulas enormes controlam a pressão do casco. Um painel de diagnóstico pisca em vermelho.');
        else msg('De volta à proa. A água continua subindo lentamente.');
      });
    });

    UIMessageBox.create('message');
    UIInventory.create('inventory');
    UIPanel.create('puzzle-panel');
    UISuccessOverlay.create('success-overlay');

    const bubbles = EscapeParticles.create({
      x: 0, y: 400, width: 900, height: 200,
      color: 'rgba(79, 195, 247, 0.15)',
      count: 15, speedX: [-1, 1], speedY: [-8, -2], size: [1, 3], life: [3, 8]
    });

    function msg(text) { UIMessageBox.show('message', text); }
    msg('Um submarino militar afundado. O casco geme sob a pressão. Água infiltra pelas juntas. Precisa estabilizar a pressão e escapar antes que a estrutura ceda.');
    if (!EscapeAPI.isLoggedIn()) {
      setTimeout(() => msg('⚠️ Você não está logado. Seu tempo não será registrado no ranking. Faça login no lobby para participar!'), 3000);
    }
    timer.start();

    // ============ OBJETOS ============
    const objetosProa = [
      { id: 'armario', x: 100, y: 180, w: 110, h: 200, label: 'Armário de suprimentos' },
      { id: 'vigia', x: 740, y: 180, w: 80, h: 80, label: 'Vigia' },
      { id: 'manual', x: 420, y: 340, w: 100, h: 70, label: 'Manual de operações' },
      { id: 'radio', x: 580, y: 150, w: 130, h: 100, label: 'Painel de comunicação' },
      { id: 'escotilha', x: 820, y: 300, w: 60, h: 130, label: 'Escotilha — MÁQUINAS' },
    ];

    const objetosMaquinas = [
      { id: 'valvulaAzul', x: 80, y: 200, w: 130, h: 140, label: 'Válvula azul' },
      { id: 'valvulaVermelha', x: 380, y: 180, w: 130, h: 140, label: 'Válvula vermelha' },
      { id: 'valvulaAmarela', x: 540, y: 210, w: 130, h: 140, label: 'Válvula amarela' },
      { id: 'diagnostico', x: 80, y: 380, w: 180, h: 60, label: 'Painel de diagnóstico' },
      { id: 'voltar', x: 735, y: 500, w: 130, h: 55, label: 'Voltar' },
    ];

    function getObjetos() {
      return state.getAmbiente() === 'proa' ? objetosProa : objetosMaquinas;
    }

    // ============ INTERAÇÕES ============
    function interagir(obj) {
      if (EscapeTransitions.isTransitioning()) return;
      const id = obj.id;

      // -- PROA --
      if (id === 'armario') {
        if (!state.get('chaveObtida')) {
          state.set('chaveObtida', true);
          inv.add('chaveMaq', '🔑', 'Chave de manutenção — MÁQUINAS');
          UITabs.unlock('tabs', 'maquinas');
          msg('O armário range ao abrir. Entre kits de primeiros socorros e lanternas, você encontra uma chave de manutenção etiquetada "MÁQUINAS". A escotilha agora pode ser aberta.');
        } else {
          msg('O armário está aberto. Kits de emergência, lanternas quebradas. Nada mais útil.');
        }
      } else if (id === 'vigia') {
        if (!state.get('vigiaVista')) {
          state.set('vigiaVista', true);
          msg('Através do vidro grosso, a escuridão do oceano. Criaturas bioluminescentes passam como fantasmas. O fundo do mar está a menos de 20 metros — o casco não vai aguentar muito tempo.');
        } else {
          msg('O oceano escuro. Luzes azuis fantasmagóricas se movem na corrente. A pressão externa é imensa.');
        }
      } else if (id === 'manual') {
        if (!state.get('manualLido')) {
          state.set('manualLido', true);
          inv.add('instrucao', '📖', 'Manual: válvulas em pressão crescente');
          msg('Manual de Operações — Protocolo de Emergência: "Para estabilizar o casco, ativar válvulas na ordem de PRESSÃO CRESCENTE. Consultar manômetros individuais para valores."');
        } else {
          msg('Manual: "Ativar válvulas na ordem de PRESSÃO CRESCENTE. Consultar manômetros individuais."');
        }
      } else if (id === 'radio') {
        if (!state.get('radioVisto')) {
          state.set('radioVisto', true);
          msg('O rádio está morto. A última transmissão gravada: "Mayday... profundidade crítica... válvulas de pressão... sala de máquinas..." Estática.');
        } else {
          msg('Sem sinal. A última mensagem menciona as válvulas de pressão na sala de máquinas.');
        }
      } else if (id === 'escotilha') {
        if (state.get('chaveObtida')) {
          EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => {
            state.setAmbiente('maquinas');
            UITabs.setActive('tabs', 'maquinas');
            msg('Sala de máquinas. O calor é sufocante. Três válvulas enormes controlam a pressão do casco. Um painel de diagnóstico pisca em vermelho.');
          });
        } else {
          if (!state.get('escotilhaVista')) {
            state.set('escotilhaVista', true);
            msg('A escotilha para a sala de máquinas está travada com fechadura mecânica. Uma placa: "ACESSO RESTRITO — CHAVE DE MANUTENÇÃO". Deve haver uma por aqui em algum lugar.');
          } else {
            msg('Escotilha trancada. Precisa da chave de manutenção para abrir.');
          }
        }
      }

      // -- MÁQUINAS --
      else if (id === 'valvulaAzul') {
        ativarValvula('azul', 12);
      } else if (id === 'valvulaVermelha') {
        ativarValvula('vermelha', 45);
      } else if (id === 'valvulaAmarela') {
        ativarValvula('amarela', 78);
      } else if (id === 'diagnostico') {
        const ativadas = state.get('valvulasAtivadas') || [];
        if (state.get('puzzleResolvido')) {
          msg('Painel: "PRESSÃO ESTABILIZADA — SISTEMA NOMINAL". A escotilha de escape está desbloqueada!');
        } else if (ativadas.length === 0) {
          msg('Painel de diagnóstico: "ALERTA — PRESSÃO INSTÁVEL. Ativar válvulas para equalizar. Sequência incorreta causará reset." Status: 0/3 válvulas ativas.');
        } else {
          msg(`Painel: ${ativadas.length}/3 válvulas ativas. Sequência em progresso...`);
        }
      } else if (id === 'voltar') {
        EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => {
          state.setAmbiente('proa');
          UITabs.setActive('tabs', 'proa');
          msg('De volta à proa. A água continua subindo lentamente.');
        });
      }

      UIInventory.render('inventory', inv.getAll());
    }

    // ============ SISTEMA DE VÁLVULAS ============
    // Ordem correta: pressão crescente → azul(12) → vermelha(45) → amarela(78)
    const ordemCorreta = ['azul', 'vermelha', 'amarela'];

    function ativarValvula(cor, psi) {
      if (state.get('puzzleResolvido')) {
        msg(`Válvula ${cor} já está ativa. O sistema está estabilizado.`);
        return;
      }

      const ativadas = state.get('valvulasAtivadas') || [];

      if (ativadas.includes(cor)) {
        msg(`A válvula ${cor} já foi ativada. Manômetro indica ${psi} PSI.`);
        return;
      }

      // Verificar se é a próxima na sequência correta
      const proximaEsperada = ordemCorreta[ativadas.length];

      if (cor === proximaEsperada) {
        ativadas.push(cor);
        state.set('valvulasAtivadas', ativadas);

        if (ativadas.length === 3) {
          // Puzzle resolvido!
          state.set('puzzleResolvido', true);
          msg('A válvula amarela gira com um estrondo. O painel de diagnóstico fica verde: "PRESSÃO ESTABILIZADA". Um click metálico — a escotilha de escape se desbloqueou!');
          // Pequeno delay para drama
          setTimeout(() => escapar(), 2500);
        } else {
          msg(`Válvula ${cor} ativada. Manômetro: ${psi} PSI. O sistema aceita a entrada. ${3 - ativadas.length} válvula(s) restante(s).`);
        }
      } else {
        // Ordem errada — reset
        state.set('valvulasAtivadas', []);
        msg(`ERRO! A pressão oscila violentamente. O sistema resetou as válvulas. Manômetro desta válvula: ${psi} PSI. A sequência deve seguir a ordem correta.`);
      }
    }

    // ============ ESCAPE ============
    function escapar() {
      timer.stop();
      const tempoSeg = Math.floor(timer.getElapsed() / 1000);
      if (EscapeAPI.isLoggedIn()) {
        EscapeAPI.registrarResultado('Sala 5 — O Submarino Afundado', 'win', tempoSeg);
      }
      UISuccessOverlay.show('success-overlay', {
        title: '🚀 VOCÊ ESCAPOU!',
        subtitle: 'A pressão foi estabilizada. A escotilha de escape abriu e a cápsula de resgate foi ativada. Você sobe em direção à superfície.',
        time: timer.format(),
        links: [
          { text: '← Voltar ao Lobby', href: '../index.html' }
        ]
      });
    }

    // ============ INPUT ============
    input.onClick((x, y) => {
      if (EscapeTransitions.isTransitioning()) return;
      const obj = input.hitTest(x, y, getObjetos());
      if (obj) interagir(obj);
    });

    // ============ RENDER ============
    game.onRender((ctx, dt, size) => {
      const amb = state.getAmbiente();

      if (amb === 'proa') {
        renderProa(ctx, state);
      } else {
        renderMaquinas(ctx, state);
      }

      // Objetos interativos (highlight)
      const hovered = input.getHoveredObject(getObjetos());
      const objs = getObjetos();
      for (const obj of objs) {
        ctx.save();
        if (hovered && hovered.id === obj.id) {
          ctx.strokeStyle = UITokens.get('glowColor');
          ctx.lineWidth = 2;
          ctx.shadowColor = UITokens.get('glowColor');
          ctx.shadowBlur = 12;
          ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
        }
        ctx.restore();
      }

      // Partículas (bolhas)
      bubbles.update(dt);
      bubbles.render(ctx);

      // Transição
      EscapeTransitions.render(ctx, size.width, size.height);
    });

    // ============ START ============
    game.start();
    UIInventory.render('inventory', inv.getAll());
  </script>
</body>
</html>
