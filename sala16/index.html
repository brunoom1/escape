<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sala 16 — O Cofre do Banco</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Georgia', serif; background: #0a0806; color: #e8dcc8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 12px; }
    #tabs { width: 100%; max-width: 910px; }
    #game-wrapper { position: relative; width: 900px; max-width: 100%; }
    canvas { width: 100%; height: auto; display: block; border-radius: 8px; border: 1px solid #3d3020; cursor: crosshair; }
    #puzzle-panel, #success-overlay { position: absolute; inset: 0; }
    #message, #inventory { width: 100%; max-width: 910px; }
  </style>
</head>
<body>
  <div id="tabs"></div>
  <div id="game-wrapper">
    <canvas id="gameCanvas" width="900" height="600"></canvas>
    <div id="puzzle-panel"></div>
    <div id="success-overlay"></div>
  </div>
  <div id="message"></div>
  <div id="inventory"></div>

  <script src="../lib/api.js"></script>
  <script src="../lib/engine.js"></script>
  <script src="../lib/input.js"></script>
  <script src="../lib/state.js"></script>
  <script src="../lib/inventory.js"></script>
  <script src="../lib/transitions.js"></script>
  <script src="../lib/timer.js"></script>
  <script src="../lib/particles.js"></script>
  <script src="../ui-kit/tokens.js"></script>
  <script src="../ui-kit/themes/artdeco.js"></script>
  <script src="../ui-kit/components/inventory.js"></script>
  <script src="../ui-kit/components/tabs.js"></script>
  <script src="../ui-kit/components/message-box.js"></script>
  <script src="../ui-kit/components/panel.js"></script>
  <script src="../ui-kit/components/success-overlay.js"></script>
  <script src="render.js"></script>

  <script>
    UITokens.apply(ThemeArtDeco);
    const game = EscapeEngine.create({ canvasId: 'gameCanvas', width: 900, height: 600, backgroundColor: '#0a0806' });
    const input = EscapeInput.create(game.getCanvas(), 900, 600);
    const state = EscapeState.create({ ambiente: 'tesouraria', flags: {
      livroOk: false, gavetaOk: false, cartaoColetado: false,
      calendarioOk: false, portaAberta: false, vitoria: false
    }});
    const inv = EscapeInventory.create();
    const timer = EscapeTimer.create();

    UITabs.create('tabs', [
      { id: 'tesouraria', label: 'Tesouraria', locked: false },
      { id: 'escritorio', label: 'Escritório', locked: true }
    ], (tabId) => {
      if (tabId === 'escritorio' && !state.get('cartaoColetado')) {
        msg('A grade que leva ao escritório está trancada. Preciso de algo que comprove minha autoridade.');
        UITabs.setActive('tabs', 'tesouraria'); return;
      }
      EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente(tabId); msgAmb(tabId); });
    });

    UIMessageBox.create('message');
    UIInventory.create('inventory');
    UIPanel.create('puzzle-panel');
    UISuccessOverlay.create('success-overlay');
    const poeira = EscapeParticles.create({ x: 0, y: 0, width: 900, height: 600, color: 'rgba(212,168,67,0.08)', count: 14, speedX: [-0.3,0.3], speedY: [0.1,0.5], size: [0.6,1.4], life: [6,12] });

    function msg(t) { UIMessageBox.show('message', t); }
    function msgAmb(a) {
      if (a === 'tesouraria') msg('A tesouraria do Banco Central. Cofres, livros contábeis e uma imponente porta de cofre. O pó dourado baila sob o lustre.');
      else msg('O escritório do gerente. Mobília de madeira escura, um relógio de pêndulo e um quadro com a paisagem da cidade. O ar cheira a papel velho.');
    }
    msg('O banco foi assaltado e você ficou trancado na tesouraria. O cofre grande é a única saída — mas exige um código que só o gerente conhece. Investigue o escritório.');
    if (!EscapeAPI.isLoggedIn()) {
      setTimeout(() => msg('⚠️ Você não está logado. Seu tempo não será registrado no ranking. Faça login no lobby para participar!'), 3000);
    }
    timer.start();

    // ============ OBJETOS ============
    const objetoTesouraria = [
      { id: 'porta_cofre', x: 80, y: 160, w: 170, h: 280, label: 'Porta do cofre' },
      { id: 'gaveta', x: 260, y: 200, w: 170, h: 70, label: 'Caixa forte' },
      { id: 'prateleira', x: 680, y: 70, w: 170, h: 220, label: 'Prateleira' },
      { id: 'grade', x: 810, y: 180, w: 70, h: 260, label: 'Grade → Escritório' },
    ];
    const objetoEscritorio = [
      { id: 'escrivaninha', x: 50, y: 200, w: 180, h: 120, label: 'Escrivaninha' },
      { id: 'relogio', x: 350, y: 40, w: 180, h: 360, label: 'Relógio de pêndulo' },
      { id: 'quadro', x: 720, y: 60, w: 140, h: 170, label: 'Quadro' },
      { id: 'voltar', x: 30, y: 470, w: 100, h: 60, label: '← Tesouraria' },
    ];
    function getObjetos() { return state.getAmbiente() === 'tesouraria' ? objetoTesouraria : objetoEscritorio; }

    // ============ INTERAÇÕES ============
    function interagir(obj) {
      if (EscapeTransitions.isTransitioning()) return;
      const id = obj.id;

      // -- TESOURARIA --
      if (id === 'prateleira') {
        if (!state.get('livroOk')) { abrirLivro(); }
        else { msg('Na prateleira, livros empoeirados. O "Código Bancário" ainda está aberto com a cavidade vazia.'); }
      } else if (id === 'gaveta') {
        if (state.get('gavetaOk')) { msg('A caixa forte está vazia.'); }
        else if (inv.has('chave')) { abrirGaveta(); }
        else { msg('A caixa forte está trancada. Preciso de uma chave pequena.'); }
      } else if (id === 'grade') {
        if (state.get('cartaoColetado')) {
          EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente('escritorio'); UITabs.setActive('tabs', 'escritorio'); msgAmb('escritorio'); });
        } else { msg('A grade de ferro está trancada com um cadeado. Talvez haja uma chave ou cartão de acesso por aqui.'); }
      } else if (id === 'porta_cofre') {
        if (state.get('portaAberta')) { escapar(); }
        else if (state.get('calendarioOk')) { abrirCofre(); }
        else { msg('A porta do cofre precisa de um código de 4 dígitos. Preciso descobrir a senha investigando o escritório do gerente.'); }
      }

      // -- ESCRITÓRIO --
      else if (id === 'escrivaninha') {
        if (!state.get('calendarioOk')) { abrirCalendario(); }
        else { msg('O calendário de mesa: "BANCO CENTRAL — Fundado em 19 de julho de 1947".'); }
      } else if (id === 'relogio') {
        msg('O relógio de pêndulo do gerente. Parado desde o assalto. O mostrador tem algarismos romanos. Nada de especial — apesar de belo, não parece esconder nada além do mecanismo.');
      } else if (id === 'quadro') {
        msg('Uma pintura a óleo da cidade na década de 30. No canto inferior direito, uma placa: "DOAÇÃO — BANCO CENTRAL, 1947".');
      } else if (id === 'voltar') {
        EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente('tesouraria'); UITabs.setActive('tabs', 'tesouraria'); msg('De volta à tesouraria.'); });
      }

      UIInventory.render('inventory', inv.getAll());
    }

    // ============ PUZZLE 1: LIVRO ============
    function abrirLivro() {
      const html = `
        <p style="color:${UITokens.get('colorText')}; margin-bottom:8px; font-family:Georgia,serif;">📖 Código Bancário — Edição de 1935</p>
        <div style="background:#1a1410; border:1px solid #3d3020; border-radius:4px; padding:16px; margin-bottom:12px; max-width:340px; margin-left:auto; margin-right:auto;">
          <p style="color:${UITokens.get('colorTextMuted')}; font-size:0.85rem; font-style:italic; margin-bottom:10px;">"Das obrigações dos bancos para com o registro de títulos e valores..."</p>
          <p style="color:${UITokens.get('colorTextMuted')}; font-size:0.8rem;">O livro está aberto em uma página qualquer. Mas algo chama atenção — o miolo foi cortado em formato de cavidade retangular.</p>
        </div>
        <div style="display:flex; gap:10px; justify-content:center;">
          <button id="livroPegar" style="padding:8px 22px; background:#1a1410; border:1px solid #d4a843; color:#d4a843; font-family:Georgia,serif; cursor:pointer; border-radius:4px;">Examinar cavidade</button>
          <button id="livroVoltar" style="padding:8px 20px; background:#1a1410; border:1px solid #3d3020; color:#e8dcc8; font-family:Georgia,serif; cursor:pointer; border-radius:4px;">Fechar</button>
        </div>`;
      UIPanel.setContent('puzzle-panel', html); UIPanel.show('puzzle-panel');
      setTimeout(() => {
        document.getElementById('livroPegar').addEventListener('click', () => {
          state.set('livroOk', true);
          inv.add('chave', '🔑', 'Chave de latão pequena');
          UIInventory.render('inventory', inv.getAll());
          UIPanel.hide('puzzle-panel');
          msg('✅ Dentro da cavidade do livro, uma pequena chave de latão! Deve abrir algo por aqui.');
        });
        document.getElementById('livroVoltar').addEventListener('click', () => { UIPanel.hide('puzzle-panel'); msg('Você fecha o livro.'); });
      }, 50);
      msg('O livro "Código Bancário" parece mais grosso que deveria...');
    }

    // ============ PUZZLE 2: GAVETA (CAIXA FORTE) ============
    function abrirGaveta() {
      if (state.get('gavetaOk')) return;
      const html = `
        <p style="color:${UITokens.get('colorText')}; margin-bottom:8px; font-family:Georgia,serif;">🔐 Caixa Forte</p>
        <p style="color:${UITokens.get('colorTextMuted')}; font-size:0.85rem; margin-bottom:6px;">A chave de latão entra perfeitamente na fechadura.</p>
        <div style="background:#1a1410; border:1px solid #3d3020; border-radius:4px; padding:16px; margin:12px auto; max-width:360px;">
          <p style="color:#d4a843; font-size:0.95rem; font-weight:bold;">📄 Certificado de Fundação</p>
          <p style="color:${UITokens.get('colorTextMuted')}; font-size:0.8rem; margin-top:8px;">"O BANCO CENTRAL foi fundado no ano de 19__."</p>
          <p style="color:${UITokens.get('colorTextMuted')}; font-size:0.8rem; font-style:italic; margin-top:6px;">O último dígito está ilegível — mancha de tinta.</p>
          <hr style="border-color:#3d3020; margin:10px 0;">
          <p style="color:${UITokens.get('colorTextMuted')}; font-size:0.8rem;">📝 Bilhete anexo: <span style="color:#d4a843; font-style:italic;">"O gerente guarda o dígito que falta no calendário da escrivaninha dele. Complete o ano para abrir o cofre."</span></p>
        </div>
        <div style="display:flex; gap:10px; justify-content:center;">
          <button id="gavetaOk" style="padding:8px 22px; background:#1a1410; border:1px solid #d4a843; color:#d4a843; font-family:Georgia,serif; cursor:pointer; border-radius:4px;">Pegar documentos</button>
        </div>`;
      UIPanel.setContent('puzzle-panel', html); UIPanel.show('puzzle-panel');
      setTimeout(() => {
        document.getElementById('gavetaOk').addEventListener('click', () => {
          state.set('gavetaOk', true);
          state.set('cartaoColetado', true);
          UITabs.unlock('tabs', 'escritorio');
          inv.add('certificado', '📄', 'Certificado: "Fundado em 19__"');
          inv.add('bilhete', '📝', 'Bilhete: "dígito no calendário do gerente"');
          UIInventory.render('inventory', inv.getAll());
          UIPanel.hide('puzzle-panel');
          msg('✅ Você pega o certificado e o bilhete. A grade para o escritório agora está destrancada — o cartão de acesso serviu como prova de autoridade.');
        });
      }, 50);
      msg('A chave gira com um clique suave. A caixa forte se abre.');
    }

    // ============ PUZZLE 3: CALENDÁRIO (ESCRITÓRIO) ============
    function abrirCalendario() {
      const html = `
        <p style="color:${UITokens.get('colorText')}; margin-bottom:10px; font-family:Georgia,serif;">📅 Calendário de Mesa — 1947</p>
        <div style="background:#1a1410; border:1px solid #3d3020; border-radius:4px; padding:18px; margin:0 auto 12px; max-width:320px;">
          <p style="color:#d4a843; font-size:1rem; font-weight:bold; text-align:center;">BANCO CENTRAL</p>
          <p style="color:${UITokens.get('colorTextMuted')}; font-size:0.75rem; text-align:center; margin-bottom:12px;">Fundado em 19 de julho de 1947</p>
          <div style="display:grid; grid-template-columns:repeat(7,1fr); gap:2px; font-size:0.7rem; text-align:center;">
            <span style="color:#8a7a60;">D</span><span style="color:#8a7a60;">S</span><span style="color:#8a7a60;">T</span><span style="color:#8a7a60;">Q</span><span style="color:#8a7a60;">Q</span><span style="color:#8a7a60;">S</span><span style="color:#8a7a60;">S</span>
            <span></span><span></span><span></span><span>1</span><span>2</span><span>3</span><span>4</span>
            <span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span><span>11</span>
            <span>12</span><span>13</span><span>14</span><span>15</span><span>16</span><span>17</span><span>18</span>
            <span style="color:#d4a843; font-weight:bold;">19</span><span>20</span><span>21</span><span>22</span><span>23</span><span>24</span><span>25</span>
            <span>26</span><span>27</span><span>28</span><span>29</span><span>30</span><span>31</span><span></span>
          </div>
          <p style="color:${UITokens.get('colorTextMuted')}; font-size:0.75rem; margin-top:10px; text-align:center;">📌 <span style="color:#d4a843;">19 de julho</span> — data de fundação destacada</p>
        </div>
        <div style="display:flex; gap:10px; justify-content:center;">
          <button id="calAnotar" style="padding:8px 22px; background:#1a1410; border:1px solid #d4a843; color:#d4a843; font-family:Georgia,serif; cursor:pointer; border-radius:4px;">Anovar descoberta</button>
          <button id="calVoltar" style="padding:8px 20px; background:#1a1410; border:1px solid #3d3020; color:#e8dcc8; font-family:Georgia,serif; cursor:pointer; border-radius:4px;">Voltar</button>
        </div>`;
      UIPanel.setContent('puzzle-panel', html); UIPanel.show('puzzle-panel');
      setTimeout(() => {
        document.getElementById('calAnotar').addEventListener('click', () => {
          state.set('calendarioOk', true);
          inv.add('ano', '📅', 'Ano de fundação: 1947');
          UIInventory.render('inventory', inv.getAll());
          UIPanel.hide('puzzle-panel');
          msg('✅ 1947! O ano da fundação. Agora você tem o código completo para o cofre.');
        });
        document.getElementById('calVoltar').addEventListener('click', () => { UIPanel.hide('puzzle-panel'); msg('Você se afasta da escrivaninha.'); });
      }, 50);
      msg('O calendário de mesa do gerente. Uma folha virada destaca o mês de julho com o dia 19 circulado.');
    }

    // ============ PUZZLE FINAL: PORTA DO COFRE ============
    function abrirCofre() {
      if (state.get('vitoria')) { msg('O cofre já está aberto!'); return; }
      const html = `
        <p style="color:${UITokens.get('colorText')}; margin-bottom:12px; font-family:Georgia,serif;">🔒 Porta do Cofre — Código de 4 dígitos</p>
        <input type="text" id="cofreInput" maxlength="4" placeholder="_ _ _ _"
          style="background:#0a0805; border:1px solid #3d3020; color:#d4a843; font-family:'Courier New', monospace; font-size:1.5rem; padding:10px; width:130px; text-align:center; border-radius:4px;">
        <div style="margin-top:16px; display:flex; gap:10px; justify-content:center;">
          <button id="cofreOk" style="padding:8px 22px; background:#1a1410; border:1px solid #d4a843; color:#d4a843; font-family:Georgia,serif; cursor:pointer; border-radius:4px;">Abrir</button>
          <button id="cofreVoltar" style="padding:8px 20px; background:#1a1410; border:1px solid #3d3020; color:#e8dcc8; font-family:Georgia,serif; cursor:pointer; border-radius:4px;">Voltar</button>
        </div>`;
      UIPanel.setContent('puzzle-panel', html); UIPanel.show('puzzle-panel');
      setTimeout(() => {
        document.getElementById('cofreInput').focus();
        const tenta = () => {
          const el = document.getElementById('cofreInput');
          if (el.value.trim() === '1947') {
            state.set('portaAberta', true);
            UIPanel.hide('puzzle-panel');
            msg('✅ O mecanismo do cofre range e as travas se retraem com um baque surdo. A porta está aberta!');
          } else {
            msg('❌ Código incorreto. O cofre não se move. Lembre-se: o certificado tinha "19__" e o calendário do gerente completa o ano.');
            el.value = ''; el.focus();
          }
        };
        document.getElementById('cofreOk').addEventListener('click', tenta);
        document.getElementById('cofreVoltar').addEventListener('click', () => { UIPanel.hide('puzzle-panel'); msg('Você recua da porta do cofre.'); });
        document.getElementById('cofreInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') tenta(); });
      }, 50);
      msg('A porta do cofre exige um código de 4 dígitos. Você tem os documentos — complete o ano de fundação.');
    }

    // ============ ESCAPE ============
    function escapar() {
      timer.stop();
      const tempoSeg = Math.floor(timer.getElapsed() / 1000);
      if (EscapeAPI.isLoggedIn()) {
        EscapeAPI.registrarResultado('Sala 16 — O Cofre do Banco', 'win', tempoSeg);
      }
      UISuccessOverlay.show('success-overlay', {
        title: '🔓 VOCÊ ABRIU O COFRE!',
        subtitle: 'A porta do cofre range ao se abrir. A luz da manhã entra pela tesouraria vazia. Você saiu do banco — com a história de 1947 gravada na memória.',
        time: timer.format(),
        links: [{ text: '← Voltar ao Lobby', href: '../index.html' }]
      });
    }

    // ============ INPUT ============
    input.onClick((x, y) => {
      if (EscapeTransitions.isTransitioning()) return;
      const obj = input.hitTest(x, y, getObjetos());
      if (obj) interagir(obj);
    });

    // ============ RENDER ============
    game.onRender((ctx, dt, size) => {
      const amb = state.getAmbiente();
      if (amb === 'tesouraria') renderTesouraria(ctx, state);
      else renderEscritorio(ctx, state);

      const hovered = input.getHoveredObject(getObjetos());
      for (const obj of getObjetos()) {
        if (hovered && hovered.id === obj.id) {
          ctx.save();
          ctx.strokeStyle = UITokens.get('glowColor');
          ctx.lineWidth = 2;
          ctx.shadowColor = UITokens.get('glowColor');
          ctx.shadowBlur = 12;
          ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
          ctx.restore();
        }
      }
      poeira.update(dt); poeira.render(ctx);
      EscapeTransitions.render(ctx, size.width, size.height);
    });

    game.start();
    UIInventory.render('inventory', inv.getAll());
  </script>
</body>
</html>
