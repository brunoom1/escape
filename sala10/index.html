<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sala 10 — O Farol da Tempestade</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Courier New', monospace; background: #060d12; color: #c8dae4; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 12px; }
    #tabs { width: 100%; max-width: 910px; }
    #game-wrapper { position: relative; width: 900px; max-width: 100%; }
    canvas { width: 100%; height: auto; display: block; border-radius: 8px; border: 1px solid #1c3a4a; cursor: crosshair; }
    #puzzle-panel, #success-overlay { position: absolute; inset: 0; }
    #message, #inventory { width: 100%; max-width: 910px; }
  </style>
</head>
<body>
  <div id="tabs"></div>
  <div id="game-wrapper">
    <canvas id="gameCanvas" width="900" height="600"></canvas>
    <div id="puzzle-panel"></div>
    <div id="success-overlay"></div>
  </div>
  <div id="message"></div>
  <div id="inventory"></div>

  <script src="../lib/api.js"></script>
  <script src="../lib/engine.js"></script>
  <script src="../lib/input.js"></script>
  <script src="../lib/state.js"></script>
  <script src="../lib/inventory.js"></script>
  <script src="../lib/transitions.js"></script>
  <script src="../lib/timer.js"></script>
  <script src="../lib/particles.js"></script>
  <script src="../ui-kit/tokens.js"></script>
  <script src="../ui-kit/themes/lighthouse.js"></script>
  <script src="../ui-kit/components/inventory.js"></script>
  <script src="../ui-kit/components/tabs.js"></script>
  <script src="../ui-kit/components/message-box.js"></script>
  <script src="../ui-kit/components/panel.js"></script>
  <script src="../ui-kit/components/success-overlay.js"></script>
  <script src="render.js"></script>

  <script>
    UITokens.apply(ThemeLighthouse);
    const game = EscapeEngine.create({ canvasId: 'gameCanvas', width: 900, height: 600, backgroundColor: '#060d12' });
    const input = EscapeInput.create(game.getCanvas(), 900, 600);
    const state = EscapeState.create({ ambiente: 'faroleiro', flags: {
      lampiao: false, diario: false, armario: false, chaveColetada: false,
      radio: false, bau: false, manivelaColetada: false, escadaLiberada: false,
      engrenagens: false, farolAceso: false
    }});
    const inv = EscapeInventory.create();
    const timer = EscapeTimer.create();

    UITabs.create('tabs', [
      { id: 'faroleiro', label: 'Sala do Faroleiro', locked: false },
      { id: 'lente', label: 'Sala da Lente', locked: true }
    ], (tabId) => {
      if (tabId === 'lente' && !state.get('escadaLiberada')) {
        msg('A escada em espiral está trancada por um portão. Preciso de uma chave.');
        UITabs.setActive('tabs', 'faroleiro');
        return;
      }
      EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => {
        state.setAmbiente(tabId);
        msgAmb(tabId);
      });
    });

    UIMessageBox.create('message');
    UIInventory.create('inventory');
    UIPanel.create('puzzle-panel');
    UISuccessOverlay.create('success-overlay');

    const spray = EscapeParticles.create({ x: 0, y: 0, width: 900, height: 600, color: 'rgba(150,190,210,0.15)', count: 22, speedX: [-1,1], speedY: [2,7], size: [0.5,1.5], life: [2,5] });

    function msg(t) { UIMessageBox.show('message', t); }
    function msgAmb(a) {
      if (a === 'faroleiro') msg('A sala do faroleiro. O vento uiva lá fora e a chuva castiga a janela redonda. A luz do farol se apagou — sem ela, os navios batem nas rochas.');
      else msg('A sala da lente, no topo do farol. A grande lente de Fresnel está fria e escura. O mecanismo de rotação parou.');
    }
    msg('Uma tempestade violenta. O farol apagou e um navio pede socorro pelo rádio. Reacenda a luz antes que seja tarde.');
    if (!EscapeAPI.isLoggedIn()) {
      setTimeout(() => msg('⚠️ Você não está logado. Seu tempo não será registrado no ranking. Faça login no lobby para participar!'), 3000);
    }
    timer.start();

    // ============ OBJETOS (posições = render.js) ============
    const objetosFaroleiro = [
      { id: 'armario', x: 40, y: 250, w: 90, h: 150, label: 'Armário de chaves' },
      { id: 'diario', x: 300, y: 360, w: 180, h: 80, label: 'Escrivaninha e diário' },
      { id: 'radio', x: 560, y: 300, w: 130, h: 100, label: 'Rádio transmissor' },
      { id: 'lampiao', x: 660, y: 250, w: 60, h: 110, label: 'Lampião' },
      { id: 'bau', x: 760, y: 420, w: 110, h: 70, label: 'Baú de ferramentas' },
      { id: 'escada', x: 810, y: 130, w: 70, h: 290, label: 'Escada → Lente' },
    ];
    const objetosLente = [
      { id: 'engrenagens', x: 90, y: 240, w: 150, h: 150, label: 'Mecanismo de engrenagens' },
      { id: 'lente', x: 350, y: 200, w: 200, h: 220, label: 'Lente de Fresnel' },
      { id: 'ignicao', x: 620, y: 250, w: 180, h: 150, label: 'Painel de ignição' },
      { id: 'escadaDesce', x: 30, y: 470, w: 110, h: 60, label: '↓ Faroleiro' },
    ];
    function getObjetos() {
      return state.getAmbiente() === 'faroleiro' ? objetosFaroleiro : objetosLente;
    }

    // ============ INTERAÇÕES ============
    function interagir(obj) {
      if (EscapeTransitions.isTransitioning()) return;
      const id = obj.id;

      // -- FAROLEIRO --
      if (id === 'lampiao') {
        if (!state.get('lampiao')) {
          state.set('lampiao', true);
          msg('Você acende o lampião a óleo. A luz quente afasta a escuridão e agora dá para ler os papéis sobre a escrivaninha.');
        } else {
          msg('O lampião arde, iluminando o cômodo.');
        }
      } else if (id === 'diario') {
        if (!state.get('lampiao')) {
          msg('Está escuro demais para ler o que há sobre a escrivaninha. Preciso de mais luz.');
        } else if (!state.get('diario')) {
          state.set('diario', true);
          inv.add('diario', '📖', 'Diário: "a contagem começou com um único toque"');
          msg('O diário do antigo faroleiro: "Na noite do naufrágio, marquei os toques do sino de emergência. Comecei com um único toque — e cada toque seguinte foi o dobro do anterior."');
        } else {
          msg('Diário: "Comecei com um único toque; cada toque seguinte era o dobro do anterior."');
        }
      } else if (id === 'armario') {
        if (!state.get('chaveColetada')) {
          state.set('armario', true);
          state.set('chaveColetada', true);
          state.set('escadaLiberada', true);
          inv.add('chaveEscada', '🗝️', 'Chave do portão da escada');
          UITabs.unlock('tabs', 'lente');
          msg('No armário de chaves, uma única chave ainda pendurada — etiquetada "ESCADA". O portão da escada em espiral agora pode ser aberto.');
        } else {
          msg('O armário está vazio; a chave da escada já é sua.');
        }
      } else if (id === 'radio') {
        if (!state.get('radio')) {
          state.set('radio', true);
          inv.add('freqSocorro', '📻', 'Rádio: padrão de socorro tem 3 toques');
          msg('Entre a estática, uma mensagem automática de socorro se repete: "...padrão de emergência: TRÊS toques, na sequência dobrada..." A transmissão morre em ruído.');
        } else {
          msg('Rádio: "padrão de emergência: TRÊS toques, na sequência dobrada."');
        }
      } else if (id === 'bau') {
        if (!state.get('manivelaColetada')) {
          state.set('bau', true);
          state.set('manivelaColetada', true);
          inv.add('manivela', '🔧', 'Manivela de ferro');
          msg('No baú de ferramentas: uma robusta manivela de ferro. Serve para dar corda em mecanismos pesados.');
        } else {
          msg('O baú está vazio agora.');
        }
      } else if (id === 'escada') {
        if (state.get('escadaLiberada')) {
          EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => {
            state.setAmbiente('lente'); UITabs.setActive('tabs', 'lente'); msgAmb('lente');
          });
        } else {
          msg('Um portão de ferro tranca a escada em espiral. Preciso da chave.');
        }
      }

      // -- LENTE --
      else if (id === 'engrenagens') {
        if (state.get('engrenagens')) {
          msg('O mecanismo gira suavemente, pronto para alimentar a ignição do farol.');
        } else if (state.get('manivelaColetada')) {
          state.set('engrenagens', true);
          msg('Você encaixa a manivela e dá corda ao mecanismo. As engrenagens destravam e começam a girar — o sistema de rotação da lente está ativo!');
        } else {
          msg('O eixo do mecanismo está sem a manivela. As engrenagens não giram só com a mão.');
        }
      } else if (id === 'lente') {
        if (state.get('farolAceso')) {
          msg('A lente de Fresnel gira lançando seu feixe dourado sobre o mar revolto.');
        } else {
          msg('A grande lente de Fresnel, fria e escura. Ela só brilha quando a ignição é acionada com o mecanismo girando.');
        }
      } else if (id === 'ignicao') {
        abrirPainelIgnicao();
      } else if (id === 'escadaDesce') {
        EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => {
          state.setAmbiente('faroleiro'); UITabs.setActive('tabs', 'faroleiro'); msg('De volta à sala do faroleiro.');
        });
      }

      UIInventory.render('inventory', inv.getAll());
    }

    // ============ PUZZLE: IGNIÇÃO (código 124) ============
    // Sequência: começa em 1, cada toque dobra → 1, 2, 4 (três toques)
    function abrirPainelIgnicao() {
      if (state.get('farolAceso')) { msg('O farol já está aceso!'); return; }
      if (!state.get('engrenagens')) {
        msg('O painel de ignição está sem energia. O mecanismo de rotação precisa estar girando primeiro.');
        return;
      }
      const html = `
        <p style="color:${UITokens.get('colorText')}; margin-bottom:12px;">🔦 Painel de Ignição — Sequência de 3 toques</p>
        <p style="color:${UITokens.get('colorTextMuted')}; font-size:0.85rem; margin-bottom:14px;">Insira os três toques do sino de emergência.</p>
        <input type="text" id="ignInput" maxlength="3" placeholder="_ _ _"
          style="background:#081218; border:1px solid #1c3a4a; color:#ffb037; font-family:'Courier New'; font-size:1.5rem; padding:10px; width:120px; text-align:center; border-radius:4px;">
        <div style="margin-top:16px; display:flex; gap:10px; justify-content:center;">
          <button id="btnIgn" style="padding:8px 22px; background:#0d1a24; border:1px solid #ffb037; color:#ffb037; font-family:'Courier New'; cursor:pointer; border-radius:4px;">Acender</button>
          <button id="btnIgnVoltar" style="padding:8px 20px; background:#0d1a24; border:1px solid #1c3a4a; color:#c8dae4; font-family:'Courier New'; cursor:pointer; border-radius:4px;">Voltar</button>
        </div>`;
      UIPanel.setContent('puzzle-panel', html);
      UIPanel.show('puzzle-panel');
      setTimeout(() => {
        document.getElementById('ignInput').focus();
        document.getElementById('btnIgn').addEventListener('click', tentarIgnicao);
        document.getElementById('btnIgnVoltar').addEventListener('click', () => { UIPanel.hide('puzzle-panel'); msg('Você se afasta do painel.'); });
        document.getElementById('ignInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') tentarIgnicao(); });
      }, 50);
      msg('Painel de ignição do farol. Três seletores aguardam a sequência de toques.');
    }

    function tentarIgnicao() {
      const el = document.getElementById('ignInput');
      if (!el) return;
      if (el.value.trim() === '124') {
        state.set('farolAceso', true);
        UIPanel.hide('puzzle-panel');
        escapar();
      } else {
        msg('❌ Sequência incorreta. O farol tenta acender e falha. Reveja as pistas dos toques.');
        el.value = '';
        el.focus();
      }
    }

    // ============ ESCAPE ============
    function escapar() {
      timer.stop();
      const tempoSeg = Math.floor(timer.getElapsed() / 1000);
      if (EscapeAPI.isLoggedIn()) {
        EscapeAPI.registrarResultado('Sala 10 — O Farol da Tempestade', 'win', tempoSeg);
      }
      UISuccessOverlay.show('success-overlay', {
        title: '🗼 O FAROL BRILHA NOVAMENTE!',
        subtitle: 'A lente gira e lança seu feixe dourado sobre as rochas. Ao longe, o navio corrige a rota e escapa da tempestade. Você salvou a tripulação.',
        time: timer.format(),
        links: [{ text: '← Voltar ao Lobby', href: '../index.html' }]
      });
    }

    // ============ INPUT ============
    input.onClick((x, y) => {
      if (EscapeTransitions.isTransitioning()) return;
      const obj = input.hitTest(x, y, getObjetos());
      if (obj) interagir(obj);
    });

    // ============ RENDER ============
    game.onRender((ctx, dt, size) => {
      const amb = state.getAmbiente();
      if (amb === 'faroleiro') renderFaroleiro(ctx, state);
      else renderLente(ctx, state);

      const hovered = input.getHoveredObject(getObjetos());
      for (const obj of getObjetos()) {
        if (hovered && hovered.id === obj.id) {
          ctx.save();
          ctx.strokeStyle = UITokens.get('glowColor');
          ctx.lineWidth = 2;
          ctx.shadowColor = UITokens.get('glowColor');
          ctx.shadowBlur = 12;
          ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
          ctx.restore();
        }
      }
      if (amb === 'faroleiro') { spray.update(dt); spray.render(ctx); }
      EscapeTransitions.render(ctx, size.width, size.height);
    });

    game.start();
    UIInventory.render('inventory', inv.getAll());
  </script>
</body>
</html>
