<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sala 2 — Protocolo Omega</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #0a0f0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 16px;
      gap: 12px;
    }
    #tabs { width: 100%; max-width: 910px; }
    #game-wrapper {
      position: relative;
      width: 900px;
      max-width: 100%;
    }
    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
      border: 1px solid #1b5e20;
      cursor: crosshair;
    }
    #puzzle-panel, #success-overlay { position: absolute; inset: 0; }
    #message { width: 100%; max-width: 910px; }
    #inventory { width: 100%; max-width: 910px; }
  </style>
</head>
<body>
  <div id="tabs"></div>
  <div id="game-wrapper">
    <canvas id="gameCanvas" width="900" height="600"></canvas>
    <div id="puzzle-panel"></div>
    <div id="success-overlay"></div>
  </div>
  <div id="message"></div>
  <div id="inventory"></div>

  <!-- Lib -->
  <script src="../lib/api.js"></script>
  <script src="../lib/engine.js"></script>
  <script src="../lib/input.js"></script>
  <script src="../lib/state.js"></script>
  <script src="../lib/inventory.js"></script>
  <script src="../lib/transitions.js"></script>
  <script src="../lib/timer.js"></script>
  <script src="../lib/events.js"></script>
  <script src="../lib/particles.js"></script>

  <!-- UI Kit -->
  <script src="../ui-kit/tokens.js"></script>
  <script src="../ui-kit/themes/lab.js"></script>
  <script src="../ui-kit/components/inventory.js"></script>
  <script src="../ui-kit/components/tabs.js"></script>
  <script src="../ui-kit/components/message-box.js"></script>
  <script src="../ui-kit/components/panel.js"></script>
  <script src="../ui-kit/components/success-overlay.js"></script>

  <!-- Render cinematográfico -->
  <script src="render.js"></script>

  <script>
    // ============ SETUP ============
    UITokens.apply(ThemeLab);

    const game = EscapeEngine.create({ canvasId: 'gameCanvas', width: 900, height: 600, backgroundColor: '#0a0f0a' });
    const input = EscapeInput.create(game.getCanvas(), 900, 600);
    const state = EscapeState.create({ ambiente: 'lab', flags: {
      computador: false, microscopio: false, centrifuga: false, painelAlarme: false,
      clipboard: false, crachaColetado: false, alarmeDesligado: false,
      visor: false, manual: false, tubos: false,
      reagente1: false, reagente2: false, reagente3: false, reagente4: false, reagente5: false,
      refrigerador: false, tabelaPeriodica: false
    }});
    const inv = EscapeInventory.create();
    const timer = EscapeTimer.create();
    const bus = EscapeEvents.create();

    // UI Components
    UITabs.create('tabs', [
      { id: 'lab', label: 'Laboratório', locked: false },
      { id: 'contencao', label: 'Contenção', locked: true },
      { id: 'deposito', label: 'Depósito', locked: true }
    ], (tabId) => {
      if (tabId === 'contencao' && !state.get('crachaColetado')) {
        msg('⚠️ Acesso restrito. Nível de segurança 3 necessário.');
        UITabs.setActive('tabs', 'lab');
        return;
      }
      if (tabId === 'deposito' && !state.get('alarmeDesligado')) {
        msg('⚠️ Alarme ativo. Portas do depósito seladas.');
        UITabs.setActive('tabs', 'lab');
        return;
      }
      EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => {
        state.setAmbiente(tabId);
        msgAmbiente(tabId);
      });
    });

    UIMessageBox.create('message');
    UIInventory.create('inventory');
    UIPanel.create('puzzle-panel');
    UISuccessOverlay.create('success-overlay');

    const vapor = EscapeParticles.create({
      x: 0, y: 400, width: 900, height: 200,
      color: 'rgba(0, 255, 100, 0.08)',
      count: 20, speedX: [-2, 2], speedY: [-8, -2], size: [2, 4], life: [3, 7]
    });

    function msg(text) { UIMessageBox.show('message', text); }
    function msgAmbiente(a) {
      if (a === 'lab') msg('Laboratório Helix. Luzes de emergência piscam. O alarme ecoa nas paredes metálicas.');
      else if (a === 'contencao') msg('Câmara de contenção BSL-3. Luz UV esteriliza o ambiente. O painel de purificação aguarda a sequência.');
      else msg('Depósito refrigerado. Prateleiras de reagentes sob luz fluorescente. Vapores de condensação no ar.');
    }
    msg('⚠️ ALERTA: Vazamento detectado no Laboratório Helix. Sistema de ventilação selou todas as saídas. Neutralize a toxina para escapar.');
    if (!EscapeAPI.isLoggedIn()) {
      setTimeout(() => msg('⚠️ Você não está logado. Seu tempo não será registrado no ranking. Faça login no lobby para participar!'), 3000);
    }
    timer.start();

    // ============ OBJETOS (posições da POSITION TABLE) ============
    const objetosLab = [
      { id: 'computador', x: 350, y: 50, w: 160, h: 120, label: 'Computador central' },
      { id: 'microscopio', x: 60, y: 100, w: 100, h: 100, label: 'Microscópio' },
      { id: 'centrifuga', x: 60, y: 280, w: 110, h: 80, label: 'Centrífuga' },
      { id: 'painelAlarme', x: 700, y: 60, w: 120, h: 100, label: 'Painel de alarme' },
      { id: 'clipboard', x: 550, y: 350, w: 80, h: 100, label: 'Clipboard na bancada' },
      { id: 'portaContencao', x: 780, y: 300, w: 70, h: 160, label: 'Porta → Contenção' },
      { id: 'portaDeposito', x: 50, y: 440, w: 100, h: 120, label: 'Porta → Depósito' },
    ];

    const objetosContencao = [
      { id: 'painelPurif', x: 250, y: 80, w: 400, h: 150, label: 'Painel de Purificação' },
      { id: 'visor', x: 60, y: 100, w: 130, h: 130, label: 'Visor de contenção' },
      { id: 'manual', x: 700, y: 300, w: 100, h: 120, label: 'Manual de protocolos' },
      { id: 'tubos', x: 350, y: 350, w: 200, h: 80, label: 'Tubos de exaustão' },
      { id: 'voltarLab1', x: 50, y: 500, w: 120, h: 50, label: '← Voltar' },
    ];

    const objetosDeposito = [
      { id: 'reagente1', x: 60, y: 80, w: 80, h: 100, label: 'Frasco R-01' },
      { id: 'reagente2', x: 170, y: 80, w: 80, h: 100, label: 'Frasco R-02' },
      { id: 'reagente3', x: 280, y: 80, w: 80, h: 100, label: 'Frasco R-03' },
      { id: 'reagente4', x: 390, y: 80, w: 80, h: 100, label: 'Frasco R-04' },
      { id: 'reagente5', x: 500, y: 80, w: 80, h: 100, label: 'Frasco R-05' },
      { id: 'refrigerador', x: 650, y: 100, w: 120, h: 180, label: 'Refrigerador' },
      { id: 'tabelaPeriodica', x: 650, y: 350, w: 150, h: 100, label: 'Tabela periódica' },
      { id: 'voltarLab2', x: 50, y: 500, w: 120, h: 50, label: '← Voltar' },
    ];

    function getObjetos() {
      const a = state.getAmbiente();
      if (a === 'lab') return objetosLab;
      if (a === 'contencao') return objetosContencao;
      return objetosDeposito;
    }

    // ============ INTERAÇÕES ============
    function interagir(obj) {
      if (EscapeTransitions.isTransitioning()) return;
      const id = obj.id;

      // -- LABORATÓRIO PRINCIPAL --
      if (id === 'computador') {
        if (!state.get('computador')) {
          state.set('computador', true);
          inv.add('formula', '💻', 'Fórmula: tipos na ordem ácido→catalisador→base→oxidante');
          msg('Tela: "Protocolo de neutralização: aplicar reagentes por tipo — ácido (pH<3) → catalisador (pH neutro) → base (pH>12) → oxidante. SEQUÊNCIA CRÍTICA."');
        } else {
          msg('Fórmula: tipos na ordem ácido → catalisador → base → oxidante.');
        }
      } else if (id === 'microscopio') {
        if (!state.get('microscopio')) {
          state.set('microscopio', true);
          inv.add('amostra', '🔬', 'Toxina reage a pH extremos');
          msg('Amostra da toxina no microscópio. A estrutura molecular se decompõe em pH extremos — precisa de ácido e base na sequência correta.');
        } else {
          msg('A toxina se decompõe com ácido e base aplicados na ordem.');
        }
      } else if (id === 'centrifuga') {
        if (!state.get('centrifuga')) {
          state.set('centrifuga', true);
          inv.add('centrifuga_nota', '⚗️', 'Catalisador deve ser pH neutro (7.0)');
          msg('Centrífuga com amostra separada. Resultado: o catalisador precisa ser neutro (pH 7.0) para não reagir prematuramente com o ácido.');
        } else {
          msg('Catalisador deve ser pH 7.0 — neutro.');
        }
      } else if (id === 'painelAlarme') {
        abrirPainelAlarme();
      } else if (id === 'clipboard') {
        if (!state.get('clipboard')) {
          state.set('clipboard', true);
          state.set('crachaColetado', true);
          inv.add('cracha', '🪪', 'Crachá de acesso nível 3');
          UITabs.unlock('tabs', 'contencao');
          msg('Atrás do clipboard: crachá de segurança nível 3. A porta da contenção está desbloqueada!');
        } else {
          msg('Crachá nível 3 já coletado.');
        }
      } else if (id === 'portaContencao') {
        if (state.get('crachaColetado')) {
          EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => {
            state.setAmbiente('contencao');
            UITabs.setActive('tabs', 'contencao');
            msgAmbiente('contencao');
          });
        } else {
          msg('Acesso restrito. Um leitor de crachá pisca vermelho. Precisa de autorização nível 3.');
        }
      } else if (id === 'portaDeposito') {
        if (state.get('alarmeDesligado')) {
          EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => {
            state.setAmbiente('deposito');
            UITabs.setActive('tabs', 'deposito');
            msgAmbiente('deposito');
          });
        } else {
          msg('Portas seladas pelo sistema de alarme. Desative o alarme primeiro.');
        }
      }

      // -- CÂMARA DE CONTENÇÃO --
      else if (id === 'painelPurif') {
        abrirPainelPurificacao();
      } else if (id === 'visor') {
        if (!state.get('visor')) {
          state.set('visor', true);
          msg('Visor mostra a toxina ativa — cor esverdeada pulsante. O antídoto precisa neutralizá-la em 4 etapas progressivas.');
        } else {
          msg('Toxina ativa. Requer neutralização em 4 etapas.');
        }
      } else if (id === 'manual') {
        if (!state.get('manual')) {
          state.set('manual', true);
          inv.add('manual_nota', '📋', 'Protocolo: ácido antes de base, catalisador no meio');
          msg('Manual de Protocolos BSL-3: "Purificação: aplicar ácido ANTES da base. Catalisador no meio acelera a reação. Oxidante finaliza o processo."');
        } else {
          msg('Protocolo: ácido antes de base. Catalisador no meio. Oxidante finaliza.');
        }
      } else if (id === 'tubos') {
        if (!state.get('tubos')) {
          state.set('tubos', true);
          inv.add('temp_nota', '🌡️', 'Temp. máx exaustão: 78°C');
          msg('Tubos de exaustão indicam temperatura máxima suportada: 78°C. Reagentes acima disso podem ser incompatíveis com o sistema.');
        } else {
          msg('Temperatura máxima do sistema: 78°C.');
        }
      } else if (id === 'voltarLab1') {
        EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => {
          state.setAmbiente('lab');
          UITabs.setActive('tabs', 'lab');
          msg('De volta ao laboratório principal.');
        });
      }

      // -- DEPÓSITO DE REAGENTES --
      else if (id === 'reagente1') {
        if (!state.get('reagente1')) {
          state.set('reagente1', true);
          inv.add('r01', '🔵', 'R-01: pH 2.1 | NaCl-X | 78°C');
          msg('R-01 (azul): NaCl-X | pH 2.1 | Classificação: ácido forte | Ponto de ebulição: 78°C');
        } else {
          msg('R-01: pH 2.1, ácido forte, 78°C.');
        }
      } else if (id === 'reagente2') {
        if (!state.get('reagente2')) {
          state.set('reagente2', true);
          inv.add('r02', '🔴', 'R-02: pH 7.0 | FeO-7 | 120°C');
          msg('R-02 (vermelho): FeO-7 | pH 7.0 | Classificação: catalisador orgânico | Ponto de ebulição: 120°C');
        } else {
          msg('R-02: pH 7.0, catalisador, 120°C.');
        }
      } else if (id === 'reagente3') {
        if (!state.get('reagente3')) {
          state.set('reagente3', true);
          inv.add('r03', '🟢', 'R-03: pH 12.4 | CaB-3 | 65°C');
          msg('R-03 (verde): CaB-3 | pH 12.4 | Classificação: base forte | Ponto de ebulição: 65°C');
        } else {
          msg('R-03: pH 12.4, base forte, 65°C.');
        }
      } else if (id === 'reagente4') {
        if (!state.get('reagente4')) {
          state.set('reagente4', true);
          inv.add('r04', '🟡', 'R-04: pH 4.5 | H2S-9 | 37°C');
          msg('R-04 (amarelo): H2S-9 | pH 4.5 | Classificação: ácido fraco | Ponto de ebulição: 37°C');
        } else {
          msg('R-04: pH 4.5, ácido fraco, 37°C.');
        }
      } else if (id === 'reagente5') {
        if (!state.get('reagente5')) {
          state.set('reagente5', true);
          inv.add('r05', '🟣', 'R-05: oxidante | KMn-4 | 50°C');
          msg('R-05 (roxo): KMn-4 | Classificação: oxidante | pH 6.8 | Ponto de ebulição: 50°C | Nota: incompatível com ácidos diretos');
        } else {
          msg('R-05: oxidante, pH 6.8, 50°C.');
        }
      } else if (id === 'refrigerador') {
        if (!state.get('refrigerador')) {
          state.set('refrigerador', true);
          msg('Refrigerador vazio. Post-it interno: "Amostra transferida para centrífuga — Lab principal." Temperatura: -4°C.');
        } else {
          msg('Vazio. Amostra na centrífuga do lab.');
        }
      } else if (id === 'tabelaPeriodica') {
        if (!state.get('tabelaPeriodica')) {
          state.set('tabelaPeriodica', true);
          msg('Tabela periódica com destaque em KMn (manganês) circulado. Anotação: "oxidante universal — finaliza qualquer cadeia reativa."');
        } else {
          msg('KMn: oxidante universal, finalizador de reações.');
        }
      } else if (id === 'voltarLab2') {
        EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => {
          state.setAmbiente('lab');
          UITabs.setActive('tabs', 'lab');
          msg('De volta ao laboratório principal.');
        });
      }

      // Atualizar inventário visual
      UIInventory.render('inventory', inv.getAll());
    }

    // ============ PUZZLE: PAINEL DE ALARME (Simon Says) ============
    // ============ PUZZLE: PAINEL DE ALARME (Simon Says — 3 rounds) ============
    let painelAlarmeAberto = false;
    const CORES = ['blue', 'red', 'green', 'yellow'];
    const ROUNDS = [
      { label: 'Rodada 1/3', len: 3 },
      { label: 'Rodada 2/3', len: 4 },
      { label: 'Rodada 3/3', len: 5 },
    ];
    let simonRound = 0;
    let simonSeq = [];
    let simonIdx = 0;
    let simonInput = [];
    let simonPlaying = false;
    let simonResolvido = false;

    function sortearSeq(tamanho) {
      const s = [];
      for (let i = 0; i < tamanho; i++) s.push(CORES[Math.floor(Math.random() * CORES.length)]);
      return s;
    }

    function abrirPainelAlarme() {
      if (state.get('alarmeDesligado')) {
        msg('Alarme já desligado. Sistema estável.');
        return;
      }
      simonResolvido = false;
      simonRound = 0;
      painelAlarmeAberto = true;
      const html = `
        <div style="text-align:center; font-family:monospace;">
          <p style="color:${UITokens.get('colorText')}; margin-bottom:4px;">🔴 Painel de Alarme</p>
          <p style="color:${UITokens.get('colorTextMuted')}; font-size:0.8rem; margin-bottom:6px;">3 rodadas. Uma falha e volta ao início.</p>
          <div id="simon-round" style="color:#ffb74d; font-size:0.85rem; margin-bottom:2px;">Rodada 1/3</div>
          <div id="simon-status" style="color:${UITokens.get('colorAccent')}; font-size:0.85rem; margin-bottom:10px; min-height:20px;">Pressione "Iniciar".</div>
          <div style="display:flex; gap:12px; justify-content:center; margin-bottom:14px;">
            <button class="simon-btn" data-color="blue" style="width:58px;height:58px;border-radius:50%;background:#1565c0;border:3px solid #0d47a1;color:#fff;font-size:1.4rem;cursor:pointer;opacity:0.6;transition:opacity 0.08s, box-shadow 0.08s;">🔵</button>
            <button class="simon-btn" data-color="red" style="width:58px;height:58px;border-radius:50%;background:#c62828;border:3px solid #b71c1c;color:#fff;font-size:1.4rem;cursor:pointer;opacity:0.6;transition:opacity 0.08s, box-shadow 0.08s;">🔴</button>
            <button class="simon-btn" data-color="green" style="width:58px;height:58px;border-radius:50%;background:#2e7d32;border:3px solid #1b5e20;color:#fff;font-size:1.4rem;cursor:pointer;opacity:0.6;transition:opacity 0.08s, box-shadow 0.08s;">🟢</button>
            <button class="simon-btn" data-color="yellow" style="width:58px;height:58px;border-radius:50%;background:#f57f17;border:3px solid #e65100;color:#fff;font-size:1.4rem;cursor:pointer;opacity:0.6;transition:opacity 0.08s, box-shadow 0.08s;">🟡</button>
          </div>
          <div style="display:flex;gap:10px;justify-content:center;">
            <button id="simon-start" style="padding:7px 18px;background:#0f1a12;border:1px solid #1b5e20;color:#c8e6c9;font-family:monospace;cursor:pointer;border-radius:4px;">▶ Iniciar</button>
            <button id="simon-voltar" style="padding:7px 18px;background:#0f1a12;border:1px solid #1b5e20;color:#c8e6c9;font-family:monospace;cursor:pointer;border-radius:4px;">Voltar</button>
          </div>
        </div>`;
      UIPanel.setContent('puzzle-panel', html);
      UIPanel.show('puzzle-panel');
      setTimeout(bindSimon, 50);
      msg('O painel de alarme tem 4 luzes coloridas. São 3 rodadas — qualquer erro reinicia o teste.');
    }

    function bindSimon() {
      document.getElementById('simon-start').addEventListener('click', iniciarSimon);
      document.getElementById('simon-voltar').addEventListener('click', fecharAlarme);
      document.querySelectorAll('.simon-btn').forEach(b => {
        b.addEventListener('click', clicarSimon);
      });
    }

    function iniciarSimon() {
      if (simonResolvido) return;
      simonSeq = sortearSeq(ROUNDS[simonRound].len);
      simonIdx = 0;
      simonInput = [];
      simonPlaying = true;
      document.getElementById('simon-round').textContent = ROUNDS[simonRound].label;
      document.getElementById('simon-status').textContent = '👀 Observe a sequência...';
      document.getElementById('simon-start').style.display = 'none';
      tocarProximo();
    }

    function tocarProximo() {
      if (simonIdx >= simonSeq.length) {
        simonPlaying = false;
        document.getElementById('simon-status').textContent = '🎯 Sua vez! Repita a sequência.';
        return;
      }
      const cor = simonSeq[simonIdx];
      const btn = document.querySelector(`.simon-btn[data-color="${cor}"]`);
      btn.style.opacity = '1';
      btn.style.boxShadow = '0 0 22px rgba(255,255,255,0.6)';
      setTimeout(() => {
        btn.style.opacity = '0.6';
        btn.style.boxShadow = 'none';
        simonIdx++;
        setTimeout(tocarProximo, 280);
      }, 450);
    }

    function clicarSimon() {
      if (simonPlaying || simonResolvido) return;
      const cor = this.dataset.color;
      this.style.opacity = '1';
      this.style.boxShadow = '0 0 22px rgba(255,255,255,0.6)';
      setTimeout(() => {
        this.style.opacity = '0.6';
        this.style.boxShadow = 'none';
      }, 200);

      const esperada = simonSeq[simonInput.length];
      if (cor === esperada) {
        simonInput.push(cor);
        if (simonInput.length === simonSeq.length) {
          simonRound++;
          if (simonRound >= ROUNDS.length) {
            simonResolvido = true;
            state.set('alarmeDesligado', true);
            UITabs.unlock('tabs', 'deposito');
            document.getElementById('simon-round').textContent = '✅ COMPLETO';
            document.getElementById('simon-status').textContent = 'Alarme desativado! CÓDIGO BACKUP: 274';
            document.querySelectorAll('.simon-btn').forEach(b => { b.style.opacity = '0.3'; b.style.cursor = 'default'; });
            document.getElementById('simon-start').style.display = 'none';
            msg('✅ Alarme desativado! O painel exibe "CÓDIGO BACKUP: 274". Portas do depósito desbloqueadas.');
            setTimeout(() => { UIPanel.hide('puzzle-panel'); }, 2500);
          } else {
            document.getElementById('simon-round').textContent = ROUNDS[simonRound].label + ' ✅';
            document.getElementById('simon-status').textContent = '✔ Rodada concluída! Iniciando próxima...';
            document.getElementById('simon-start').style.display = 'inline-block';
          }
        }
      } else {
        simonRound = 0;
        simonInput = [];
        document.getElementById('simon-round').textContent = 'Rodada 1/3';
        document.getElementById('simon-status').textContent = '❌ Erro! Teste reiniciado. Pressione "Iniciar".';
        document.getElementById('simon-start').style.display = 'inline-block';
      }
    }

    function fecharAlarme() {
      painelAlarmeAberto = false;
      UIPanel.hide('puzzle-panel');
      msg('Você se afasta do painel de alarme.');
    }

    // ============ PUZZLE: PAINEL DE PURIFICAÇÃO (R-01→R-02→R-03→R-05) ============
    let painelPurifAberto = false;
    let sequencia = [];
    const SEQUENCIA_CORRETA = ['r01', 'r02', 'r03', 'r05'];
    const reagenteNomes = { r01: '🔵 R-01', r02: '🔴 R-02', r03: '🟢 R-03', r04: '🟡 R-04', r05: '🟣 R-05' };

    function abrirPainelPurificacao() {
      painelPurifAberto = true;
      sequencia = [];
      const html = `
        <p style="color:${UITokens.get('colorText')}; margin-bottom:12px;">🧪 Painel de Purificação — Selecione 4 reagentes na ordem correta</p>
        <div id="seq-display" style="font-size:1.3rem; margin:10px 0; min-height:30px; color:${UITokens.get('colorAccent')};">—</div>
        <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:12px 0;">
          <button class="rbtn" data-r="r01" style="padding:8px 14px; background:#0a1a2a; border:1px solid #1565c0; color:#64b5f6; font-family:monospace; cursor:pointer; border-radius:4px;">🔵 R-01</button>
          <button class="rbtn" data-r="r02" style="padding:8px 14px; background:#2a0a0a; border:1px solid #c62828; color:#ef5350; font-family:monospace; cursor:pointer; border-radius:4px;">🔴 R-02</button>
          <button class="rbtn" data-r="r03" style="padding:8px 14px; background:#0a2a0a; border:1px solid #2e7d32; color:#66bb6a; font-family:monospace; cursor:pointer; border-radius:4px;">🟢 R-03</button>
          <button class="rbtn" data-r="r04" style="padding:8px 14px; background:#2a2a0a; border:1px solid #f9a825; color:#ffee58; font-family:monospace; cursor:pointer; border-radius:4px;">🟡 R-04</button>
          <button class="rbtn" data-r="r05" style="padding:8px 14px; background:#1a0a2a; border:1px solid #6a1b9a; color:#ab47bc; font-family:monospace; cursor:pointer; border-radius:4px;">🟣 R-05</button>
        </div>
        <div style="display:flex; gap:10px; justify-content:center; margin-top:14px;">
          <button id="btnConfirm" style="padding:8px 20px; background:#0f1a12; border:1px solid #1b5e20; color:#c8e6c9; font-family:monospace; cursor:pointer; border-radius:4px;">Confirmar</button>
          <button id="btnReset" style="padding:8px 20px; background:#0f1a12; border:1px solid #1b5e20; color:#c8e6c9; font-family:monospace; cursor:pointer; border-radius:4px;">Limpar</button>
          <button id="btnBack" style="padding:8px 20px; background:#0f1a12; border:1px solid #1b5e20; color:#c8e6c9; font-family:monospace; cursor:pointer; border-radius:4px;">Voltar</button>
        </div>
      `;
      UIPanel.setContent('puzzle-panel', html);
      UIPanel.show('puzzle-panel');
      setTimeout(() => {
        document.querySelectorAll('.rbtn').forEach(b => {
          b.addEventListener('click', () => {
            if (sequencia.length < 4) {
              sequencia.push(b.dataset.r);
              document.getElementById('seq-display').textContent = sequencia.map(r => reagenteNomes[r]).join(' → ');
            }
          });
        });
        document.getElementById('btnConfirm').addEventListener('click', confirmarSequencia);
        document.getElementById('btnReset').addEventListener('click', () => {
          sequencia = [];
          document.getElementById('seq-display').textContent = '—';
        });
        document.getElementById('btnBack').addEventListener('click', () => {
          painelPurifAberto = false;
          UIPanel.hide('puzzle-panel');
          msg('Você se afasta do painel de purificação.');
        });
      }, 50);
      msg('Painel de Purificação ativo. Selecione os 4 reagentes na sequência correta para neutralizar a toxina.');
    }

    function confirmarSequencia() {
      if (sequencia.length !== 4) {
        msg('Selecione exatamente 4 reagentes.');
        return;
      }
      if (JSON.stringify(sequencia) === JSON.stringify(SEQUENCIA_CORRETA)) {
        painelPurifAberto = false;
        UIPanel.hide('puzzle-panel');
        timer.stop();
        const tempoSeg = Math.floor(timer.getElapsed() / 1000);
        if (EscapeAPI.isLoggedIn()) {
          EscapeAPI.registrarResultado('Sala 2 — Protocolo Omega', 'win', tempoSeg);
        }
        UISuccessOverlay.show('success-overlay', {
          title: '🎉 PROTOCOLO OMEGA COMPLETO!',
          subtitle: 'O antídoto neutralizou a toxina. Sistema de ventilação reativado. Você salvou o laboratório.',
          time: timer.format(),
          links: [{ text: '← Voltar ao Lobby', href: '../index.html' }]
        });
      } else {
        msg('❌ Reação instável! Sequência incorreta. Os reagentes foram descartados — tente novamente.');
        sequencia = [];
        document.getElementById('seq-display').textContent = '—';
      }
    }

    // ============ INPUT ============
    input.onClick((x, y) => {
      if (painelAlarmeAberto || painelPurifAberto) return;
      if (EscapeTransitions.isTransitioning()) return;
      const obj = input.hitTest(x, y, getObjetos());
      if (obj) interagir(obj);
    });

    // ============ RENDER ============
    game.onRender((ctx, dt, size) => {
      const amb = state.getAmbiente();

      if (amb === 'lab') {
        renderLab(ctx, state);
      } else if (amb === 'contencao') {
        renderContencao(ctx, state);
      } else {
        renderDeposito(ctx, state);
      }

      // Highlight de objetos interativos
      const hovered = input.getHoveredObject(getObjetos());
      const objs = getObjetos();
      for (const obj of objs) {
        ctx.save();
        if (hovered && hovered.id === obj.id) {
          ctx.strokeStyle = UITokens.get('glowColor');
          ctx.lineWidth = 2;
          ctx.shadowColor = UITokens.get('glowColor');
          ctx.shadowBlur = 12;
          ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
        }
        ctx.restore();
      }

      // Partículas de vapor
      vapor.update(dt);
      vapor.render(ctx);

      // Transição
      EscapeTransitions.render(ctx, size.width, size.height);
    });

    // ============ START ============
    game.start();
    UIInventory.render('inventory', inv.getAll());
  </script>
</body>
</html>
