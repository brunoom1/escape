<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sala 9 — Bunker da Guerra Fria</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Courier New', monospace; background: #0a0a0c; color: #c8c8d0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 12px; }
    #tabs { width: 100%; max-width: 910px; }
    #game-wrapper { position: relative; width: 900px; max-width: 100%; }
    canvas { width: 100%; height: auto; display: block; border-radius: 8px; border: 1px solid #2a2a3a; cursor: crosshair; }
    #puzzle-panel, #success-overlay { position: absolute; inset: 0; }
    #message, #inventory { width: 100%; max-width: 910px; }
  </style>
</head>
<body>
  <div id="tabs"></div>
  <div id="game-wrapper">
    <canvas id="gameCanvas" width="900" height="600"></canvas>
    <div id="puzzle-panel"></div>
    <div id="success-overlay"></div>
  </div>
  <div id="message"></div>
  <div id="inventory"></div>

  <script src="../lib/engine.js"></script>
  <script src="../lib/input.js"></script>
  <script src="../lib/state.js"></script>
  <script src="../lib/inventory.js"></script>
  <script src="../lib/transitions.js"></script>
  <script src="../lib/timer.js"></script>
  <script src="../lib/particles.js"></script>
  <script src="../ui-kit/tokens.js"></script>
  <script src="../ui-kit/themes/coldwar.js"></script>
  <script src="../ui-kit/components/inventory.js"></script>
  <script src="../ui-kit/components/tabs.js"></script>
  <script src="../ui-kit/components/message-box.js"></script>
  <script src="../ui-kit/components/panel.js"></script>
  <script src="../ui-kit/components/success-overlay.js"></script>
  <script>
    UITokens.apply(ThemeColdWar);
    const game = EscapeEngine.create({ canvasId: 'gameCanvas', width: 900, height: 600, backgroundColor: '#0a0a0c' });
    const input = EscapeInput.create(game.getCanvas(), 900, 600);
    const state = EscapeState.create({ ambiente: 'escritorio', flags: {
      gaveta: false, chaveColetada: false, calendario: false, documento: false, cofre: false,
      radio: false, parede5letras: false, mural: false,
      microfilme: false, dossie: false, cadeadoAberto: false,
      puzzleFinal: false
    }});
    const inv = EscapeInventory.create();
    const timer = EscapeTimer.create();

    // Caesar cipher: shift +3 — FUGIR → IXJLU
    const CIPHER_SHIFT = 3;
    const CORRECT_WORD = 'IXJLU'; // FUGIR cifrado +3
    const CORRECT_FREQ = '103.7';

    UITabs.create('tabs', [
      { id: 'escritorio', label: 'Escritório do Coronel', locked: false },
      { id: 'comunicacoes', label: 'Sala de Comunicações', locked: true },
      { id: 'arquivos', label: 'Sala de Arquivos', locked: true }
    ], (tabId) => {
      if (tabId === 'comunicacoes' && !state.get('chaveColetada')) {
        msg('Porta trancada. Precisa da chave do Coronel.');
        UITabs.setActive('tabs', 'escritorio'); return;
      }
      if (tabId === 'arquivos' && !state.get('cadeadoAberto')) {
        msg('Cadeado numérico de 4 dígitos. Qual é o código?');
        abrirCadeado(); UITabs.setActive('tabs', state.getAmbiente()); return;
      }
      EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => {
        state.setAmbiente(tabId);
        if (tabId === 'escritorio') msg('Escritório do Coronel. Concreto, aço, propaganda soviética nas paredes.');
        else if (tabId === 'comunicacoes') msg('Sala de Comunicações. Rádios, estática, tubos de vácuo piscando.');
        else msg('Sala de Arquivos. Fileiras de dossiês. Cheiro de papel velho e segredos.');
      });
    });

    UIMessageBox.create('message'); UIInventory.create('inventory'); UIPanel.create('puzzle-panel'); UISuccessOverlay.create('success-overlay');
    const staticParticles = EscapeParticles.create({ x: 0, y: 0, width: 900, height: 600, color: 'rgba(198,40,40,0.08)', count: 20, speedX: [-3,3], speedY: [-2,2], size: [1,2], life: [3,8] });
    function msg(t) { UIMessageBox.show('message', t); }
    msg('Bunker soviético, 1962. Você é um espião preso. Um túnel de fuga existe, mas precisa de uma transmissão codificada para abrir a porta pneumática. Encontre a cifra, a palavra e a frequência.');
    timer.start();

    const objetosEscritorio = [
      { id: 'gaveta', x: 100, y: 300, w: 180, h: 100, label: 'Gaveta da mesa' },
      { id: 'calendario', x: 650, y: 50, w: 150, h: 120, label: 'Calendário na parede' },
      { id: 'documento', x: 350, y: 150, w: 200, h: 120, label: 'Documento queimado' },
      { id: 'cofre', x: 700, y: 350, w: 130, h: 130, label: 'Cofre do Coronel' },
      { id: 'poster1', x: 50, y: 50, w: 120, h: 160, label: 'Pôster de propaganda' },
      { id: 'passagem_comm', x: 780, y: 200, w: 100, h: 150, label: 'Porta → Comunicações' }
    ];
    const objetosComunicacoes = [
      { id: 'radio', x: 250, y: 150, w: 250, h: 200, label: 'Rádio transmissor' },
      { id: 'parede5letras', x: 600, y: 80, w: 200, h: 100, label: 'Placa na parede' },
      { id: 'mural', x: 50, y: 80, w: 160, h: 200, label: 'Mural de procedimentos' },
      { id: 'tunel', x: 650, y: 380, w: 180, h: 180, label: 'Porta do túnel' },
      { id: 'voltarEsc', x: 20, y: 530, w: 130, h: 50, label: '← Escritório' },
      { id: 'passagem_arq', x: 780, y: 400, w: 100, h: 130, label: 'Porta → Arquivos' }
    ];
    const objetosArquivos = [
      { id: 'microfilme', x: 100, y: 150, w: 180, h: 120, label: 'Microfilme' },
      { id: 'dossie', x: 500, y: 200, w: 200, h: 140, label: 'Dossiê "Canal Alfa"' },
      { id: 'estantes', x: 350, y: 50, w: 200, h: 100, label: 'Estantes de arquivos' },
      { id: 'voltarComm', x: 20, y: 530, w: 130, h: 50, label: '← Comunicações' }
    ];
    function getObjetos() {
      const amb = state.getAmbiente();
      if (amb === 'escritorio') return objetosEscritorio;
      if (amb === 'comunicacoes') return objetosComunicacoes;
      return objetosArquivos;
    }

    function interagir(obj) {
      if (EscapeTransitions.isTransitioning()) return;
      const id = obj.id;
      // ESCRITÓRIO
      if (id === 'gaveta') {
        if (!state.get('gaveta')) {
          state.set('gaveta', true); state.set('chaveColetada', true);
          inv.add('chave_comm', '🔑', 'Chave — Sala de Comunicações');
          inv.add('nota_fu', '📝', 'Nota rasgada: "FU___"');
          UITabs.unlock('tabs', 'comunicacoes');
          msg('Gaveta destrancada! Dentro: uma chave etiquetada "COMM" e um bilhete rasgado com apenas "FU___" visível. As letras restantes foram arrancadas.');
        } else msg('Gaveta vazia. Chave e nota já coletadas.');
      }
      else if (id === 'calendario') {
        if (!state.get('calendario')) {
          state.set('calendario', true);
          inv.add('ano_1962', '📅', 'Calendário: 1962');
          msg('Calendário soviético. Ano: 1962. Outubro está circulado em vermelho. A crise dos mísseis.');
        } else msg('1962. O ano que quase acabou com tudo.');
      }
      else if (id === 'documento') {
        if (!state.get('documento')) {
          state.set('documento', true);
          inv.add('cifra_triplo', '🔥', 'Documento: "CIFRA: deslocamento triplo"');
          msg('Documento parcialmente queimado. Apenas uma linha legível: "CIFRA: deslocamento triplo". O resto é cinzas. Deslocamento triplo... shift de 3?');
        } else msg('CIFRA: deslocamento triplo.');
      }
      else if (id === 'cofre') {
        msg('Cofre de aço pesado. Combinação desconhecida. Não parece ter nada essencial — trancado permanentemente.');
      }
      else if (id === 'poster1') {
        msg('Pôster de propaganda: "A REVOLUÇÃO É INEVITÁVEL". Estrela vermelha. Nenhuma pista útil aqui.');
      }
      else if (id === 'passagem_comm') {
        if (state.get('chaveColetada')) {
          EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente('comunicacoes'); UITabs.setActive('tabs', 'comunicacoes'); msg('Sala de Comunicações. Válvulas de rádio brilham em laranja. Estática por toda parte.'); });
        } else msg('Porta trancada. Precisa da chave.');
      }

      // COMUNICAÇÕES
      else if (id === 'radio') { abrirPuzzleRadio(); }
      else if (id === 'parede5letras') {
        if (!state.get('parede5letras')) {
          state.set('parede5letras', true);
          inv.add('hint_5letras', '🔤', 'Placa: "CÓDIGO DE FUGA: 5 LETRAS"');
          msg('Placa metálica na parede: "CÓDIGO DE FUGA: 5 LETRAS". A palavra cifrada tem exatamente 5 caracteres.');
        } else msg('Código de fuga: 5 letras.');
      }
      else if (id === 'mural') {
        if (!state.get('mural')) {
          state.set('mural', true);
          msg('Mural de procedimentos de rádio. "Para transmissão de emergência: ajuste frequência → insira código cifrado → confirme." Procedimento padrão.');
        } else msg('Frequência → código cifrado → confirmar.');
      }
      else if (id === 'tunel') {
        if (state.get('puzzleFinal')) { escapar(); }
        else msg('Porta pneumática do túnel. Selada. Precisa receber o código correto pelo rádio para abrir.');
      }
      else if (id === 'voltarEsc') {
        EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente('escritorio'); UITabs.setActive('tabs', 'escritorio'); msg('De volta ao escritório do Coronel.'); });
      }
      else if (id === 'passagem_arq') {
        if (state.get('cadeadoAberto')) {
          EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente('arquivos'); UITabs.setActive('tabs', 'arquivos'); msg('Sala de Arquivos. Dossiês classificados. O cheiro de papel e poeira.'); });
        } else { msg('Cadeado numérico de 4 dígitos bloqueia esta porta.'); abrirCadeado(); }
      }
      // ARQUIVOS
      else if (id === 'microfilme') {
        if (!state.get('microfilme')) {
          state.set('microfilme', true);
          inv.add('nota_ir', '🎞️', 'Microfilme: "___IR"');
          msg('Microfilme danificado. Apenas o final de uma palavra é legível: "___IR". Duas letras finais de uma palavra de 5 letras.');
        } else msg('Microfilme: ___IR.');
      }
      else if (id === 'dossie') {
        if (!state.get('dossie')) {
          state.set('dossie', true);
          inv.add('freq_1037', '📋', 'Dossiê: "Canal Alfa: 103.7 MHz"');
          msg('Dossiê "Canal Alfa" — frequência de emergência: 103.7 MHz. Esta é a frequência do rádio de fuga!');
        } else msg('Canal Alfa: 103.7 MHz.');
      }
      else if (id === 'estantes') {
        msg('Fileiras de arquivos classificados. A maioria está em russo. Nada mais de útil aqui.');
      }
      else if (id === 'voltarComm') {
        EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente('comunicacoes'); UITabs.setActive('tabs', 'comunicacoes'); msg('De volta à Sala de Comunicações.'); });
      }
      UIInventory.render('inventory', inv.getAll());
    }

    // Cadeado numérico para Arquivos (código: 1962)
    function abrirCadeado() {
      if (state.get('cadeadoAberto')) return;
      const html = `
        <p style="color:${UITokens.get('colorAccent')}; margin-bottom:8px;">🔒 Cadeado Numérico — 4 Dígitos</p>
        <p style="color:${UITokens.get('colorTextMuted')}; font-size:0.85rem; margin-bottom:14px;">Insira o código de 4 dígitos para abrir a Sala de Arquivos.</p>
        <div style="margin:14px 0;">
          <input id="cadeadoInput" type="text" maxlength="4" placeholder="_ _ _ _" style="background:#14141a; border:2px solid #2a2a3a; color:#c62828; padding:12px 20px; font-family:monospace; font-size:1.5rem; text-align:center; width:140px; border-radius:4px; letter-spacing:6px;" />
        </div>
        <div style="display:flex; gap:10px; justify-content:center;">
          <button id="btnCadeado" style="padding:8px 20px; background:#14141a; border:1px solid #c62828; color:#c62828; font-family:monospace; cursor:pointer; border-radius:4px;">Abrir</button>
          <button id="btnCadeadoVoltar" style="padding:8px 20px; background:#14141a; border:1px solid #2a2a3a; color:#6a6a7a; font-family:monospace; cursor:pointer; border-radius:4px;">Voltar</button>
        </div>`;
      UIPanel.setContent('puzzle-panel', html); UIPanel.show('puzzle-panel');
      setTimeout(() => {
        document.getElementById('cadeadoInput').focus();
        document.getElementById('btnCadeado').addEventListener('click', () => {
          const val = document.getElementById('cadeadoInput').value.trim();
          if (val === '1962') {
            state.set('cadeadoAberto', true); UITabs.unlock('tabs', 'arquivos'); UIPanel.hide('puzzle-panel');
            msg('✅ 1962 — correto! O cadeado abre com um clique. Sala de Arquivos desbloqueada!');
          } else { msg('❌ Código incorreto. O cadeado permanece fechado. Procure alguma data significativa...'); }
        });
        document.getElementById('btnCadeadoVoltar').addEventListener('click', () => { UIPanel.hide('puzzle-panel'); msg('Você se afasta do cadeado.'); });
      }, 50);
    }

    // Puzzle final: Radio — frequência 103.7 + código IXJLU
    function abrirPuzzleRadio() {
      if (state.get('puzzleFinal')) { msg('Transmissão já enviada. O túnel está aberto!'); return; }
      const html = `
        <p style="color:${UITokens.get('colorAccent')}; margin-bottom:8px;">📻 Rádio Transmissor</p>
        <p style="color:${UITokens.get('colorTextMuted')}; font-size:0.85rem; margin-bottom:14px;">Ajuste a frequência e insira o código cifrado de 5 letras para transmitir.</p>
        <div style="display:flex; flex-direction:column; gap:12px; margin:14px 0; align-items:center;">
          <label style="color:#c8c8d0;">Frequência (MHz): <input id="freqInput" type="text" placeholder="___._" style="background:#14141a; border:1px solid #2a2a3a; color:#c62828; padding:8px 12px; font-family:monospace; font-size:1.1rem; width:100px; text-align:center; border-radius:4px;" /></label>
          <label style="color:#c8c8d0;">Código (5 letras): <input id="codeInput" type="text" maxlength="5" placeholder="_____" style="background:#14141a; border:1px solid #2a2a3a; color:#c62828; padding:8px 12px; font-family:monospace; font-size:1.1rem; width:120px; text-align:center; border-radius:4px; text-transform:uppercase;" /></label>
        </div>
        <div style="display:flex; gap:10px; justify-content:center; margin-top:8px;">
          <button id="btnTransmitir" style="padding:8px 20px; background:#14141a; border:1px solid #c62828; color:#c62828; font-family:monospace; cursor:pointer; border-radius:4px;">⚡ Transmitir</button>
          <button id="btnRadioVoltar" style="padding:8px 20px; background:#14141a; border:1px solid #2a2a3a; color:#6a6a7a; font-family:monospace; cursor:pointer; border-radius:4px;">Voltar</button>
        </div>`;
      UIPanel.setContent('puzzle-panel', html); UIPanel.show('puzzle-panel');
      setTimeout(() => {
        document.getElementById('btnTransmitir').addEventListener('click', () => {
          const freq = document.getElementById('freqInput').value.trim();
          const code = document.getElementById('codeInput').value.trim().toUpperCase();
          if (!freq || !code) { msg('Preencha frequência e código.'); return; }
          if (freq === CORRECT_FREQ && code === CORRECT_WORD) {
            state.set('puzzleFinal', true); UIPanel.hide('puzzle-panel');
            msg('✅ Frequência 103.7... código IXJLU transmitido... "Confirmado. Túnel liberado." A porta pneumática se abre com um sibilo!');
          } else if (freq !== CORRECT_FREQ && code === CORRECT_WORD) {
            msg('❌ Estática. Frequência errada — o sinal não alcança o receptor. Verifique o dossiê do Canal Alfa.');
          } else if (freq === CORRECT_FREQ && code !== CORRECT_WORD) {
            msg('❌ "Código inválido. Acesso negado." A cifra está incorreta. Lembre: deslocamento TRIPLO sobre a palavra de fuga.');
          } else {
            msg('❌ Estática total. Frequência e código incorretos. Reúna as pistas das 3 salas.');
          }
        });
        document.getElementById('btnRadioVoltar').addEventListener('click', () => { UIPanel.hide('puzzle-panel'); msg('Você se afasta do rádio.'); });
      }, 50);
    }

    function escapar() { timer.stop(); UISuccessOverlay.show('success-overlay', { title: '🚪 TÚNEL ABERTO!', subtitle: 'Transmissão confirmada. A porta pneumática se abre. Você rasteja pelo túnel e emerge na floresta gelada da Sibéria. Livre.', time: timer.format(), links: [{ text: '← Voltar ao Lobby', href: '../index.html' }] }); }

    input.onClick((x, y) => { if (EscapeTransitions.isTransitioning()) return; const obj = input.hitTest(x, y, getObjetos()); if (obj) interagir(obj); });

    game.onRender((ctx, dt, size) => {
      const amb = state.getAmbiente();
      if (amb === 'escritorio') renderEscritorio(ctx);
      else if (amb === 'comunicacoes') renderComunicacoes(ctx);
      else renderArquivos(ctx);
      const hovered = input.getHoveredObject(getObjetos());
      for (const obj of getObjetos()) { if (hovered && hovered.id === obj.id) { ctx.save(); ctx.strokeStyle = UITokens.get('glowColor'); ctx.lineWidth = 2; ctx.shadowColor = UITokens.get('glowColor'); ctx.shadowBlur = 12; ctx.strokeRect(obj.x, obj.y, obj.w, obj.h); ctx.restore(); } }
      // Radio static effect
      if (amb === 'comunicacoes') { for (let i = 0; i < 8; i++) { ctx.fillStyle = `rgba(198,40,40,${Math.random()*0.1})`; ctx.fillRect(Math.random()*900, Math.random()*600, Math.random()*4+1, Math.random()*4+1); } }
      staticParticles.update(dt); staticParticles.render(ctx);
      EscapeTransitions.render(ctx, size.width, size.height);
    });

    function renderEscritorio(ctx) {
      ctx.fillStyle = '#0a0a0c'; ctx.fillRect(0, 0, 900, 600);
      // Paredes de concreto
      ctx.fillStyle = '#14141a'; ctx.fillRect(0, 0, 900, 50); ctx.fillRect(0, 550, 900, 50);
      // Rachaduras no concreto
      ctx.strokeStyle = '#1a1a24'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(200, 0); ctx.lineTo(220, 50); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(600, 550); ctx.lineTo(580, 600); ctx.stroke();
      // Pôster propaganda
      ctx.fillStyle = '#2a0a0a'; ctx.fillRect(55, 55, 110, 155); ctx.strokeStyle = '#c62828'; ctx.lineWidth = 2; ctx.strokeRect(55, 55, 110, 155);
      ctx.fillStyle = '#c62828'; ctx.font = '20px serif'; ctx.fillText('★', 95, 110);
      ctx.fillStyle = '#6a6a7a'; ctx.font = '8px monospace'; ctx.fillText('REVOLUÇÃO', 68, 185); ctx.lineWidth = 1;
      // Mesa do Coronel
      ctx.fillStyle = '#1a1a20'; ctx.fillRect(80, 280, 300, 150); ctx.strokeStyle = '#2a2a3a'; ctx.strokeRect(80, 280, 300, 150);
      // Gaveta
      ctx.fillStyle = '#10101a'; ctx.fillRect(105, 305, 170, 90); ctx.strokeStyle = state.get('gaveta') ? '#6a6a7a' : '#c62828'; ctx.strokeRect(105, 305, 170, 90);
      ctx.fillStyle = '#6a6a7a'; ctx.font = '10px monospace'; ctx.fillText('GAVETA', 155, 355);
      // Calendário
      ctx.fillStyle = '#1a1a1a'; ctx.fillRect(655, 55, 140, 110); ctx.strokeStyle = '#2a2a3a'; ctx.strokeRect(655, 55, 140, 110);
      ctx.fillStyle = '#c62828'; ctx.font = 'bold 24px monospace'; ctx.fillText('1962', 685, 105);
      ctx.fillStyle = '#6a6a7a'; ctx.font = '9px monospace'; ctx.fillText('OUTUBRO', 695, 145);
      // Documento queimado
      ctx.fillStyle = '#1a1508'; ctx.fillRect(355, 155, 190, 110); ctx.strokeStyle = '#3a2a1a'; ctx.strokeRect(355, 155, 190, 110);
      ctx.fillStyle = '#c62828'; ctx.font = '10px monospace'; ctx.fillText('CIFRA:', 380, 190); ctx.fillText('deslocamento triplo', 380, 210);
      ctx.fillStyle = '#4a3a2a'; ctx.fillRect(355, 230, 190, 35); // queimado
      // Cofre
      ctx.fillStyle = '#10101a'; ctx.fillRect(705, 355, 120, 120); ctx.strokeStyle = '#2a2a3a'; ctx.lineWidth = 3; ctx.strokeRect(705, 355, 120, 120);
      ctx.beginPath(); ctx.arc(765, 415, 20, 0, Math.PI*2); ctx.strokeStyle = '#4a4a5a'; ctx.stroke(); ctx.lineWidth = 1;
      ctx.fillStyle = '#4a4a5a'; ctx.font = '10px monospace'; ctx.fillText('COFRE', 740, 460);
      // Porta comunicações
      ctx.fillStyle = '#0a0a10'; ctx.fillRect(785, 205, 90, 145); ctx.strokeStyle = state.get('chaveColetada') ? '#c62828' : '#2a2a3a'; ctx.lineWidth = 2; ctx.strokeRect(785, 205, 90, 145);
      ctx.fillStyle = '#6a6a7a'; ctx.font = '9px monospace'; ctx.fillText('COMM →', 800, 285); ctx.lineWidth = 1;
    }

    function renderComunicacoes(ctx) {
      ctx.fillStyle = '#0a0a0c'; ctx.fillRect(0, 0, 900, 600);
      // Paredes com painéis metálicos
      ctx.fillStyle = '#14141a'; ctx.fillRect(0, 0, 900, 60);
      ctx.strokeStyle = '#2a2a3a';
      for (let i = 0; i < 10; i++) { ctx.beginPath(); ctx.moveTo(i*90, 0); ctx.lineTo(i*90, 60); ctx.stroke(); }
      // Rádio transmissor grande
      ctx.fillStyle = '#10101a'; ctx.fillRect(255, 155, 240, 190); ctx.strokeStyle = '#c62828'; ctx.lineWidth = 2; ctx.strokeRect(255, 155, 240, 190);
      // Dial e botões
      ctx.fillStyle = '#1a1a24'; ctx.fillRect(275, 175, 100, 60); ctx.strokeStyle = '#4a4a5a'; ctx.strokeRect(275, 175, 100, 60);
      ctx.fillStyle = '#c62828'; ctx.font = '11px monospace'; ctx.fillText('MHz: ---.-', 285, 210);
      // VU meters
      for (let i = 0; i < 3; i++) { ctx.fillStyle = '#0a0a10'; ctx.fillRect(395 + i*30, 175, 25, 40); ctx.fillStyle = i < 2 ? '#4caf50' : '#c62828'; ctx.fillRect(397 + i*30, 195, 21, Math.random()*15+5); }
      // Tubo de vácuo glow
      for (let i = 0; i < 5; i++) { ctx.fillStyle = 'rgba(255,140,0,0.3)'; ctx.beginPath(); ctx.arc(290 + i*40, 310, 10, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#ff8c00'; ctx.beginPath(); ctx.arc(290 + i*40, 310, 5, 0, Math.PI*2); ctx.fill(); }
      ctx.fillStyle = '#c62828'; ctx.font = '11px monospace'; ctx.fillText('TRANSMISSOR R-250M', 300, 340); ctx.lineWidth = 1;
      // Placa 5 letras
      ctx.fillStyle = '#1a1a24'; ctx.fillRect(605, 85, 190, 90); ctx.strokeStyle = '#c62828'; ctx.lineWidth = 1; ctx.strokeRect(605, 85, 190, 90);
      ctx.fillStyle = '#c8c8d0'; ctx.font = 'bold 12px monospace'; ctx.fillText('CÓDIGO DE FUGA:', 625, 120); ctx.fillText('5 LETRAS', 660, 150);
      // Mural procedimentos
      ctx.fillStyle = '#14141a'; ctx.fillRect(55, 85, 150, 190); ctx.strokeStyle = '#2a2a3a'; ctx.strokeRect(55, 85, 150, 190);
      ctx.fillStyle = '#6a6a7a'; ctx.font = '9px monospace'; ctx.fillText('PROCEDIMENTO:', 70, 115); ctx.fillText('1. Frequência', 70, 140); ctx.fillText('2. Código cifrado', 70, 160); ctx.fillText('3. Transmitir', 70, 180);
      // Porta do túnel
      ctx.fillStyle = '#0a0a0a'; ctx.fillRect(655, 385, 170, 170); ctx.strokeStyle = state.get('puzzleFinal') ? '#4caf50' : '#c62828'; ctx.lineWidth = 3; ctx.strokeRect(655, 385, 170, 170);
      ctx.fillStyle = state.get('puzzleFinal') ? '#4caf50' : '#c62828'; ctx.font = '12px monospace'; ctx.fillText(state.get('puzzleFinal') ? 'ABERTO' : 'SELADO', 705, 475);
      // Estrela soviética na porta
      ctx.fillStyle = '#c62828'; ctx.font = '24px serif'; ctx.fillText('★', 725, 445); ctx.lineWidth = 1;
      // Voltar
      ctx.fillStyle = '#14141a'; ctx.fillRect(25, 535, 125, 45); ctx.strokeStyle = '#2a2a3a'; ctx.strokeRect(25, 535, 125, 45);
      ctx.fillStyle = '#6a6a7a'; ctx.font = '11px monospace'; ctx.fillText('← Escritório', 38, 562);
      // Porta arquivos
      ctx.fillStyle = '#0a0a10'; ctx.fillRect(785, 405, 90, 125); ctx.strokeStyle = state.get('cadeadoAberto') ? '#4caf50' : '#2a2a3a'; ctx.lineWidth = 2; ctx.strokeRect(785, 405, 90, 125);
      ctx.fillStyle = '#6a6a7a'; ctx.font = '9px monospace'; ctx.fillText('ARQ →', 805, 475); ctx.lineWidth = 1;
    }

    function renderArquivos(ctx) {
      ctx.fillStyle = '#0a0a0c'; ctx.fillRect(0, 0, 900, 600);
      // Estantes
      ctx.fillStyle = '#14141a';
      for (let i = 0; i < 4; i++) { ctx.fillRect(100 + i*200, 50, 150, 500); ctx.strokeStyle = '#2a2a3a'; ctx.strokeRect(100 + i*200, 50, 150, 500); }
      // Prateleiras
      ctx.strokeStyle = '#1a1a24';
      for (let i = 0; i < 4; i++) { for (let r = 0; r < 8; r++) { ctx.beginPath(); ctx.moveTo(100 + i*200, 100 + r*60); ctx.lineTo(250 + i*200, 100 + r*60); ctx.stroke(); } }
      // Pastas/dossiês nas prateleiras
      const colors = ['#2a1a1a', '#1a1a2a', '#1a2a1a', '#2a2a1a'];
      for (let i = 0; i < 4; i++) { for (let r = 0; r < 7; r++) { ctx.fillStyle = colors[(i+r)%4]; for (let f = 0; f < 5; f++) { ctx.fillRect(105 + i*200 + f*28, 55 + r*60, 25, 42); } } }
      // Microfilme destacado
      ctx.fillStyle = '#1a1a2a'; ctx.fillRect(105, 155, 170, 110); ctx.strokeStyle = '#c62828'; ctx.lineWidth = 2; ctx.strokeRect(105, 155, 170, 110);
      ctx.fillStyle = '#c8c8d0'; ctx.font = '10px monospace'; ctx.fillText('MICROFILME', 140, 195);
      ctx.fillStyle = '#c62828'; ctx.font = '14px monospace'; ctx.fillText('___IR', 155, 230); ctx.lineWidth = 1;
      // Dossiê Canal Alfa
      ctx.fillStyle = '#2a1a1a'; ctx.fillRect(505, 205, 190, 130); ctx.strokeStyle = '#c62828'; ctx.lineWidth = 2; ctx.strokeRect(505, 205, 190, 130);
      ctx.fillStyle = '#c62828'; ctx.font = 'bold 11px monospace'; ctx.fillText('DOSSIÊ — CANAL ALFA', 520, 240);
      ctx.fillStyle = '#c8c8d0'; ctx.font = '12px monospace'; ctx.fillText('Freq: 103.7 MHz', 535, 275);
      ctx.fillStyle = '#6a6a7a'; ctx.font = '9px monospace'; ctx.fillText('CLASSIFICADO', 550, 320); ctx.lineWidth = 1;
      // Voltar
      ctx.fillStyle = '#14141a'; ctx.fillRect(25, 535, 125, 45); ctx.strokeStyle = '#2a2a3a'; ctx.strokeRect(25, 535, 125, 45);
      ctx.fillStyle = '#6a6a7a'; ctx.font = '11px monospace'; ctx.fillText('← Comunic.', 40, 562);
    }

    game.start(); UIInventory.render('inventory', inv.getAll());
  </script>
