<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sala 6 — O Museu à Noite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Georgia', serif; background: #0a0a0f; color: #d4cfc0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 12px; }
    #tabs { width: 100%; max-width: 910px; }
    #game-wrapper { position: relative; width: 900px; max-width: 100%; }
    canvas { width: 100%; height: auto; display: block; border-radius: 8px; border: 1px solid #2a2035; cursor: crosshair; }
    #puzzle-panel, #success-overlay { position: absolute; inset: 0; }
    #message, #inventory { width: 100%; max-width: 910px; }
  </style>
</head>
<body>
  <div id="tabs"></div>
  <div id="game-wrapper">
    <canvas id="gameCanvas" width="900" height="600"></canvas>
    <div id="puzzle-panel"></div>
    <div id="success-overlay"></div>
  </div>
  <div id="message"></div>
  <div id="inventory"></div>

  <script src="../lib/engine.js"></script>
  <script src="../lib/input.js"></script>
  <script src="../lib/state.js"></script>
  <script src="../lib/inventory.js"></script>
  <script src="../lib/transitions.js"></script>
  <script src="../lib/timer.js"></script>
  <script src="../lib/particles.js"></script>
  <script src="../ui-kit/tokens.js"></script>
  <script src="../ui-kit/themes/museum.js"></script>
  <script src="../ui-kit/components/inventory.js"></script>
  <script src="../ui-kit/components/tabs.js"></script>
  <script src="../ui-kit/components/message-box.js"></script>
  <script src="../ui-kit/components/panel.js"></script>
  <script src="../ui-kit/components/success-overlay.js"></script>
  <script src="render.js"></script>
  <script>
    UITokens.apply(ThemeMuseum);
    const game = EscapeEngine.create({ canvasId: 'gameCanvas', width: 900, height: 600, backgroundColor: '#0a0a0f' });
    const input = EscapeInput.create(game.getCanvas(), 900, 600);
    const state = EscapeState.create({ ambiente: 'galeria', flags: {
      quadroModerno: false, quadroClassico: false, escultura: false, placaInfo: false,
      diagramaCircuito: false, monitorCams: false, painelSensores: false,
      sensor1: false, sensor2: false, sensor3: false, sensor4: false,
      laserDesativado: false, crachaColetado: false,
      sarcofago: false, hieroglifos: false, muralCores: false,
      overrideCompleto: false
    }});
    const inv = EscapeInventory.create();
    const timer = EscapeTimer.create();
    let laserPulse = 0;
    let sensorOrdem = [];

    UITabs.create('tabs', [
      { id: 'galeria', label: 'Galeria Principal', locked: false },
      { id: 'seguranca', label: 'Sala de Segurança', locked: true },
      { id: 'egipcia', label: 'Ala Egípcia', locked: true }
    ], (tabId) => {
      if (tabId === 'seguranca' && !state.get('crachaColetado')) { msg('Porta com leitor de crachá. Você precisa do crachá de segurança.'); UITabs.setActive('tabs', 'galeria'); return; }
      if (tabId === 'egipcia' && !state.get('laserDesativado')) { msg('Corredor bloqueado por lasers. Desative os sensores primeiro.'); UITabs.setActive('tabs', state.getAmbiente()); return; }
      EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente(tabId);
        if (tabId === 'galeria') msg('Galeria Principal. Obras iluminadas por vitrines. Lasers de segurança cortam o espaço.');
        else if (tabId === 'seguranca') msg('Sala de Segurança. Monitores, diagrama de circuitos e painel de controle dos sensores.');
        else msg('Ala Egípcia. Sarcófagos, hieróglifos e um terminal de override.');
      });
    });
    UIMessageBox.create('message'); UIInventory.create('inventory'); UIPanel.create('puzzle-panel'); UISuccessOverlay.create('success-overlay');
    const dustParticles = EscapeParticles.create({ x: 0, y: 0, width: 900, height: 600, color: 'rgba(232,184,74,0.15)', count: 20, speedX: [-0.5,0.5], speedY: [0.2,1], size: [1,2], life: [4,8] });
    function msg(t) { UIMessageBox.show('message', t); }
    msg('O alarme disparou. As portas selaram. Você, segurança noturno, está preso. Os lasers bloqueiam as saídas. Encontre um jeito de desativar o sistema.');
    timer.start();

    // === OBJETOS POR AMBIENTE ===
    const objetosGaleria = [
      { id: 'quadroModerno', x: 60, y: 50, w: 160, h: 200, label: 'Quadro "Noite Estrelada" (1889)', blockedBy: null },
      { id: 'quadroClassico', x: 360, y: 50, w: 160, h: 200, label: 'Quadro "O Grito" (1893)', blockedBy: null },
      { id: 'escultura', x: 680, y: 120, w: 100, h: 200, label: 'Escultura de mármore', blockedBy: 'laserA' },
      { id: 'placaInfo', x: 250, y: 380, w: 140, h: 60, label: 'Placa informativa', blockedBy: null },
      { id: 'portaSeguranca', x: 750, y: 400, w: 120, h: 150, label: 'Porta → Segurança', blockedBy: null },
      { id: 'corredorEgipcio', x: 30, y: 420, w: 130, h: 130, label: 'Corredor → Ala Egípcia', blockedBy: null },
    ];
    const objetosSeguranca = [
      { id: 'diagramaCircuito', x: 50, y: 50, w: 250, h: 200, label: 'Diagrama de circuito' },
      { id: 'monitorCams', x: 400, y: 50, w: 200, h: 150, label: 'Monitores de câmera' },
      { id: 'painelSensores', x: 350, y: 320, w: 200, h: 140, label: 'Painel de sensores' },
      { id: 'voltarGaleria', x: 30, y: 520, w: 130, h: 50, label: '← Galeria' },
    ];
    const objetosEgipcia = [
      { id: 'sarcofago', x: 80, y: 100, w: 150, h: 250, label: 'Sarcófago dourado' },
      { id: 'hieroglifos', x: 350, y: 80, w: 200, h: 180, label: 'Parede de hieróglifos' },
      { id: 'muralCores', x: 650, y: 100, w: 150, h: 160, label: 'Mural de cores rituais' },
      { id: 'terminalOverride', x: 350, y: 380, w: 200, h: 120, label: 'Terminal de Override' },
      { id: 'voltarGaleriaEg', x: 30, y: 520, w: 130, h: 50, label: '← Galeria' },
    ];
    function getObjetos() {
      const amb = state.getAmbiente();
      if (amb === 'galeria') return objetosGaleria;
      if (amb === 'seguranca') return objetosSeguranca;
      return objetosEgipcia;
    }

    // === INTERAÇÕES ===
    function interagir(obj) {
      if (EscapeTransitions.isTransitioning()) return;
      const id = obj.id;

      // Check laser blocking
      if (obj.blockedBy && !state.get('laserDesativado')) {
        msg('⚠️ Um laser de segurança bloqueia o acesso. Desative os sensores primeiro.');
        return;
      }

      // --- GALERIA PRINCIPAL ---
      if (id === 'quadroModerno') {
        if (!state.get('quadroModerno')) { state.set('quadroModerno', true); inv.add('data1889', '🖼️', 'Placa: "Noite Estrelada, 1889"'); msg('Uma reprodução magnífica. A placa diz: "Noite Estrelada — Vincent van Gogh, 1889". O ano está gravado em dourado.'); }
        else msg('Noite Estrelada, 1889.');
      }
      else if (id === 'quadroClassico') {
        if (!state.get('quadroClassico')) { state.set('quadroClassico', true); inv.add('data1893', '🖼️', 'Placa: "O Grito, 1893"'); msg('O rosto contorcido parece gritar no escuro. Placa: "O Grito — Edvard Munch, 1893".'); }
        else msg('O Grito, 1893.');
      }
      else if (id === 'escultura') {
        if (!state.get('escultura')) { state.set('escultura', true); state.set('crachaColetado', true); inv.add('cracha', '🪪', 'Crachá de segurança — Acesso total'); UITabs.unlock('tabs', 'seguranca'); msg('Atrás da escultura, preso ao pedestal: um crachá de segurança! "ACESSO TOTAL — Sala de Segurança". A porta agora pode ser aberta.'); }
        else msg('Pedestal vazio. O crachá já é seu.');
      }
      else if (id === 'placaInfo') {
        if (!state.get('placaInfo')) { state.set('placaInfo', true); inv.add('dica_media', '📜', '"A verdade está entre os mestres"'); msg('"Curiosidade: a verdade está entre os mestres. O ponto médio de suas eras revela o caminho." Uma dica críptica...'); }
        else msg('"A verdade está entre os mestres."');
      }
      else if (id === 'portaSeguranca') {
        if (state.get('crachaColetado')) { EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente('seguranca'); UITabs.setActive('tabs', 'seguranca'); msg('Sala de Segurança. Monitores piscam. Um diagrama de circuitos na parede e o painel central de sensores.'); }); }
        else msg('Porta com leitor de crachá. Precisa do crachá de segurança.');
      }
      else if (id === 'corredorEgipcio') {
        if (state.get('laserDesativado')) { EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente('egipcia'); UITabs.setActive('tabs', 'egipcia'); msg('Ala Egípcia. Sarcófagos dourados, hieróglifos e um terminal de override no fundo.'); }); }
        else msg('Corredor bloqueado por lasers vermelhos. Desative os sensores na Sala de Segurança.');
      }
      // --- SALA DE SEGURANÇA ---
      else if (id === 'diagramaCircuito') {
        if (!state.get('diagramaCircuito')) { state.set('diagramaCircuito', true); inv.add('ordem_circuito', '📐', 'Circuito: S1 alimenta S3, S3 alimenta S2, S2 alimenta S4'); msg('Diagrama de dependência dos sensores: S1 → S3 → S2 → S4. Cada sensor só pode ser desativado quando o anterior na cadeia está off. A ordem importa!'); }
        else msg('Cadeia: S1 → S3 → S2 → S4.');
      }
      else if (id === 'monitorCams') {
        if (!state.get('monitorCams')) { state.set('monitorCams', true); msg('Câmeras mostram: Galeria com lasers ativos, corredor bloqueado, Ala Egípcia isolada. Quatro sensores estão marcados S1-S4 no mapa.'); }
        else msg('Câmeras: lasers' + (state.get('laserDesativado') ? ' desativados.' : ' ativos em toda parte.'));
      }
      else if (id === 'painelSensores') { abrirPainelSensores(); }
      else if (id === 'voltarGaleria') {
        EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente('galeria'); UITabs.setActive('tabs', 'galeria'); msg('De volta à Galeria Principal.'); });
      }
      // --- ALA EGÍPCIA ---
      else if (id === 'sarcofago') {
        if (!state.get('sarcofago')) { state.set('sarcofago', true); inv.add('escaravelho', '🪲', 'Escaravelho dourado — símbolo de renascimento'); msg('O sarcófago se abre levemente. Dentro, um escaravelho dourado com inscrições. Símbolo de renascimento e passagem.'); }
        else msg('O sarcófago está vazio. O escaravelho é seu.');
      }
      else if (id === 'hieroglifos') {
        if (!state.get('hieroglifos')) { state.set('hieroglifos', true); inv.add('sequencia_hiero', '𓂀', 'Hieróglifos: "Ouro do sol, Azul do Nilo, Vermelho do fogo"'); msg('Os hieróglifos narram um ritual: "Primeiro o Ouro do sol nasce, depois o Azul do Nilo flui, e por fim o Vermelho do fogo consome." Uma sequência de cores.'); }
        else msg('Ritual: Ouro → Azul → Vermelho.');
      }
      else if (id === 'muralCores') {
        if (!state.get('muralCores')) { state.set('muralCores', true); inv.add('cores_ritual', '🎨', 'Mural: três círculos — dourado, azul, vermelho'); msg('Um mural com três círculos alinhados: dourado, azul e vermelho. Abaixo, o símbolo de um escaravelho com asas abertas.'); }
        else msg('Três cores: dourado, azul, vermelho.');
      }
      else if (id === 'terminalOverride') { abrirTerminalOverride(); }
      else if (id === 'voltarGaleriaEg') {
        EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente('galeria'); UITabs.setActive('tabs', 'galeria'); msg('De volta à Galeria Principal.'); });
      }

      UIInventory.render('inventory', inv.getAll());
    }

    // === PAINEL DE SENSORES ===
    function abrirPainelSensores() {
      if (state.get('laserDesativado')) { msg('Sensores já desativados. Lasers offline.'); return; }
      const html = `
        <p style="color:${UITokens.get('colorText')}; margin-bottom:12px;">🔴 Painel de Sensores — Desativação em cadeia</p>
        <p style="color:${UITokens.get('colorTextMuted')}; font-size:0.85rem; margin-bottom:10px;">Desative na ordem de dependência do circuito. Cada botão desliga um sensor.</p>
        <p style="color:${UITokens.get('colorTextMuted')}; font-size:0.8rem; margin-bottom:14px;">Ordem atual: ${sensorOrdem.length > 0 ? sensorOrdem.join(' → ') : '(nenhum)'}</p>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:14px 0;">
          <button class="btn-sensor" data-sensor="S1" style="padding:12px; background:${state.get('sensor1')?'#1a2a1a':'#1a0a0a'}; border:2px solid ${state.get('sensor1')?'#4caf50':'#ff1a1a'}; color:${state.get('sensor1')?'#4caf50':'#ff1a1a'}; font-family:monospace; cursor:pointer; border-radius:4px; font-size:1rem;">${state.get('sensor1')?'✅ S1 OFF':'🔴 S1 ON'}</button>
          <button class="btn-sensor" data-sensor="S2" style="padding:12px; background:${state.get('sensor2')?'#1a2a1a':'#1a0a0a'}; border:2px solid ${state.get('sensor2')?'#4caf50':'#ff1a1a'}; color:${state.get('sensor2')?'#4caf50':'#ff1a1a'}; font-family:monospace; cursor:pointer; border-radius:4px; font-size:1rem;">${state.get('sensor2')?'✅ S2 OFF':'🔴 S2 ON'}</button>
          <button class="btn-sensor" data-sensor="S3" style="padding:12px; background:${state.get('sensor3')?'#1a2a1a':'#1a0a0a'}; border:2px solid ${state.get('sensor3')?'#4caf50':'#ff1a1a'}; color:${state.get('sensor3')?'#4caf50':'#ff1a1a'}; font-family:monospace; cursor:pointer; border-radius:4px; font-size:1rem;">${state.get('sensor3')?'✅ S3 OFF':'🔴 S3 ON'}</button>
          <button class="btn-sensor" data-sensor="S4" style="padding:12px; background:${state.get('sensor4')?'#1a2a1a':'#1a0a0a'}; border:2px solid ${state.get('sensor4')?'#4caf50':'#ff1a1a'}; color:${state.get('sensor4')?'#4caf50':'#ff1a1a'}; font-family:monospace; cursor:pointer; border-radius:4px; font-size:1rem;">${state.get('sensor4')?'✅ S4 OFF':'🔴 S4 ON'}</button>
        </div>
        <div style="display:flex; gap:10px; justify-content:center; margin-top:10px;">
          <button id="btnResetSensores" style="padding:8px 20px; background:#1a0a0a; border:1px solid #ff1a1a; color:#ff1a1a; font-family:monospace; cursor:pointer; border-radius:4px;">↺ Reset</button>
          <button id="btnVoltarSensores" style="padding:8px 20px; background:#12101a; border:1px solid #2a2035; color:#d4cfc0; font-family:monospace; cursor:pointer; border-radius:4px;">Voltar</button>
        </div>`;
      UIPanel.setContent('puzzle-panel', html); UIPanel.show('puzzle-panel');
      setTimeout(() => {
        const ordemCorreta = ['S1','S3','S2','S4'];
        document.querySelectorAll('.btn-sensor').forEach(btn => {
          btn.addEventListener('click', () => {
            const s = btn.dataset.sensor;
            if (state.get('sensor' + s.charAt(1))) return; // já desativado
            sensorOrdem.push(s);
            const idx = sensorOrdem.length - 1;
            if (sensorOrdem[idx] !== ordemCorreta[idx]) {
              msg('❌ Curto-circuito! Sensor ' + s + ' não pode ser desativado agora. O painel resetou.');
              sensorOrdem = [];
              state.set('sensor1', false); state.set('sensor2', false); state.set('sensor3', false); state.set('sensor4', false);
              abrirPainelSensores();
              return;
            }
            state.set('sensor' + s.charAt(1), true);
            msg('✓ Sensor ' + s + ' desativado.');
            if (sensorOrdem.length === 4) {
              state.set('laserDesativado', true); UITabs.unlock('tabs', 'egipcia'); UIPanel.hide('puzzle-panel');
              msg('✅ Todos os sensores desativados! Lasers offline. O corredor para a Ala Egípcia está livre. A escultura na galeria também está acessível.');
            } else { abrirPainelSensores(); }
          });
        });
        document.getElementById('btnResetSensores').addEventListener('click', () => {
          sensorOrdem = [];
          state.set('sensor1', false); state.set('sensor2', false); state.set('sensor3', false); state.set('sensor4', false);
          msg('Painel resetado. Todos sensores re-ativados.');
          abrirPainelSensores();
        });
        document.getElementById('btnVoltarSensores').addEventListener('click', () => { UIPanel.hide('puzzle-panel'); msg('Você se afasta do painel.'); });
      }, 50);
    }

    // === TERMINAL OVERRIDE (ALA EGÍPCIA) ===
    function abrirTerminalOverride() {
      if (state.get('overrideCompleto')) { msg('Sistema já desbloqueado. A saída está livre.'); return; }
      const html = `
        <p style="color:${UITokens.get('colorText')}; margin-bottom:10px;">𓂀 Terminal de Override — Sequência de Desbloqueio</p>
        <p style="color:${UITokens.get('colorTextMuted')}; font-size:0.85rem; margin-bottom:8px;">Passo 1: Insira o código numérico de acesso (4 dígitos)</p>
        <div style="display:flex; gap:8px; justify-content:center; margin:10px 0;">
          <input id="codigoInput" type="text" maxlength="4" placeholder="____" style="width:120px; text-align:center; padding:10px; background:#0a0a0f; border:2px solid #e8b84a; color:#e8b84a; font-family:monospace; font-size:1.4rem; border-radius:4px; letter-spacing:8px;" />
        </div>
        <p style="color:${UITokens.get('colorTextMuted')}; font-size:0.85rem; margin:12px 0 8px;">Passo 2: Sequência de cores do ritual (selecione em ordem)</p>
        <div style="display:flex; gap:12px; justify-content:center; margin:10px 0;">
          <button class="btn-cor" data-cor="gold" style="width:50px;height:50px;border-radius:50%;background:#e8b84a;border:3px solid #0a0a0f;cursor:pointer;" title="Dourado"></button>
          <button class="btn-cor" data-cor="blue" style="width:50px;height:50px;border-radius:50%;background:#1565c0;border:3px solid #0a0a0f;cursor:pointer;" title="Azul"></button>
          <button class="btn-cor" data-cor="red" style="width:50px;height:50px;border-radius:50%;background:#c62828;border:3px solid #0a0a0f;cursor:pointer;" title="Vermelho"></button>
        </div>
        <p id="seqCoresDisplay" style="color:#e8b84a; text-align:center; font-family:monospace; margin:6px 0; min-height:20px;"></p>
        <div style="display:flex; gap:10px; justify-content:center; margin-top:14px;">
          <button id="btnOverride" style="padding:8px 20px; background:#1a1a0a; border:1px solid #e8b84a; color:#e8b84a; font-family:monospace; cursor:pointer; border-radius:4px;">⚡ Executar Override</button>
          <button id="btnResetOverride" style="padding:8px 20px; background:#1a0a0a; border:1px solid #c62828; color:#c62828; font-family:monospace; cursor:pointer; border-radius:4px;">↺ Reset</button>
          <button id="btnVoltarOverride" style="padding:8px 20px; background:#12101a; border:1px solid #2a2035; color:#d4cfc0; font-family:monospace; cursor:pointer; border-radius:4px;">Voltar</button>
        </div>`;
      UIPanel.setContent('puzzle-panel', html); UIPanel.show('puzzle-panel');
      let seqCores = [];
      const corNomes = { gold: '🟡', blue: '🔵', red: '🔴' };
      setTimeout(() => {
        document.querySelectorAll('.btn-cor').forEach(btn => {
          btn.addEventListener('click', () => {
            if (seqCores.length >= 3) return;
            seqCores.push(btn.dataset.cor);
            document.getElementById('seqCoresDisplay').textContent = seqCores.map(c => corNomes[c]).join(' → ');
          });
        });
        document.getElementById('btnOverride').addEventListener('click', () => {
          const codigo = document.getElementById('codigoInput').value.trim();
          if (codigo.length !== 4) { msg('Insira um código de 4 dígitos.'); return; }
          if (seqCores.length !== 3) { msg('Selecione 3 cores na ordem do ritual.'); return; }
          const codigoCorreto = codigo === '1891';
          const coresCorretas = seqCores[0]==='gold' && seqCores[1]==='blue' && seqCores[2]==='red';
          if (codigoCorreto && coresCorretas) {
            state.set('overrideCompleto', true); UIPanel.hide('puzzle-panel');
            escapar();
          } else if (!codigoCorreto && !coresCorretas) {
            msg('❌ Código incorreto E sequência de cores errada. Terminal resetado.');
            seqCores = []; document.getElementById('seqCoresDisplay').textContent = '';
          } else if (!codigoCorreto) {
            msg('❌ Código numérico incorreto. Pense no que as datas dos quadros significam juntas...');
            seqCores = []; document.getElementById('seqCoresDisplay').textContent = '';
          } else {
            msg('❌ Sequência de cores incorreta. Releia os hieróglifos sobre o ritual.');
            seqCores = []; document.getElementById('seqCoresDisplay').textContent = '';
          }
        });
        document.getElementById('btnResetOverride').addEventListener('click', () => {
          seqCores = []; document.getElementById('seqCoresDisplay').textContent = '';
          document.getElementById('codigoInput').value = '';
          msg('Terminal resetado.');
        });
        document.getElementById('btnVoltarOverride').addEventListener('click', () => { UIPanel.hide('puzzle-panel'); msg('Você se afasta do terminal.'); });
      }, 50);
    }

    // === ESCAPE ===
    function escapar() { timer.stop(); UISuccessOverlay.show('success-overlay', { title: '🏛️ MUSEU DESBLOQUEADO!', subtitle: 'O override é aceito. As portas de emergência se abrem com um clique. O ar frio da noite invade o museu. Você está livre.', time: timer.format(), links: [{ text: '← Voltar ao Lobby', href: '../index.html' }] }); }

    // === INPUT ===
    input.onClick((x, y) => { if (EscapeTransitions.isTransitioning()) return; const obj = input.hitTest(x, y, getObjetos()); if (obj) interagir(obj); });

    // === RENDER ===
    game.onRender((ctx, dt, size) => {
      laserPulse += dt * 3;
      const amb = state.getAmbiente();
      if (amb === 'galeria') renderGaleria(ctx, state);
      else if (amb === 'seguranca') renderSeguranca(ctx, state);
      else renderEgipcia(ctx, state);

      const hovered = input.getHoveredObject(getObjetos());
      for (const obj of getObjetos()) {
        if (hovered && hovered.id === obj.id) {
          ctx.save(); ctx.strokeStyle = UITokens.get('glowColor'); ctx.lineWidth = 2;
          ctx.shadowColor = UITokens.get('glowColor'); ctx.shadowBlur = 12;
          ctx.strokeRect(obj.x, obj.y, obj.w, obj.h); ctx.restore();
        }
      }
      dustParticles.update(dt); dustParticles.render(ctx);
      EscapeTransitions.render(ctx, size.width, size.height);
    });

    // Render functions are loaded from render.js
