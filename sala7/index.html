<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sala 7 — O Orient Express</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Georgia', serif; background: #0a0806; color: #e8dcc8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 12px; }
    #tabs { width: 100%; max-width: 910px; }
    #game-wrapper { position: relative; width: 900px; max-width: 100%; }
    canvas { width: 100%; height: auto; display: block; border-radius: 8px; border: 1px solid #3d3020; cursor: crosshair; }
    #puzzle-panel, #success-overlay { position: absolute; inset: 0; }
    #message, #inventory { width: 100%; max-width: 910px; }
  </style>
</head>
<body>
  <div id="tabs"></div>
  <div id="game-wrapper">
    <canvas id="gameCanvas" width="900" height="600"></canvas>
    <div id="puzzle-panel"></div>
    <div id="success-overlay"></div>
  </div>
  <div id="message"></div>
  <div id="inventory"></div>

  <script src="../lib/engine.js"></script>
  <script src="../lib/input.js"></script>
  <script src="../lib/state.js"></script>
  <script src="../lib/inventory.js"></script>
  <script src="../lib/transitions.js"></script>
  <script src="../lib/timer.js"></script>
  <script src="../lib/particles.js"></script>
  <script src="../ui-kit/tokens.js"></script>
  <script src="../ui-kit/themes/artdeco.js"></script>
  <script src="../ui-kit/components/inventory.js"></script>
  <script src="../ui-kit/components/tabs.js"></script>
  <script src="../ui-kit/components/message-box.js"></script>
  <script src="../ui-kit/components/panel.js"></script>
  <script src="../ui-kit/components/success-overlay.js"></script>
  <script src="render.js"></script>

  <script>
    UITokens.apply(ThemeArtDeco);
    const game = EscapeEngine.create({ canvasId: 'gameCanvas', width: 900, height: 600, backgroundColor: '#0a0806' });
    const input = EscapeInput.create(game.getCanvas(), 900, 600);
    const state = EscapeState.create({ ambiente: 'restaurante', flags: {
      menu: false, garrafa: false, toalha: false, lustre: false, relogio: false, portaCabines: false,
      cabine1: false, cabine2: false, cabine3: false, diario: false, maleta: false, chaveMestre: false,
      codigoCabine: false, cabineAberta: false,
      manometro: false, alavanca: false, carvao: false, mapa: false,
      vagaoRestLocked: false, vagaoCabLocked: false
    }});
    const inv = EscapeInventory.create();
    const timer = EscapeTimer.create();
    let parallaxOffset = 0;

    UITabs.create('tabs', [
      { id: 'restaurante', label: 'Vagão Restaurante', locked: false },
      { id: 'cabines', label: 'Vagão de Cabines', locked: true },
      { id: 'locomotiva', label: 'Locomotiva', locked: true }
    ], (tabId) => {
      if (tabId === 'restaurante' && state.get('vagaoRestLocked')) { msg('O vagão restaurante foi desacoplado. Não há como voltar.'); UITabs.setActive('tabs', state.getAmbiente()); return; }
      if (tabId === 'cabines' && !state.get('portaCabines')) { msg('A passagem para o vagão de cabines está trancada.'); UITabs.setActive('tabs', 'restaurante'); return; }
      if (tabId === 'cabines' && state.get('vagaoCabLocked')) { msg('O vagão de cabines foi desacoplado. Não há como voltar.'); UITabs.setActive('tabs', state.getAmbiente()); return; }
      if (tabId === 'locomotiva' && !state.get('chaveMestre')) { msg('A porta da locomotiva exige uma chave mestra.'); UITabs.setActive('tabs', 'cabines'); return; }
      if (tabId === 'cabines' && !state.get('vagaoRestLocked')) { confirmarAvanco('restaurante', 'cabines'); return; }
      if (tabId === 'locomotiva' && !state.get('vagaoCabLocked')) { confirmarAvanco('cabines', 'locomotiva'); return; }
      EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente(tabId); msgAmb(tabId); });
    });

    function confirmarAvanco(from, to) {
      const html = `
        <p style="color:#c62828; font-weight:bold; margin-bottom:14px; font-size:1.1rem;">⚠️ Atenção: ao avançar, o vagão anterior será desacoplado!</p>
        <p style="color:${UITokens.get('colorText')}; margin-bottom:18px;">Você não poderá retornar ao ${from === 'restaurante' ? 'Vagão Restaurante' : 'Vagão de Cabines'}. Tem certeza?</p>
        <div style="display:flex; gap:10px; justify-content:center;">
          <button id="btnConfirmar" style="padding:8px 20px; background:#1a150e; border:1px solid #c62828; color:#c62828; font-family:'Georgia',serif; cursor:pointer; border-radius:4px;">Avançar</button>
          <button id="btnCancelar" style="padding:8px 20px; background:#1a150e; border:1px solid #3d3020; color:#e8dcc8; font-family:'Georgia',serif; cursor:pointer; border-radius:4px;">Ficar</button>
        </div>`;
      UIPanel.setContent('puzzle-panel', html); UIPanel.show('puzzle-panel');
      setTimeout(() => {
        document.getElementById('btnConfirmar').addEventListener('click', () => {
          UIPanel.hide('puzzle-panel');
          if (from === 'restaurante') { state.set('vagaoRestLocked', true); }
          else { state.set('vagaoCabLocked', true); }
          EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente(to); UITabs.setActive('tabs', to); msgAmb(to); });
        });
        document.getElementById('btnCancelar').addEventListener('click', () => { UIPanel.hide('puzzle-panel'); UITabs.setActive('tabs', from); msg('Você decide permanecer.'); });
      }, 50);
    }

    UIMessageBox.create('message'); UIInventory.create('inventory'); UIPanel.create('puzzle-panel'); UISuccessOverlay.create('success-overlay');
    const dust = EscapeParticles.create({ x: 0, y: 0, width: 900, height: 600, color: 'rgba(212,168,67,0.08)', count: 20, speedX: [-1,1], speedY: [-2,1], size: [1,2], life: [6,14] });

    function msg(t) { UIMessageBox.show('message', t); }
    function msgAmb(a) {
      if (a === 'restaurante') msg('O vagão restaurante. Toalhas de linho, lustres de cristal. O menu do jantar ainda está na mesa.');
      else if (a === 'cabines') msg('O vagão de cabines. Portas numeradas de mogno. Um corredor estreito com carpete vermelho.');
      else msg('A locomotiva. Caldeira, alavancas, manômetros. Nenhum maquinista à vista. O trem acelera.');
    }
    msg('Orient Express, 1934. Você acorda no vagão restaurante. O trem acelera sem controle. Não há maquinista. Você precisa chegar à locomotiva e frear.');
    timer.start();

    // OBJETOS
    const objetosRestaurante = [
      { id: 'menu', x: 350, y: 300, w: 120, h: 80, label: 'Menu do jantar' },
      { id: 'garrafa', x: 200, y: 280, w: 50, h: 100, label: 'Garrafa de vinho' },
      { id: 'toalha', x: 550, y: 320, w: 100, h: 60, label: 'Toalha dobrada' },
      { id: 'lustre', x: 400, y: 20, w: 120, h: 70, label: 'Lustre de cristal' },
      { id: 'relogio', x: 50, y: 80, w: 70, h: 100, label: 'Relógio de parede' },
      { id: 'portaCabines', x: 800, y: 180, w: 70, h: 250, label: 'Porta → Cabines' }
    ];
    const objetosCabines = [
      { id: 'cabine1', x: 50, y: 150, w: 120, h: 180, label: 'Cabine 1 (aberta)' },
      { id: 'cabine2', x: 220, y: 150, w: 120, h: 180, label: 'Cabine 2 (trancada)' },
      { id: 'cabine3', x: 400, y: 150, w: 120, h: 180, label: 'Cabine 3 (aberta)' },
      { id: 'diario', x: 80, y: 400, w: 80, h: 50, label: 'Diário no chão' },
      { id: 'maleta', x: 430, y: 400, w: 90, h: 60, label: 'Maleta de couro' },
      { id: 'portaLocomotiva', x: 750, y: 180, w: 70, h: 250, label: 'Porta → Locomotiva' },
      { id: 'voltarRest', x: 30, y: 520, w: 140, h: 50, label: '← Restaurante' }
    ];
    const objetosLocomotiva = [
      { id: 'manometro', x: 100, y: 50, w: 180, h: 120, label: 'Painel de manômetros' },
      { id: 'alavancas', x: 350, y: 150, w: 200, h: 250, label: 'Alavancas de freio' },
      { id: 'carvao', x: 700, y: 300, w: 130, h: 120, label: 'Fornalha de carvão' },
      { id: 'mapa', x: 650, y: 50, w: 120, h: 80, label: 'Mapa ferroviário' },
      { id: 'voltarCab', x: 30, y: 520, w: 140, h: 50, label: '← Cabines' }
    ];
    function getObjetos() {
      const a = state.getAmbiente();
      if (a === 'restaurante') return objetosRestaurante;
      if (a === 'cabines') return objetosCabines;
      return objetosLocomotiva;
    }

    // INTERAÇÕES
    function interagir(obj) {
      if (EscapeTransitions.isTransitioning()) return;
      const id = obj.id;

      // VAGÃO RESTAURANTE
      if (id === 'menu') {
        if (!state.get('menu')) {
          state.set('menu', true);
          inv.add('menu_jantar', '📋', 'Menu: Filet Mignon 28F, Vin Rouge 1934 15F, Crème Brûlée 7F');
          msg('Menu elegante em francês. "Dîner Spécial": Filet Mignon — 28 Francs, Vin Rouge Château Margaux 1934 — 15 Francs, Crème Brûlée — 7 Francs.');
        } else msg('Menu: Filet 28F, Vin Rouge 1934 15F, Crème Brûlée 7F.');
      } else if (id === 'garrafa') {
        if (!state.get('garrafa')) {
          state.set('garrafa', true);
          inv.add('vinho_1934', '🍷', 'Château Margaux 1934 — safra especial');
          msg('Château Margaux, safra 1934. A garrafa está quase cheia. Alguém saiu às pressas no meio do jantar.');
        } else msg('Château Margaux 1934. Safra excelente.');
      } else if (id === 'toalha') {
        if (!state.get('toalha')) {
          state.set('toalha', true);
          msg('Sob a toalha: uma nota escrita às pressas: "A passagem está no fim do corredor. Empurre e gire." A porta para os cabines!');
          state.set('portaCabines', true);
          UITabs.unlock('tabs', 'cabines');
        } else msg('A nota diz: "Empurre e gire." Passagem desbloqueada.');
      } else if (id === 'lustre') {
        if (!state.get('lustre')) {
          state.set('lustre', true);
          msg('O lustre balança com o movimento do trem. Cristais art déco refletem luz dourada. Nada escondido, mas belo.');
        } else msg('Lustre de cristal art déco. O trem balança.');
      } else if (id === 'relogio') {
        if (!state.get('relogio')) {
          state.set('relogio', true);
          inv.add('hora_1147', '🕰️', 'Relógio: parado às 11:47');
          msg('Relógio art déco parado às 11:47. O momento em que algo aconteceu ao maquinista.');
        } else msg('Parado às 11:47.');
      } else if (id === 'portaCabines') {
        if (state.get('portaCabines')) { UITabs.setActive('tabs', 'cabines'); }
        else msg('A porta não cede. Deve haver um mecanismo.');
      }

      // VAGÃO DE CABINES
      else if (id === 'cabine1') {
        if (!state.get('cabine1')) {
          state.set('cabine1', true);
          msg('Cabine 1 vazia. Lençóis desarrumados. Alguém saiu correndo. Nada útil aqui.');
        } else msg('Cabine 1. Vazia.');
      } else if (id === 'cabine2') {
        if (!state.get('cabineAberta')) { abrirPainelCabine(); }
        else {
          if (!state.get('chaveMestre')) {
            state.set('chaveMestre', true);
            inv.add('chave_mestra', '🔑', 'Chave mestra do trem — acesso à locomotiva');
            UITabs.unlock('tabs', 'locomotiva');
            msg('Dentro da cabine 2: uma chave mestra pendurada no espelho! Etiqueta: "LOCOMOTIVA". Acesso liberado!');
          } else msg('Cabine 2 aberta. Chave mestra já coletada.');
        }
      } else if (id === 'cabine3') {
        if (!state.get('cabine3')) {
          state.set('cabine3', true);
          msg('Cabine 3. Pertences de um passageiro rico. Roupas finas, mas nada que ajude a parar o trem.');
        } else msg('Cabine 3. Roupas finas, nada útil.');
      } else if (id === 'diario') {
        if (!state.get('diario')) {
          state.set('diario', true);
          inv.add('diario_eng', '📖', 'Diário do engenheiro: "nunca exceda o dobro do jantar"');
          msg('Diário do engenheiro-chefe: "Os freios devem ser calibrados com precisão. A regra é simples: nunca exceda o dobro do jantar. Cada alavanca tem seu valor certo."');
        } else msg('Diário: "nunca exceda o dobro do jantar" — calibração dos freios.');
      } else if (id === 'maleta') {
        if (!state.get('maleta')) {
          state.set('maleta', true);
          inv.add('luvas', '🧤', 'Luvas de maquinista — proteção contra calor');
          msg('Maleta de couro com iniciais "J.P." — dentro: luvas de maquinista pesadas. Para operar a fornalha.');
        } else msg('Maleta vazia. Luvas já coletadas.');
      } else if (id === 'portaLocomotiva') {
        if (state.get('chaveMestre')) { UITabs.setActive('tabs', 'locomotiva'); }
        else msg('Porta pesada de aço. Fechadura exige chave mestra.');
      } else if (id === 'voltarRest') {
        if (state.get('vagaoRestLocked')) { msg('O vagão restaurante foi desacoplado. Impossível retornar.'); }
        else { EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente('restaurante'); UITabs.setActive('tabs', 'restaurante'); msg('De volta ao vagão restaurante.'); }); }
      }

      // LOCOMOTIVA
      else if (id === 'manometro') {
        if (!state.get('manometro')) {
          state.set('manometro', true);
          inv.add('info_psi', '🔧', 'Manômetros: 3 alavancas, escala 0-50 PSI cada');
          msg('Painel com 3 manômetros circulares, escala 0-50 PSI. Cada um conectado a uma alavanca de freio. Precisam ser ajustados ao valor correto.');
        } else msg('3 manômetros, 0-50 PSI cada. Valores corretos param o trem.');
      } else if (id === 'alavancas') {
        abrirPainelFreios();
      } else if (id === 'carvao') {
        if (!state.get('carvao')) {
          state.set('carvao', true);
          msg('A fornalha queima intensamente. Sem as luvas, impossível fechar a comporta. O fogo alimenta a caldeira.');
        } else msg('Fornalha ardente. A caldeira mantém pressão.');
      } else if (id === 'mapa') {
        if (!state.get('mapa')) {
          state.set('mapa', true);
          inv.add('mapa_rota', '🗺️', 'Mapa: próxima estação em 12km — curva perigosa antes');
          msg('Mapa ferroviário. Próxima estação: Innsbruck, 12km. ATENÇÃO: curva acentuada em 8km. Velocidade máxima na curva: 40km/h. O trem está a 120km/h!');
        } else msg('Curva perigosa em 8km. Precisa frear AGORA.');
      } else if (id === 'voltarCab') {
        if (state.get('vagaoCabLocked')) { msg('O vagão de cabines foi desacoplado. Impossível retornar.'); }
        else { EscapeTransitions.crossfade(game.getCtx(), 900, 600, 500, () => { state.setAmbiente('cabines'); UITabs.setActive('tabs', 'cabines'); msg('De volta ao vagão de cabines.'); }); }
      }
      UIInventory.render('inventory', inv.getAll());
    }

    // PUZZLE CABINE 2 — código 934 (últimos 3 dígitos da safra 1934)
    function abrirPainelCabine() {
      const html = `
        <p style="color:${UITokens.get('colorText')}; margin-bottom:14px;">🔐 Cabine 2 — Fechadura com código de 3 dígitos</p>
        <p style="color:${UITokens.get('colorTextMuted')}; font-size:0.85rem; margin-bottom:14px;">Um mecanismo giratório com 3 posições numéricas.</p>
        <input type="text" id="codCabine" maxlength="3" placeholder="_ _ _" style="background:#12100a; border:1px solid #3d3020; color:#d4a843; font-family:'Georgia',serif; font-size:1.5rem; padding:10px; width:100px; text-align:center; border-radius:4px;">
        <div style="margin-top:14px; display:flex; gap:10px; justify-content:center;">
          <button id="btnAbrir" style="padding:8px 20px; background:#1a150e; border:1px solid #d4a843; color:#d4a843; font-family:'Georgia',serif; cursor:pointer; border-radius:4px;">Abrir</button>
          <button id="btnVoltar" style="padding:8px 20px; background:#1a150e; border:1px solid #3d3020; color:#e8dcc8; font-family:'Georgia',serif; cursor:pointer; border-radius:4px;">Voltar</button>
        </div>`;
      UIPanel.setContent('puzzle-panel', html); UIPanel.show('puzzle-panel');
      setTimeout(() => {
        document.getElementById('codCabine').focus();
        document.getElementById('btnAbrir').addEventListener('click', () => {
          const v = document.getElementById('codCabine').value.trim();
          if (v === '934') {
            state.set('cabineAberta', true); state.set('codigoCabine', true); UIPanel.hide('puzzle-panel');
            state.set('chaveMestre', true);
            inv.add('chave_mestra', '🔑', 'Chave mestra do trem — acesso à locomotiva');
            UITabs.unlock('tabs', 'locomotiva');
            UIInventory.render('inventory', inv.getAll());
            msg('✅ Clique! A fechadura cede. Dentro: uma chave mestra dourada pendurada no espelho! Etiqueta: "LOCOMOTIVA".');
          } else { msg('❌ O mecanismo resiste. Código incorreto.'); document.getElementById('codCabine').value = ''; document.getElementById('codCabine').focus(); }
        });
        document.getElementById('btnVoltar').addEventListener('click', () => { UIPanel.hide('puzzle-panel'); msg('Você se afasta da cabine 2.'); });
        document.getElementById('codCabine').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('btnAbrir').click(); });
      }, 50);
    }

    // PUZZLE FINAL — Alavancas de freio: 7, 15, 28 PSI (ordem crescente)
    function abrirPainelFreios() {
      const html = `
        <p style="color:${UITokens.get('colorText')}; margin-bottom:12px;">🚂 Alavancas de Freio — Ajuste a pressão (0-50 PSI)</p>
        <p style="color:${UITokens.get('colorTextMuted')}; font-size:0.85rem; margin-bottom:14px;">Três alavancas controlam os freios. Cada uma precisa do valor exato de PSI. Ordem crescente.</p>
        <div style="display:flex; flex-direction:column; gap:12px; margin:14px 0; align-items:center;">
          <label style="color:#e8dcc8; display:flex; align-items:center; gap:10px;">Alavanca 1: <input type="number" id="lev1" min="0" max="50" value="0" style="background:#12100a; border:1px solid #3d3020; color:#d4a843; font-family:'Georgia',serif; font-size:1.2rem; padding:8px; width:80px; text-align:center; border-radius:4px;"> PSI</label>
          <label style="color:#e8dcc8; display:flex; align-items:center; gap:10px;">Alavanca 2: <input type="number" id="lev2" min="0" max="50" value="0" style="background:#12100a; border:1px solid #3d3020; color:#d4a843; font-family:'Georgia',serif; font-size:1.2rem; padding:8px; width:80px; text-align:center; border-radius:4px;"> PSI</label>
          <label style="color:#e8dcc8; display:flex; align-items:center; gap:10px;">Alavanca 3: <input type="number" id="lev3" min="0" max="50" value="0" style="background:#12100a; border:1px solid #3d3020; color:#d4a843; font-family:'Georgia',serif; font-size:1.2rem; padding:8px; width:80px; text-align:center; border-radius:4px;"> PSI</label>
        </div>
        <div style="display:flex; gap:10px; justify-content:center;">
          <button id="btnFrear" style="padding:8px 24px; background:#1a150e; border:1px solid #d4a843; color:#d4a843; font-family:'Georgia',serif; cursor:pointer; border-radius:4px; font-size:1rem;">⚙️ Aplicar Freios</button>
          <button id="btnCancelarF" style="padding:8px 20px; background:#1a150e; border:1px solid #3d3020; color:#e8dcc8; font-family:'Georgia',serif; cursor:pointer; border-radius:4px;">Voltar</button>
        </div>`;
      UIPanel.setContent('puzzle-panel', html); UIPanel.show('puzzle-panel');
      setTimeout(() => {
        document.getElementById('btnFrear').addEventListener('click', () => {
          const v1 = parseInt(document.getElementById('lev1').value) || 0;
          const v2 = parseInt(document.getElementById('lev2').value) || 0;
          const v3 = parseInt(document.getElementById('lev3').value) || 0;
          if (v1 === 7 && v2 === 15 && v3 === 28) {
            UIPanel.hide('puzzle-panel'); timer.stop();
            UISuccessOverlay.show('success-overlay', { title: '🚂 O TREM FREIA!', subtitle: 'As alavancas travam na posição. O chiado dos freios ecoa pelos trilhos. O Orient Express desacelera suavemente antes da curva. Você salvou todos a bordo.', time: timer.format(), links: [{ text: '← Voltar ao Lobby', href: '../index.html' }] });
          } else { msg('❌ Pressão incorreta! O trem treme mas não desacelera. Os manômetros voltam a zero. Tente novamente.'); }
        });
        document.getElementById('btnCancelarF').addEventListener('click', () => { UIPanel.hide('puzzle-panel'); msg('Você se afasta das alavancas.'); });
      }, 50);
    }

    // INPUT
    input.onClick((x, y) => { if (EscapeTransitions.isTransitioning()) return; const obj = input.hitTest(x, y, getObjetos()); if (obj) interagir(obj); });

    // RENDER
    game.onRender((ctx, dt, size) => {
      parallaxOffset += dt * 60;
      const amb = state.getAmbiente();
      if (amb === 'restaurante') renderRestaurante(ctx, state);
      else if (amb === 'cabines') renderCabines(ctx, state);
      else renderLocomotiva(ctx, state);
      const hovered = input.getHoveredObject(getObjetos());
      for (const obj of getObjetos()) { if (hovered && hovered.id === obj.id) { ctx.save(); ctx.strokeStyle = UITokens.get('glowColor'); ctx.lineWidth = 2; ctx.shadowColor = UITokens.get('glowColor'); ctx.shadowBlur = 12; ctx.strokeRect(obj.x, obj.y, obj.w, obj.h); ctx.restore(); } }
      dust.update(dt); dust.render(ctx);
      EscapeTransitions.render(ctx, size.width, size.height);
    });

    // Render functions are loaded from render.js

    game.start(); UIInventory.render('inventory', inv.getAll());
  </script>
</body>
</html>
